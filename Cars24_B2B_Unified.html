<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F5F6FA;color:#111827;-webkit-font-smoothing:antialiased;}
select option{color:#111827;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#4535F1;border-radius:4px;}
.desktop-only{display:flex;}
.mobile-only{display:none;}
@media(max-width:768px){.desktop-only{display:none!important;}.mobile-only{display:flex!important;}}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.45);border:none;background:transparent;width:100%;text-align:left;font-family:'DM Sans',system-ui,sans-serif;transition:color 0.15s,background 0.15s;position:relative;margin-bottom:2px;}
.nav-item:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06);}
.nav-item.active{color:#fff;background:rgba(69,53,241,0.15);font-weight:700;}
.nav-item.active::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:3px;background:#4535F1;border-radius:0 3px 3px 0;}
.c24-btn{font-family:'DM Sans',system-ui,sans-serif;border-radius:8px;cursor:pointer;font-weight:700;border:none;transition:filter 0.15s,transform 0.1s;}
.c24-btn:hover:not(:disabled){filter:brightness(0.9);}
.c24-btn:active:not(:disabled){transform:scale(0.97);}
.c24-btn:disabled{opacity:0.45;cursor:not-allowed;}
.c24-input{background:#fff;border:1.5px solid #E5E7EB;border-radius:8px;color:#111827;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
.c24-input:focus{border-color:#4535F1;box-shadow:0 0 0 3px rgba(69,53,241,0.1);}
.c24-input::placeholder{color:#9CA3AF;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseGlow{0%,100%{opacity:1;}50%{opacity:0.7;}}
</style>

function autoApprove(req,app,cfg){if(!app.stockIn)return{ok:false,route:"BLOCKED",reason:"Stock-In not complete"};if(req.type==="Split"){const avail=app.otherCharges-app.splitReleased;if(req.amount>avail)return{ok:false,route:"BLOCKED",reason:`Insufficient bucket. Available: ${fmt(avail)}`};if(req.amount<cfg.SPLIT_SAME_APP_GATE)return{ok:true,route:"AUTO-APPROVED",reason:`Below ${fmt(cfg.SPLIT_SAME_APP_GATE)} gate`};return{ok:false,route:"Ops Review → Finance",reason:`≥ ${fmt(cfg.SPLIT_SAME_APP_GATE)} — manual required`};}if(req.type==="Incentive"){if(app.splitReleased>0)return{ok:false,route:"Business Head",reason:"Prior split on this App_ID"};if(app.gsType==="Non-GS"){const base=app.quote-(app.serviceCharge+app.challan+app.estRefurb);const calc=Math.min((cfg.NONGS_RATE/100)*base,cfg.NONGS_CAP);if(req.amount>calc*1.01)return{ok:false,route:"Business Head",reason:`Exceeds calculated ${fmt(calc)}`};if(req.amount<=cfg.NONGS_AUTO_GATE)return{ok:true,route:"AUTO-APPROVED",reason:"Within cap & gate"};return{ok:false,route:"Business Head",reason:`Above auto-gate ${fmt(cfg.NONGS_AUTO_GATE)}`};}return{ok:false,route:"Business Head",reason:"GS incentive needs BH approval"};}return{ok:false,route:"Pending",reason:""};}

function RADashboard({user,shared}){
  const{apps,dealers,leads,onboarding,payoutRequests,counters,setPage,setDeepLink}=shared;
  let raIds=[user.id];if(user.role==="RM"&&user.raIds)raIds=[user.id,...user.raIds];
  const myLeads=leads.filter(l=>raIds.includes(l.raId));
  const myApps=apps.filter(a=>raIds.includes(a.raId));
  const myDealers=dealers.filter(d=>raIds.includes(d.raId));
  const myPR=payoutRequests.filter(p=>raIds.includes(p.raId));
  const walBal=raIds.reduce((s,r)=>s+raWalBal(r,apps),0);
  const[drawer,setDrawer]=useState(null);
  const[dealerDrawer,setDealerDrawer]=useState(null); // dealer-level stats drawer

  function handleNavigate({page,id}){
    if(setDeepLink&&id)setDeepLink({page,id});
    if(setPage)setPage(page);
  }

  function openDealerDrawer(dealer){
    const st=calcDealerMetrics(dealer.id,leads,apps,payoutRequests);
    setDealerDrawer({dealer,stats:st});
  }
  function getDealerStats(dealerId){
    return calcDealerMetrics(dealerId,leads,apps,payoutRequests);
  }

  function openDrawer(type){
    if(type==="leads"){
      const items=myLeads.map(l=>{const d=dealers.find(dd=>dd.id===l.dealerId);return{primary:`${l.make} ${l.model} ${l.year}`,badge:l.status,leadId:l.id,secondary:`${l.regNo} · ${d?d.name:"—"} · ${l.city}`,detail:`${l.createdAt}`,chips:[{label:`Lead ${l.id}`,page:"leads",id:l.id,color:T.accent}]};});
      setDrawer({title:user.role==="RM"?"Team Leads":"My Leads",icon:"📋",color:T.accent,data:items});
    } else if(type==="sipending"){
      const items=myApps.filter(a=>!a.stockIn).map(a=>{const d=dealers.find(dd=>dd.id===a.dealerId);return{primary:`${a.id} — ${a.vehicle}`,appId:a.id,secondary:`Dealer: ${d?d.name:"—"} · Quote: ${fmt(a.quote)}`,detail:`GS: ${a.gsType}`,chips:[{label:`App ${a.id}`,page:"appids",id:a.id,color:T.orange}]};});
      setDrawer({title:"SI Pending",icon:"🚗",color:T.orange,data:items});
    } else if(type==="activedeals"){
      const items=myApps.filter(a=>a.status==="Active").map(a=>{const d=dealers.find(dd=>dd.id===a.dealerId);const c=counters.find(cc=>cc.id===a.counterId);return{primary:`${a.id} — ${a.vehicle}`,appId:a.id,amount:fmt(a.otherCharges-a.splitReleased),secondary:`Dealer: ${d?d.name:"—"} · UCM: ${c?c.ucmName:"—"}`,detail:`SI: ${a.stockIn?"Done":"Pending"} · GS: ${a.gsType}`,chips:[{label:`App ${a.id}`,page:"appids",id:a.id,color:T.success}]};});
      setDrawer({title:"Active Deals",icon:"✅",color:T.success,data:items});
    } else if(type==="pendingpayouts"){
      const items=myPR.filter(p=>!["Auto-Approved","Released","Rejected"].includes(p.status)).map(r=>{const a=apps.find(aa=>aa.id===r.appId);return{primary:`${r.id} — ${r.type}`,amount:fmt(r.amount),badge:r.status,payoutId:r.id,secondary:a?`${a.vehicle} · App: ${r.appId}`:r.appId,chips:[{label:`App ${r.appId}`,page:"appids",id:r.appId,color:T.accent},{label:"Payout Status",page:"payouts",id:r.id,color:T.warn}]};});
      setDrawer({title:"Pending Payouts",icon:"⏳",color:T.warn,data:items});
    } else if(type==="dealers"){
      const items=myDealers.filter(d=>d.status==="Active").map(d=>{const st=getDealerStats(d.id);return{primary:d.name,badge:"Active",dealerId:d.id,secondary:`Code: ${d.code||"—"} · ${d.type} · ${d.oem}`,detail:`Leads: ${st.leads} | SI: ${st.si} | GS: ${st.gs} | Split: ${fmt(st.splits)} | Inc: ${fmt(st.incentives)}`,chips:[{label:"Onboarding",page:"onboarding",id:d.id,color:T.purple}]};});
      setDrawer({title:user.role==="RM"?"Team Dealers":"My Dealers",icon:"🏢",color:T.purple,data:items});
    } else if(type==="wallet"){
      const items=myApps.filter(a=>a.otherCharges-a.splitReleased>0).map(a=>{const d=dealers.find(dd=>dd.id===a.dealerId);return{primary:`${a.id} — ${a.vehicle}`,amount:fmt(a.otherCharges-a.splitReleased),appId:a.id,secondary:`Dealer: ${d?d.name:"—"} · OC: ${fmt(a.otherCharges)} · Released: ${fmt(a.splitReleased)}`,chips:[{label:`App ${a.id}`,page:"appids",id:a.id,color:T.accentD}]};});
      setDrawer({title:"Wallet Breakdown",icon:"💰",color:T.accentD,data:items});
    }
  }

  return <div>
    {drawer&&<DashboardDrawer {...drawer} onClose={()=>setDrawer(null)} onNavigate={handleNavigate}/>}
    {dealerDrawer&&<TMDealerDetailPanel dealer={dealerDrawer.dealer} stats={dealerDrawer.stats} onClose={()=>setDealerDrawer(null)} onNavigate={handleNavigate} counters={counters} apps={apps} leads={leads}/>}
    <div onClick={()=>openDrawer("wallet")} style={{background:`linear-gradient(135deg,#4535F1,#3428C9)`,borderRadius:16,padding:18,color:"#fff",marginBottom:14,boxShadow:"0 4px 20px rgba(69,53,241,0.25)",cursor:"pointer",transition:"transform 0.2s",position:"relative"}} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform=""}>
      <div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,opacity:0.7,marginBottom:4}}>{user.role==="RM"?"TEAM WALLET":"MY WALLET"} — OTHER CHARGES · TAP TO VIEW BREAKDOWN</div>
      <div style={{fontSize:26,fontWeight:900}}>{fmt(walBal)}</div>
      <div style={{fontSize:11,opacity:0.7,marginTop:2}}>Available to split</div>
      <div style={{position:"absolute",top:18,right:18,fontSize:12,opacity:0.5}}>▶</div>
      {user.role==="RM"&&user.raIds&&<div style={{marginTop:10,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.2)",display:"flex",gap:6,flexWrap:"wrap"}}>{[user.id,...user.raIds].map(rid=>{const ra=ALL_USERS.find(u=>u.id===rid);return <div key={rid} style={{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"4px 8px",fontSize:10}}><div style={{fontWeight:700}}>{ra&&ra.name.split(" ")[0]}</div><div style={{opacity:0.8}}>{fmt(raWalBal(rid,apps))}</div></div>;})}</div>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      <DashStatCard icon="📋" label="Leads" value={myLeads.length} color={T.accent} bg={T.accentL} onClick={()=>openDrawer("leads")}/>
      <DashStatCard icon="🚗" label="SI Pending" value={myApps.filter(a=>!a.stockIn).length} color={T.orange} bg={T.orangeL} onClick={()=>openDrawer("sipending")}/>
      <DashStatCard icon="✅" label="Active Deals" value={myApps.filter(a=>a.status==="Active").length} color={T.success} bg={T.successL} onClick={()=>openDrawer("activedeals")}/>
      <DashStatCard icon="⏳" label="Pending Payouts" value={myPR.filter(p=>!["Auto-Approved","Released","Rejected"].includes(p.status)).length} color={T.warn} bg={T.warnL} onClick={()=>openDrawer("pendingpayouts")}/>
      <DashStatCard icon="🏢" label="My Dealers" value={myDealers.filter(d=>d.status==="Active").length} color={T.purple} bg={T.purpleL} onClick={()=>openDrawer("dealers")}/>
      <DashStatCard icon="💰" label="Wallet" value={fmt(walBal)} color={T.accentD} bg={T.accentL} onClick={()=>openDrawer("wallet")}/>
    </div>
    {user.role==="RM"&&user.raIds&&<Card style={{marginBottom:10}}><Lbl>Team Breakdown</Lbl>{user.raIds.map(raId=>{const ra=ALL_USERS.find(u=>u.id===raId);const raL=leads.filter(l=>l.raId===raId);const raA=apps.filter(a=>a.raId===raId);return <div key={raId} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><div style={{fontSize:12,fontWeight:800}}>{ra&&ra.name}</div><div style={{fontSize:13,fontWeight:800,color:T.accent}}>{fmt(raWalBal(raId,apps))}</div></div><div style={{display:"flex",gap:10}}><span style={{fontSize:10,color:T.mute}}>{raL.length} leads</span><span style={{fontSize:10,color:T.mute}}>{raA.length} apps</span></div></div>;})}</Card>}
    <Card style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><Lbl>Top Dealers</Lbl><button onClick={()=>{if(setPage)setPage("dealers");}} style={{background:T.accentL,border:"1px solid "+T.accent+"30",borderRadius:8,padding:"4px 10px",fontSize:10,fontWeight:700,cursor:"pointer",color:T.accent,fontFamily:"inherit"}}>View All →</button></div>
      {myDealers.filter(d=>d.status==="Active").slice(0,3).map(d=>{
        const st=getDealerStats(d.id);
        return <div key={d.id} onClick={()=>openDealerDrawer(d)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+T.border,cursor:"pointer"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:800}}>{d.name}</div>
            <div style={{display:"flex",gap:6,marginTop:3}}>
              {[["L",st.leads,T.accent],["I",st.insp,T.purple],["SI",st.si,T.success],["GS",st.gs,"#0F766E"]].map(function(m){return <span key={m[0]} style={{fontSize:9,background:m[2]+"10",color:m[2],fontWeight:800,borderRadius:4,padding:"1px 5px"}}>{m[1]} {m[0]}</span>;})}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,fontWeight:900,color:T.accent}}>{fmt(st.splits+st.incentives)}</div>
            <div style={{fontSize:8,color:T.mute,fontWeight:700}}>PAID</div>
          </div>
        </div>;
      })}
      {myDealers.filter(d=>d.status==="Active").length===0&&<div style={{fontSize:11,color:T.mute,padding:"8px 0"}}>No active dealers</div>}
      {myDealers.filter(d=>d.status==="Active").length>3&&<div style={{textAlign:"center",paddingTop:8}}><button onClick={()=>{if(setPage)setPage("dealers");}} style={{background:"none",border:"none",color:T.accent,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+{myDealers.filter(d=>d.status==="Active").length-3} more dealers →</button></div>}
    </Card>
    <Card><Lbl>Recent Leads</Lbl>{myLeads.slice(-3).reverse().map(l=><div key={l.id} onClick={()=>{if(setDeepLink)setDeepLink({page:"leads",id:l.id});if(setPage)setPage("leads");}} style={{padding:"6px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:700,color:T.accent}}>{l.make} {l.model} {l.year} ↗</span><Badge s={l.status} sm/></div><div style={{fontSize:10,color:T.mute}}>{l.regNo} · {l.createdAt}</div></div>)}{myLeads.length===0&&<div style={{fontSize:11,color:T.mute,padding:"8px 0"}}>No leads yet</div>}</Card>
  </div>;
}

// STAGE DIALOG COMPONENT
// ═══════════════════════════════════════════════
const LEAD_STATUSES=["Lead Created","Inspection Done","Token Done","SI Done"];

function calcServiceCharge(quote){return Math.round((quote||0)*0.02);}
function calcFinalPayable(quote,sc){return (quote||0)-(sc||0);}
function calcDeliveryPayment(finalPayable,challan,otherCharges,partyPeshi,tokenCount){
  // delivery payment = finalPayable - challan - (otherCharges if applicable) - partyPeshi - tokenCount (token deduction = 1 per token)
  return Math.max(0,(finalPayable||0)-(challan||0)-(otherCharges||0)-(partyPeshi||0)-(tokenCount||0));
}

function StageDialog({lead,onSave,onClose,targetStatus}){
  const requiredStatus=targetStatus||"Lead Created";
  // pre-fill from existing lead data
  const[sf,setSf]=useState({
    newStatus:requiredStatus,
    c24Quote:lead.c24Quote||lead.price||"",
    inspectionNotes:lead.inspectionNotes||"",
    tokenCount:lead.tokenCount||1,
    challan:lead.challan||"",
    otherCharges:lead.otherCharges||"",
    partyPeshi:lead.partyPeshi||"",
    siGsType:lead.siGsType||"GS",
    siNotes:lead.siNotes||"",
    releaseDelivery:false,
  });
  const s=(k,v)=>setSf(p=>({...p,[k]:v}));
  const stIdx=LEAD_STATUSES.indexOf(sf.newStatus);
  const needsInspection=stIdx>=1;
  const needsToken=stIdx>=2;
  const needsSI=stIdx>=3;

  const sc=calcServiceCharge(Number(sf.c24Quote)||0);
  const fp=calcFinalPayable(Number(sf.c24Quote)||0,sc);
  const dp=calcDeliveryPayment(fp,Number(sf.challan)||0,Number(sf.otherCharges)||0,Number(sf.partyPeshi)||0,Number(sf.tokenCount)||1);

  function save(){
    const nowTs=new Date().toLocaleString("en-IN",{hour12:false}).slice(0,16);
    const updates={status:sf.newStatus};
    if(needsInspection){
      updates.inspectionDone=true;
      updates.inspectionAt=lead.inspectionAt||nowTs;
      updates.c24Quote=Number(sf.c24Quote)||0;
      updates.serviceCharge=sc;
      updates.finalPayableCx=fp;
      updates.inspectionNotes=sf.inspectionNotes||"";
    }
    if(needsToken){
      updates.tokenDone=true;
      updates.tokenAt=lead.tokenAt||nowTs;
      updates.tokenCount=Number(sf.tokenCount)||1;
      updates.challan=Number(sf.challan)||0;
      updates.otherCharges=Number(sf.otherCharges)||0;
      updates.partyPeshi=Number(sf.partyPeshi)||0;
      updates.deliveryPayment=dp;
      if(sf.releaseDelivery){updates.deliveryReleased=true;}
    }
    if(needsSI){
      updates.siDone=true;
      updates.siAt=lead.siAt||nowTs;
      updates.siGsType=sf.siGsType||"GS";
      updates.siNotes=sf.siNotes||"";
      // propagate to app
    }
    onSave(updates);
  }

  const panelBg="#FAFBFF";
  const divider=<div style={{height:1,background:"#E2E8F0",margin:"14px 0"}}/>;

  return <div style={{position:"fixed",inset:0,background:"rgba(13,27,46,0.6)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,maxHeight:"92vh",overflowY:"auto",padding:"20px 16px 32px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div><div style={{fontSize:15,fontWeight:900,color:T.text}}>{lead.make} {lead.model} {lead.year}</div><div style={{fontSize:11,color:T.mute}}>{lead.regNo}</div></div>
        <button onClick={onClose} style={{background:"#F1F5F9",border:"none",borderRadius:8,padding:"5px 10px",fontSize:13,fontWeight:700,cursor:"pointer",color:T.mid}}>✕</button>
      </div>

      <Sel label="Update Lead Stage" value={sf.newStatus} onChange={v=>s("newStatus",v)} options={LEAD_STATUSES}/>

      {needsInspection&&<>
        {divider}
        <div style={{fontSize:12,fontWeight:900,color:"#5B21B6",marginBottom:8}}>🔍 Inspection Details</div>
        <Fld label="C24 Evaluated Quote (₹)" value={sf.c24Quote} onChange={v=>s("c24Quote",v)} type="number" required placeholder="e.g. 720000"/>
        {sf.c24Quote>0&&<div style={{background:"#F5F3FF",borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:800,color:"#5B21B6",marginBottom:8}}>INSPECTION PRICE BREAKUP</div>
          <Row label="C24 Quote" value={fmt(Number(sf.c24Quote))}/>
          <Row label="Service Charge (2%)" value={`- ${fmt(sc)}`}/>
          <div style={{borderTop:"2px solid #7C3AED",marginTop:6,paddingTop:6}}><Row label="Final Payable to CX" value={fmt(fp)}/></div>
        </div>}
        <Fld label="Inspection Notes" value={sf.inspectionNotes} onChange={v=>s("inspectionNotes",v)} placeholder="e.g. Clean car, minor tyre wear"/>
      </>}

      {needsToken&&<>
        {divider}
        <div style={{fontSize:12,fontWeight:900,color:"#065F46",marginBottom:8}}>🤝 PR & Token Details</div>
        <Fld label="No. of Tokens (default 1)" value={sf.tokenCount} onChange={v=>s("tokenCount",v)} type="number" hint="Each token = ₹1 deduction"/>
        <Fld label="Challan (₹)" value={sf.challan} onChange={v=>s("challan",v)} type="number" placeholder="0"/>
        <Fld label="Other Charges (₹)" value={sf.otherCharges} onChange={v=>s("otherCharges",v)} type="number" placeholder="e.g. 18000" hint="Cars24 other charges bucket"/>
        <Fld label="Party Peshi (₹)" value={sf.partyPeshi} onChange={v=>s("partyPeshi",v)} type="number" placeholder="0"/>
        {fp>0&&<div style={{background:"#ECFDF5",borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:800,color:"#065F46",marginBottom:8}}>DELIVERY PAYMENT BREAKUP</div>
          <Row label="Final Payable to CX" value={fmt(fp)}/>
          <Row label="Challan Deduction" value={`- ${fmt(Number(sf.challan)||0)}`}/>
          <Row label="Other Charges Deduction" value={`- ${fmt(Number(sf.otherCharges)||0)}`}/>
          <Row label="Party Peshi" value={`- ${fmt(Number(sf.partyPeshi)||0)}`}/>
          <Row label="Token Deduction" value={`- ${fmt(Number(sf.tokenCount)||1)}`}/>
          <div style={{borderTop:"2px solid #10B981",marginTop:6,paddingTop:6}}><Row label="Final Delivery Payment" value={fmt(dp)}/></div>
        </div>}
        <label style={{display:"flex",alignItems:"center",gap:8,margin:"6px 0 10px",cursor:"pointer"}}><input type="checkbox" checked={sf.releaseDelivery} onChange={e=>s("releaseDelivery",e.target.checked)}/><span style={{fontSize:12,fontWeight:700,color:T.text}}>Mark Delivery Payment as Released (₹{dp.toLocaleString("en-IN")})</span></label>
      </>}

      {needsSI&&<>
        {divider}
        <div style={{fontSize:12,fontWeight:900,color:"#0F4C81",marginBottom:8}}>✅ Stock-In Details</div>
        <Sel label="GS Type" value={sf.siGsType} onChange={v=>s("siGsType",v)} options={["GS","Non-GS"]}/>
        <Fld label="SI Notes" value={sf.siNotes} onChange={v=>s("siNotes",v)} placeholder="e.g. All docs verified, keys handed over"/>
        <Alrt type="info">Marking SI Done will unlock the wallet for payout and set stockIn=true on the App_ID.</Alrt>
      </>}

      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn v="secondary" full onClick={onClose}>Cancel</Btn>
        <Btn v="success" full icon="✓" onClick={save}>Save Stage</Btn>
      </div>
    </div>
  </div>;
}

// LEADS MODULE — with stage dialog on create + open

function LeadsModule({user,shared}){
  const{dealers,counters,leads,setLeads,apps,setApps}=shared;
  const[view,setView]=useState("list");
  const[step,setStep]=useState(0);
  const[sel,setSel]=useState(null);     // lead id being viewed
  const[stageFor,setStageFor]=useState(null); // lead id for stage dialog
  const[form,setForm]=useState({});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const isOpsView=["TM","Central Ops","Business Head","Finance"].includes(user.role);
  let raIds=[user.id];
  if(user.role==="RM"&&user.raIds)raIds=[user.id,...user.raIds];
  const myLeads=isOpsView?leads:leads.filter(l=>raIds.includes(l.raId));

  const myDealers=isOpsView?dealers.filter(d=>d.status==="Active"):dealers.filter(d=>raIds.includes(d.raId)&&d.status==="Active");
  const dealerCtrs=counters.filter(c=>c.dealerId===form.dealerId&&c.status==="Active");
  const selCtr=counters.find(c=>c.id===form.counterId);
  const selDealer=dealers.find(d=>d.id===form.dealerId);

  const calcPrice=()=>{let base=0;const yr=parseInt(form.year||"2020");const km=parseInt(form.km||"0");const mk=form.make||"";if(["Mercedes-Benz","BMW","Audi","Volvo"].includes(mk))base=1200000;else if(["Kia","Skoda","Volkswagen","Jeep","MG Motors"].includes(mk))base=800000;else if(["Hyundai","Honda","Toyota","Tata Motors","Mahindra"].includes(mk))base=600000;else base=450000;base=base*Math.pow(0.82,2026-yr);base=base*(1-(km/200000)*0.25);if(form.accident==="Major")base*=0.80;else if(form.accident==="Minor")base*=0.92;if(form.flood==="Yes")base*=0.75;if(form.tyres==="Poor")base*=0.96;if(form.ownership==="2nd")base*=0.95;else if(form.ownership==="3rd+")base*=0.88;return Math.round(base/1000)*1000;};

  // new lead: after submit open stage dialog immediately
  const[pendingStageLeadId,setPendingStageLeadId]=useState(null);
  function submitLead(){const price=calcPrice();const newLead={id:`L${uid()}`,raId:user.id,...form,price,status:"Lead Created",appId:"",createdAt:now(),inspectionDone:false,c24Quote:0,serviceCharge:0,finalPayableCx:0,inspectionNotes:"",tokenDone:false,tokenCount:1,challan:0,otherCharges:0,partyPeshi:0,deliveryPayment:0,deliveryReleased:false,siDone:false,siAt:"",siNotes:"",siGsType:""};
    setLeads(p=>[...p,newLead]);setView("list");setStep(0);setForm({});
    setTimeout(()=>setPendingStageLeadId(newLead.id),50);
  }

  function saveStage(leadId,updates){
    const actualId=leadId||pendingStageLeadId;
    const lead=leads.find(l=>l.id===actualId);
    if(!lead)return;
    let newAppId=lead.appId;
    // AUTO App_ID GENERATION: create App_ID on Inspection Done if none exists
    if(updates.inspectionDone && !lead.appId){
      const appUid=`APP${uid()}`;
      const dealer=dealers.find(d=>d.id===lead.dealerId);
      const counter=counters.find(c=>c.id===lead.counterId);
      const newApp={id:appUid,dealerId:lead.dealerId,counterId:lead.counterId,raId:lead.raId,vehicle:`${lead.year} ${lead.make} ${lead.model}${lead.variant?" "+lead.variant:""}`,regNo:lead.regNo,quote:updates.c24Quote||lead.price,serviceCharge:updates.serviceCharge||0,challan:updates.challan||0,estRefurb:0,gsType:"",stockIn:false,otherCharges:0,splitReleased:0,incentiveReleased:0,status:"Active",inspectionDone:true,inspectionAt:updates.inspectionAt||"",inspectionNotes:updates.inspectionNotes||"",tokenDone:false,tokenAt:"",tokenAmount:0,tokenNotes:"",siDone:false,siAt:"",siNotes:"",siOtherCharges:0,siGsType:""};
      setApps(prev=>[...prev,newApp]);
      newAppId=appUid;
      updates.appId=appUid;
    }
    // SYNC on Token Done: update linked App_ID with challan, otherCharges, token data
    if(updates.tokenDone && newAppId){
      setApps(prev=>prev.map(a=>a.id===newAppId?{...a,tokenDone:true,tokenAt:updates.tokenAt||a.tokenAt,tokenAmount:updates.tokenCount||a.tokenAmount,tokenNotes:"",challan:updates.challan>0?updates.challan:a.challan,otherCharges:updates.otherCharges>0?updates.otherCharges:a.otherCharges,serviceCharge:updates.serviceCharge>0?updates.serviceCharge:a.serviceCharge}:a));
    }
    // SYNC on SI Done: set stockIn, gsType, unlock wallet on linked App_ID
    if(updates.siDone && newAppId){
      setApps(prev=>prev.map(a=>a.id===newAppId?{...a,stockIn:true,siDone:true,siAt:updates.siAt||"",siNotes:updates.siNotes||"",siGsType:updates.siGsType||a.siGsType,gsType:updates.siGsType||a.gsType,otherCharges:updates.otherCharges>0?updates.otherCharges:a.otherCharges,serviceCharge:updates.serviceCharge>0?updates.serviceCharge:a.serviceCharge,challan:updates.challan>0?updates.challan:a.challan,siOtherCharges:updates.otherCharges>0?updates.otherCharges:a.siOtherCharges}:a));
    }
    setLeads(prev=>prev.map(l=>l.id===actualId?{...l,...updates}:l));
    setStageFor(null);setPendingStageLeadId(null);
  }

  // stage dialog open
  const stageDialogLead=leads.find(l=>l.id===(stageFor||pendingStageLeadId));

  // LEAD DETAIL VIEW
  if(sel&&view==="list"){const lead=leads.find(l=>l.id===sel);if(!lead)return null;
    const ld=dealers.find(d=>d.id===lead.dealerId);const lc=counters.find(c=>c.id===lead.counterId);const ra=ALL_USERS.find(u=>u.id===lead.raId);
    return <div>
      {stageDialogLead&&stageDialogLead.id===sel&&<StageDialog lead={stageDialogLead} targetStatus={lead.status} onSave={u=>saveStage(sel,u)} onClose={()=>setStageFor(null)}/>}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <Btn v="ghost" onClick={()=>{setSel(null);}} sm>← Back</Btn>
        <span style={{fontSize:14,fontWeight:800,flex:1}}>{lead.make} {lead.model} {lead.year}</span>
        <Badge s={lead.status}/>
      </div>
      <Card style={{marginBottom:10}}><ST>Vehicle Identity</ST>{[["Reg. No.",lead.regNo],["Make",lead.make],["Model",lead.model],["Year",lead.year],["Variant",lead.variant||"—"],["Fuel",lead.fuel],["Transmission",lead.transmission],["Color",lead.color||"—"],["KM",Number(lead.km||0).toLocaleString("en-IN")+" km"],["Ownership",lead.ownership],["Accident",lead.accident+(lead.accidentDesc?` (${lead.accidentDesc})`:"")],["Flood",lead.flood],["Tyres",lead.tyres]].map(([l,v])=><Row key={l} label={l} value={v}/>)}</Card>
      <Card style={{marginBottom:10}}><ST>Dealership & Counter</ST>{[["Dealer",ld&&ld.name],["Dealer Code",ld&&ld.code],["Counter",lc&&lc.name],["City",lc&&lc.city],["UCM Name",lc&&lc.ucmName],["UCM Mobile",lc&&lc.ucmMobile],["RA",ra&&ra.name]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}</Card>
      {lead.inspectionDone&&<Card style={{marginBottom:10}}><ST>🔍 Inspection</ST>{[["C24 Quote",fmt(lead.c24Quote||0)],["Service Charge (2%)",fmt(lead.serviceCharge||0)],["Final Payable to CX",fmt(lead.finalPayableCx||0)],["Inspection Notes",lead.inspectionNotes||"—"],["Inspected At",lead.inspectionAt]].map(([l,v])=><Row key={l} label={l} value={v}/>)}</Card>}
      {lead.tokenDone&&<Card style={{marginBottom:10}}><ST>🤝 Token & PR</ST>{[["Challan",fmt(lead.challan||0)],["Other Charges",fmt(lead.otherCharges||0)],["Party Peshi",fmt(lead.partyPeshi||0)],["Token Count",lead.tokenCount||1],["Delivery Payment",fmt(lead.deliveryPayment||0)],["Delivery Released",lead.deliveryReleased?"✅ Yes":"❌ Not yet"],["Token At",lead.tokenAt]].map(([l,v])=><Row key={l} label={l} value={v}/>)}</Card>}
      {lead.siDone&&<Card style={{marginBottom:10}}><ST>✅ Stock-In</ST>{[["GS Type",lead.siGsType],["SI At",lead.siAt],["Notes",lead.siNotes||"—"]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}</Card>}
      <Card style={{marginBottom:10}}><ST>Indicative Price</ST><div style={{background:`linear-gradient(135deg,${T.accentD},${T.accent})`,borderRadius:10,padding:14,textAlign:"center",marginBottom:8}}><div style={{fontSize:10,color:"rgba(255,255,255,0.7)",fontWeight:800,marginBottom:4}}>INDICATIVE C24 PRICE</div><div style={{fontSize:26,fontWeight:900,color:"#fff"}}>{fmt(lead.price)}</div></div>{[["Lead ID",lead.id],["App_ID",lead.appId||"Not yet created"],["Created",lead.createdAt]].map(([l,v])=><Row key={l} label={l} value={v}/>)}</Card>
      <Btn full v="primary" icon="✎" onClick={()=>setStageFor(sel)}>Update Stage / Status</Btn>
    </div>;
  }

  // CREATE LEAD FORM
  if(view==="form")return <div>
    {stageDialogLead&&<StageDialog lead={stageDialogLead} targetStatus="Lead Created" onSave={u=>saveStage(stageDialogLead.id,u)} onClose={()=>setPendingStageLeadId(null)}/>}
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><Btn v="ghost" onClick={()=>{setView("list");setStep(0);setForm({});}} sm>← Back</Btn><span style={{fontSize:14,fontWeight:800}}>New Lead</span></div>
    <StepBar steps={["Location","Vehicle","Condition","Submit"]} cur={step}/>
    {step===0&&<Card><ST>Step 1 — Dealership & Counter</ST>
      <Sel label="Dealership" value={form.dealerId} onChange={v=>f("dealerId",v)} options={myDealers.map(d=>({value:d.id,label:`${d.name} (${d.code})`}))} placeholder="Select dealer..." required/>
      {form.dealerId&&<>{dealerCtrs.length===0?<Alrt type="warning">No active counters. Contact Central Ops.</Alrt>:<Sel label="Counter" value={form.counterId} onChange={v=>f("counterId",v)} options={dealerCtrs.map(c=>({value:c.id,label:`${c.name} — ${c.city}`}))} placeholder="Select counter..." required/>}{selCtr&&<div style={{background:T.accentL,borderRadius:8,padding:10,marginBottom:10}}><div style={{fontSize:10,fontWeight:800,color:T.accent,marginBottom:4}}>COUNTER INFO</div><Row label="Counter" value={selCtr.name}/><Row label="City" value={selCtr.city}/><Row label="UCM Name" value={selCtr.ucmName}/><Row label="UCM Mobile" value={selCtr.ucmMobile}/></div>}</>}
      <Fld label="Registration Number" value={form.regNo} onChange={v=>f("regNo",v.toUpperCase())} required placeholder="e.g. DL3CAB1234" maxLength={15}/>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}><Btn disabled={!form.dealerId||!form.counterId||!form.regNo} onClick={()=>setStep(1)}>Next →</Btn></div>
    </Card>}
    {step===1&&<Card><ST>Step 2 — Vehicle Details</ST>
      <G2><Sel label="Make" value={form.make} onChange={v=>f("make",v)} options={CAR_MAKES} placeholder="Select make..." required/><Fld label="Model" value={form.model} onChange={v=>f("model",v)} required placeholder="e.g. Creta"/></G2>
      <G2><Sel label="Year" value={form.year} onChange={v=>f("year",v)} options={Array.from({length:15},(_,i)=>String(2026-i))} placeholder="Year..." required/><Fld label="Variant" value={form.variant} onChange={v=>f("variant",v)} placeholder="e.g. SX 1.5D"/></G2>
      <G2><Sel label="Fuel" value={form.fuel} onChange={v=>f("fuel",v)} options={["Petrol","Diesel","CNG","Electric","Hybrid"]} placeholder="Select..." required/><Sel label="Transmission" value={form.transmission} onChange={v=>f("transmission",v)} options={["Manual","Automatic","AMT","CVT","DCT"]} placeholder="Select..." required/></G2>
      <G2><Fld label="Color" value={form.color} onChange={v=>f("color",v)} placeholder="Pearl White"/><Fld label="KM Driven" value={form.km} onChange={v=>f("km",v)} type="number" required placeholder="35000"/></G2>
      <Sel label="Ownership" value={form.ownership} onChange={v=>f("ownership",v)} options={["1st","2nd","3rd+"]} placeholder="Select..." required/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><Btn v="secondary" onClick={()=>setStep(0)}>← Back</Btn><Btn disabled={!form.make||!form.model||!form.year||!form.fuel||!form.transmission||!form.km||!form.ownership} onClick={()=>setStep(2)}>Next →</Btn></div>
    </Card>}
    {step===2&&<Card><ST>Step 3 — Condition</ST>
      <Sel label="Accident History" value={form.accident} onChange={v=>f("accident",v)} options={["No","Minor","Major"]} placeholder="Select..." required/>
      {form.accident&&form.accident!=="No"&&<Fld label="Accident Details" value={form.accidentDesc} onChange={v=>f("accidentDesc",v)} placeholder="e.g. Front bumper damage"/>}
      <Sel label="Flood / Waterlogging" value={form.flood} onChange={v=>f("flood",v)} options={["No","Yes"]} placeholder="Select..." required/>
      <Sel label="Tyre Condition" value={form.tyres} onChange={v=>f("tyres",v)} options={["Excellent","Good","Fair","Poor"]} placeholder="Select..." required/>
      <Sel label="Engine Condition" value={form.engine} onChange={v=>f("engine",v)} options={["No issues","Minor issue","Major issue"]} placeholder="Select..." required/>
      <Sel label="Electrical Condition" value={form.electrical} onChange={v=>f("electrical",v)} options={["No issues","Minor issue","Major issue"]} placeholder="Select..." required/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><Btn v="secondary" onClick={()=>setStep(1)}>← Back</Btn><Btn disabled={!form.accident||!form.flood||!form.tyres||!form.engine||!form.electrical} onClick={()=>setStep(3)}>Next →</Btn></div>
    </Card>}
    {step===3&&<Card><ST>Step 4 — Review & Submit</ST>
      <div style={{background:`linear-gradient(135deg,${T.accentD},${T.accent})`,borderRadius:12,padding:18,textAlign:"center",marginBottom:12}}><div style={{fontSize:11,color:"rgba(255,255,255,0.7)",fontWeight:800,letterSpacing:1,marginBottom:4}}>INDICATIVE C24 PRICE</div><div style={{fontSize:32,fontWeight:900,color:"#fff"}}>{fmt(calcPrice())}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:4}}>Subject to inspection</div></div>
      <Alrt type="info">After submitting you'll be asked to set the current stage — Inspection, Token or SI Done — if already at a later stage.</Alrt>
      {[["Reg. No.",form.regNo],["Vehicle",`${form.make} ${form.model} ${form.year}`],["KM",Number(form.km||0).toLocaleString("en-IN")+" km"],["Dealer",selDealer&&selDealer.name],["Counter",selCtr&&selCtr.name],["UCM",selCtr&&selCtr.ucmName]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}><Btn v="secondary" onClick={()=>setStep(2)}>← Edit</Btn><Btn v="success" icon="✓" onClick={submitLead}>Submit Lead</Btn></div>
    </Card>}
  </div>;

  // LIST VIEW
  const statusOrder={...LEAD_STATUSES.reduce((a,s,i)=>({...a,[s]:i}),{})};
  const sortedLeads=[...myLeads].sort((a,b)=>(statusOrder[b.status]||0)-(statusOrder[a.status]||0));
  return <div>
    {stageDialogLead&&<StageDialog lead={stageDialogLead} targetStatus={stageDialogLead.status} onSave={u=>saveStage(stageDialogLead.id,u)} onClose={()=>{setStageFor(null);setPendingStageLeadId(null);}}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Lbl>Leads ({myLeads.length})</Lbl>{!isOpsView&&<Btn sm icon="+" onClick={()=>setView("form")}>New Lead</Btn>}</div>
    {myLeads.length===0&&<div style={{textAlign:"center",padding:36,color:T.mute}}><div style={{fontSize:28,marginBottom:8}}>📋</div><div>No leads yet</div>{!isOpsView&&<div style={{marginTop:10}}><Btn onClick={()=>setView("form")}>Create First Lead</Btn></div>}</div>}
    {sortedLeads.map(l=>{const d=dealers.find(dd=>dd.id===l.dealerId);const c=counters.find(cc=>cc.id===l.counterId);const ra=ALL_USERS.find(u=>u.id===l.raId);
      const stagePct=Math.round((LEAD_STATUSES.indexOf(l.status))/(LEAD_STATUSES.length-1)*100);
      return <Card key={l.id} style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}} onClick={()=>setSel(l.id)}>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:800}}>{l.make} {l.model} {l.year}</div><div style={{fontSize:11,color:T.mute}}>{l.regNo} · {l.km} km · {d&&d.name}</div></div>
          <Badge s={l.status} sm/>
        </div>
        <div style={{height:4,background:"#F1F5F9",borderRadius:4,marginBottom:8}}><div style={{height:4,background:l.status==="SI Done"?T.accent:l.status==="Token Done"?T.warn:l.status==="Inspection Done"?"#7C3AED":T.border,borderRadius:4,width:stagePct+"%",transition:"width 0.3s"}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",gap:8}}>
            {l.c24Quote>0&&<span style={{fontSize:11,fontWeight:800,color:T.accent}}>{fmt(l.c24Quote)}</span>}
            {l.appId&&<span style={{fontSize:10,color:T.success,fontWeight:700,background:T.successL,borderRadius:6,padding:"1px 6px"}}>{l.appId}</span>}
            {l.deliveryReleased&&<span style={{fontSize:10,color:"#fff",fontWeight:700,background:T.success,borderRadius:6,padding:"1px 6px"}}>Delivery ✓</span>}
          </div>
          <Btn sm v="secondary" onClick={()=>setStageFor(l.id)}>Update Stage</Btn>
        </div>
        {isOpsView&&<div style={{fontSize:10,color:T.mute,marginTop:3}}>RA: {ra&&ra.name} · UCM: {c&&c.ucmName}</div>}
      </Card>;
    })}
  </div>;
}

// ═══════════════════════════════════════════════
// APP_IDs MODULE — with lead stage data embedded
// ═══════════════════════════════════════════════
function AppIDsModule({user,shared}){
  const{apps,setApps,dealers,counters,leads,setLeads}=shared;
  const[sel,setSel]=useState(null);
  const[stageFor,setStageFor]=useState(null); // appId string → open stage dialog for linked lead

  const isOpsView=["TM","Central Ops","Business Head","Finance"].includes(user.role);
  let raIds=[user.id];
  if(user.role==="RM"&&user.raIds)raIds=[user.id,...user.raIds];
  const myApps=isOpsView?apps:apps.filter(a=>raIds.includes(a.raId));

  function saveStageFromApp(leadId,updates){
    const lead=leads.find(l=>l.id===leadId);
    if(!lead)return;
    const appId=lead.appId;
    if(updates.tokenDone && appId){
      setApps(prev=>prev.map(a=>a.id===appId?{...a,tokenDone:true,tokenAt:updates.tokenAt||a.tokenAt,challan:updates.challan>0?updates.challan:a.challan,otherCharges:updates.otherCharges>0?updates.otherCharges:a.otherCharges,serviceCharge:updates.serviceCharge>0?updates.serviceCharge:a.serviceCharge}:a));
    }
    if(updates.siDone && appId){
      setApps(prev=>prev.map(a=>a.id===appId?{...a,stockIn:true,siDone:true,siAt:updates.siAt||"",siNotes:updates.siNotes||"",siGsType:updates.siGsType||a.siGsType,gsType:updates.siGsType||a.gsType,otherCharges:updates.otherCharges>0?updates.otherCharges:a.otherCharges,serviceCharge:updates.serviceCharge>0?updates.serviceCharge:a.serviceCharge,challan:updates.challan>0?updates.challan:a.challan,siOtherCharges:updates.otherCharges>0?updates.otherCharges:a.siOtherCharges}:a));
    }
    setLeads(prev=>prev.map(l=>l.id===leadId?{...l,...updates}:l));
    setStageFor(null);
  }

  const stageForLead=stageFor?leads.find(l=>l.appId===stageFor):null;

  const STAGE_COLOR={
    "Lead Created":{bar:T.border,label:"Lead Created"},
    "Inspection Done":{bar:"#7C3AED",label:"Inspected"},
    "Token Done":{bar:T.warn,label:"Token Done"},
    "SI Done":{bar:T.accent,label:"SI Done"},
  };

  const renderApp=(a,extra)=>{
    const d=dealers.find(dd=>dd.id===a.dealerId);const c=counters.find(cc=>cc.id===a.counterId);
    const lead=leads.find(l=>l.appId===a.id);
    const isOpen=sel===a.id;
    const sc=STAGE_COLOR[lead&&lead.status]||{bar:T.border,label:"No Lead"};
    return <Card key={a.id} style={{marginBottom:10,border:`1.5px solid ${isOpen?T.accent:T.border}`,background:isOpen?T.accentL:"#fff"}}>
      <div onClick={()=>setSel(isOpen?null:a.id)}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
          <span style={{fontSize:12,fontWeight:800,color:T.accent}}>{a.id}</span>
          <Badge s={a.stockIn?"Active":"Stock-In Pending"} sm/>
        </div>
        <div style={{fontSize:12,fontWeight:700,marginBottom:2}}>{a.vehicle}</div>
        <div style={{fontSize:11,color:T.mute,marginBottom:6}}>{a.regNo} · {d&&d.name}</div>
        {/* Lead stage progress bar */}
        {lead&&<div style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:10,color:T.mute}}>Lead Stage</span><span style={{fontSize:10,fontWeight:700,color:sc.bar}}>{sc.label}</span></div>
          <div style={{height:4,background:"#F1F5F9",borderRadius:4}}><div style={{height:4,background:sc.bar,borderRadius:4,width:({
            "Lead Created":"10%","Inspection Done":"40%","Token Done":"70%","SI Done":"100%"
          }[lead.status]||"0%"),transition:"width 0.3s"}}/></div>
        </div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>
          {[["Wallet",fmt(a.otherCharges-a.splitReleased)],["Quote",fmt(lead&&lead.c24Quote||a.quote)],["GS",a.gsType]].map(([l,v])=><div key={l} style={{background:"#F8FAFC",borderRadius:6,padding:"5px 7px"}}><div style={{fontSize:9,color:T.mute,fontWeight:700}}>{l}</div><div style={{fontSize:10,fontWeight:800,marginTop:1}}>{v}</div></div>)}
        </div>
      </div>
      {isOpen&&<div style={{marginTop:10,borderTop:`1px solid ${T.border}`,paddingTop:10}}>
        <ST>App_ID Details</ST>
        {[["Reg. No.",a.regNo],["Dealer",d&&d.name],["Dealer Code",d&&d.code],["Counter",c&&c.name],["City",c&&c.city],["UCM Name",c&&c.ucmName],["UCM Mobile",c&&c.ucmMobile],["C24 Quote",fmt(lead&&lead.c24Quote||a.quote)],["Service Charge",fmt(lead&&lead.serviceCharge||a.serviceCharge)],["Challan",fmt(lead&&lead.challan||a.challan)],["Est. Refurb",fmt(a.estRefurb)],["Other Charges",fmt(lead&&lead.otherCharges||a.otherCharges)],["Wallet Available",fmt(a.otherCharges-a.splitReleased)],["GS Type",a.gsType],["Stock-In",a.stockIn?"✓ Complete":"✗ Pending"],...(extra||[])].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}
        {lead&&<><div style={{marginTop:8,marginBottom:6}}><ST>Lead Stage</ST></div>
          {lead.inspectionDone&&<>{[["C24 Quote",fmt(lead.c24Quote||0)],["Service Charge",fmt(lead.serviceCharge||0)],["Final Payable to CX",fmt(lead.finalPayableCx||0)]].map(([l,v])=><Row key={l} label={l} value={v}/>)}</>}
          {lead.tokenDone&&<>{[["Challan",fmt(lead.challan||0)],["Other Charges",fmt(lead.otherCharges||0)],["Delivery Payment",fmt(lead.deliveryPayment||0)],["Delivery Released",lead.deliveryReleased?"✅ Yes":"❌ No"]].map(([l,v])=><Row key={l} label={l} value={v}/>)}</>}
          {lead.siDone&&<Row label="GS Type (SI)" value={lead.siGsType}/>}
          <div style={{marginTop:8}}><Btn sm full v="secondary" onClick={e=>{e.stopPropagation();setStageFor(a.id);}}>✎ Update Lead Stage</Btn></div>
        </>}
      </div>}
    </Card>;
  };

  return <div>

function SAPModuleRA({user,shared}){
  // READ-ONLY for RA/RM — shows payee status for their dealers
  const{payees,sapReqs,dealers,counters}=shared;
  let raIds=[user.id];
  if(user.role==="RM"&&user.raIds)raIds=[user.id,...user.raIds];

  // All dealers this RA/RM manages
  const myDealers=dealers.filter(d=>raIds.includes(d.raId));
  const myDealerIds=myDealers.map(d=>d.id);

  // Payees linked to my dealers (from active payees)
  const myPayees=payees.filter(p=>p.dealerIds&&p.dealerIds.some(id=>myDealerIds.includes(id)));

  // SAP requests submitted (by TM/Ops) for my dealers
  const myReqs=sapReqs.filter(r=>r.dealerIds&&r.dealerIds.some(id=>myDealerIds.includes(id)));

  // Summary counts
  const validated=myPayees.filter(p=>p.fluxStatus==="Validated").length;
  const failed=myPayees.filter(p=>p.fluxStatus!=="Validated").length;
  const pending=myReqs.filter(r=>r.status==="Ops Review").length;

  // Per-dealer payee map
  function getPayeesForDealer(dealerId){
    return myPayees.filter(p=>p.dealerIds&&p.dealerIds.includes(dealerId));
  }
  function getPendingReqsForDealer(dealerId){
    return myReqs.filter(r=>r.dealerIds&&r.dealerIds.includes(dealerId)&&r.status==="Ops Review");
  }

  return <div>
    {/* Header banner */}
    <div style={{background:`linear-gradient(135deg,${T.accentD},${T.accent})`,borderRadius:14,padding:16,color:"#fff",marginBottom:14}}>
      <div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,opacity:0.7,marginBottom:4}}>SAP / PAYEE VISIBILITY — {user.role==="RM"?"TEAM":"MY"} DEALERS</div>
      <div style={{display:"flex",gap:20,marginTop:4}}>
        <div><div style={{fontSize:22,fontWeight:900}}>{myPayees.length}</div><div style={{fontSize:10,opacity:0.7}}>Total Payees</div></div>
        <div><div style={{fontSize:22,fontWeight:900,color:"#86EFAC"}}>{validated}</div><div style={{fontSize:10,opacity:0.7}}>Validated ✓</div></div>
        <div><div style={{fontSize:22,fontWeight:900,color:"#FCA5A5"}}>{failed}</div><div style={{fontSize:10,opacity:0.7}}>Failed / Pending</div></div>
        <div><div style={{fontSize:22,fontWeight:900,color:"#FDE68A"}}>{pending}</div><div style={{fontSize:10,opacity:0.7}}>Reqs in Queue</div></div>
      </div>
    </div>

    {/* Info notice */}
    <Alrt type="info">SAP / Payee creation is handled by TM or Central Ops. This view shows current payee status for your dealers. Contact your TM if any payee shows as failed or missing.</Alrt>

    {/* Per-dealer breakdown */}
    {myDealers.map(d=>{
      const dPayees=getPayeesForDealer(d.id);
      const dPending=getPendingReqsForDealer(d.id);
      const hasValidated=dPayees.some(p=>p.fluxStatus==="Validated");
      const hasFailed=dPayees.some(p=>p.fluxStatus!=="Validated");
      const borderColor=dPayees.length===0?"#E5E5E5":hasFailed?T.danger:T.success;

      return <div key={d.id} style={{background:"#fff",border:`1.5px solid ${borderColor}`,borderRadius:12,marginBottom:10,overflow:"hidden"}}>
        {/* Dealer header */}
        <div style={{background:dPayees.length===0?"#F5F5F5":hasValidated&&!hasFailed?T.successL:hasFailed?T.dangerL:"#F5F5F5",padding:"10px 14px",borderBottom:`1px solid ${borderColor}30`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:13,fontWeight:800}}>{d.name}</div>
              <div style={{fontSize:10,color:T.mute}}>{d.code||"Code Pending"} · {d.type} · {d.oem}</div>
            </div>
            <div style={{textAlign:"right"}}>
              {dPayees.length===0&&dPending.length===0&&<span style={{background:"#F0F0F0",color:T.mute,fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:20}}>No Payee</span>}
              {dPayees.length>0&&<span style={{background:hasValidated&&!hasFailed?T.successL:"#FEF2F2",color:hasValidated&&!hasFailed?T.success:T.danger,fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:20,border:`1px solid ${hasValidated&&!hasFailed?T.success:T.danger}30`}}>{dPayees.length} Payee{dPayees.length>1?"s":""}</span>}
              {dPending.length>0&&<div style={{fontSize:9,color:T.warn,fontWeight:700,marginTop:2}}>⏳ {dPending.length} pending</div>}
            </div>
          </div>
        </div>

        {/* Active payees */}
        {dPayees.length>0&&<div style={{padding:"8px 14px"}}>
          {dPayees.map(p=>{
            const isValid=p.fluxStatus==="Validated";
            return <div key={p.id} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div>
                  <div style={{fontSize:12,fontWeight:800,color:T.text}}>{p.payeeName}</div>
                  <div style={{fontSize:10,color:T.mute}}>SAP Code: <span style={{fontFamily:"monospace",fontWeight:700,color:p.sapCode?T.success:T.mute}}>{p.sapCode||"—"}</span></div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{display:"inline-flex",alignItems:"center",gap:4,background:isValid?T.successL:T.dangerL,border:`1px solid ${isValid?T.success:T.danger}30`,borderRadius:20,padding:"3px 9px"}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:isValid?T.success:T.danger,flexShrink:0}}/>
                    <span style={{fontSize:10,fontWeight:800,color:isValid?T.success:T.danger}}>{isValid?"Validated":"Failed"}</span>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:T.mid}}>🏦 {p.bank}</span>
                <span style={{fontSize:10,color:T.mid}}>PAN: <span style={{fontFamily:"monospace"}}>{p.pan}</span></span>
                <span style={{fontSize:10,color:T.mid}}>A/C: ···{p.account&&p.account.slice(-4)}</span>
              </div>
              {!isValid&&<div style={{marginTop:6,background:T.dangerL,border:`1px solid ${T.danger}30`,borderRadius:6,padding:"5px 8px",fontSize:10,color:T.danger,fontWeight:700}}>
                ⚠ Flux validation failed — contact your TM to raise a new SAP request with correct bank details
              </div>}
            </div>;
          })}
        </div>}

        {/* Pending SAP requests */}
        {dPending.length>0&&<div style={{padding:"8px 14px",background:T.warnL,borderTop:`1px solid ${T.warn}20`}}>
          {dPending.map(r=><div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:T.text}}>{r.payeeName}</div>

function calcDealerMetrics(dealerId,leads,apps,payoutRequests){
  var dLeads=leads.filter(function(l){return l.dealerId===dealerId;});
  var dApps=apps.filter(function(a){return a.dealerId===dealerId;});
  var dPR=payoutRequests.filter(function(r){var a=apps.find(function(aa){return aa.id===r.appId;});return a&&a.dealerId===dealerId;});
  var inspDone=dLeads.filter(function(l){return ["Inspection Done","Token Done","SI Done"].indexOf(l.status)!==-1;}).length;
  var siDone=dLeads.filter(function(l){return l.status==="SI Done";}).length;
  var tokenDone=dLeads.filter(function(l){return ["Token Done","SI Done"].indexOf(l.status)!==-1;}).length;
  var gsCount=dApps.filter(function(a){return a.gsType==="GS";}).length;
  var nonGsCount=dApps.filter(function(a){return a.gsType==="Non-GS";}).length;
  var splits=dPR.filter(function(r){return r.type==="Split"&&["Released","Auto-Approved"].indexOf(r.status)!==-1;}).reduce(function(s,r){return s+r.amount;},0);
  var incentives=dPR.filter(function(r){return r.type==="Incentive"&&["Released","Auto-Approved"].indexOf(r.status)!==-1;}).reduce(function(s,r){return s+r.amount;},0);
  var pendingSplits=dPR.filter(function(r){return r.type==="Split"&&["Released","Auto-Approved","Rejected"].indexOf(r.status)===-1;}).reduce(function(s,r){return s+r.amount;},0);
  var pendingIncentives=dPR.filter(function(r){return r.type==="Incentive"&&["Released","Auto-Approved","Rejected"].indexOf(r.status)===-1;}).reduce(function(s,r){return s+r.amount;},0);
  var walletAvail=dApps.filter(function(a){return a.stockIn;}).reduce(function(s,a){return s+a.otherCharges-a.splitReleased;},0);
  return{leads:dLeads.length,insp:inspDone,token:tokenDone,si:siDone,gs:gsCount,nonGs:nonGsCount,splits:splits,incentives:incentives,pendingSplits:pendingSplits,pendingIncentives:pendingIncentives,apps:dApps.length,wallet:walletAvail,allApps:dApps,allLeads:dLeads,allPR:dPR};
}

function RaisePayoutModule({user,shared}){
  const{apps,setApps,dealers,counters,payees,payoutRequests,setPayoutRequests,configs}=shared;
  const[step,setStep]=useState(0);const[appId,setAppId]=useState("");const[payeeId,setPayeeId]=useState("");const[type,setType]=useState("");const[amount,setAmount]=useState("");const[reason,setReason]=useState("");const[ackCross,setAckCross]=useState(false);const[result,setResult]=useState(null);const[done,setDone]=useState(false);
  if(user.role!=="TM")return <div style={{textAlign:"center",padding:60,color:T.mute}}><div style={{fontSize:40,marginBottom:12}}>🔒</div><div style={{fontSize:14,fontWeight:700,color:T.text}}>Only TM / City Head can raise payments.</div></div>;
  const selApp=apps.find(a=>a.id===appId);const selDealer=selApp?dealers.find(d=>d.id===selApp.dealerId):null;const selCounter=selApp?counters.find(ct=>ct.id===selApp.counterId):null;const selRA=selApp?ALL_USERS.find(u=>u.id===selApp.raId):null;const walBal=selApp?raWalBal(selApp.raId,apps):0;const avail=selApp?selApp.otherCharges-selApp.splitReleased:0;
  const dealerPayees=selApp?payees.filter(p=>p.status==="Active"&&p.fluxStatus==="Validated"&&p.dealerIds&&p.dealerIds.includes(selApp.dealerId)):[];
  const selPayee=payees.find(p=>p.id===payeeId);const isCross=selPayee&&selApp&&!selPayee.dealerIds.includes(selApp.dealerId);
  const base=selApp?selApp.quote-(selApp.serviceCharge+selApp.challan+selApp.estRefurb):0;
  const calcInc=selApp?Math.min((configs.NONGS_RATE/100)*base,configs.NONGS_CAP):0;
  useEffect(()=>{if(type==="Incentive"&&selApp&&selApp.gsType==="Non-GS")setAmount(String(Math.round(calcInc)));else if(type!=="Incentive")setAmount("");},[type,appId]);
  const amtErr=type==="Split"&&Number(amount)>avail?`Exceeds bucket (${fmt(avail)} available)`:"";const walErr=type==="Split"&&walBal<=0?"RA wallet is zero — split blocked":"";
  function preview(){if(!appId||!type||!amount||!reason||!payeeId){alert("Fill all required fields");return;}if(!selApp.stockIn){alert("Stock-In not complete");return;}setResult(autoApprove({type,amount:Number(amount)},selApp,configs));setStep(1);}
  function submit(){const amt=Number(amount);const newReq={id:`PR${uid()}`,appId,payeeId,raId:selApp.raId,type,amount:amt,status:result.ok?"Auto-Approved":result.route.includes("Finance")||result.route.includes("Ops")?"Submitted":"BH Review",createdBy:"TM",createdAt:now(),reason,rejectionReason:null,bhEdited:false,originalAmount:amt,utr:result.ok?`UTR${Math.floor(Math.random()*9e8+1e8)}`:null,crossDealerFlag:isCross||false};if(result.ok&&type==="Split")setApps(prev=>prev.map(a=>a.id===appId?{...a,splitReleased:a.splitReleased+amt}:a));setPayoutRequests(p=>[...p,newReq]);setDone(true);setTimeout(()=>{setDone(false);setStep(0);setAppId("");setPayeeId("");setType("");setAmount("");setReason("");setAckCross(false);setResult(null);},1800);}
  if(done)return <div style={{textAlign:"center",padding:60}}><div style={{fontSize:50,marginBottom:14}}>{result&&result.ok?"✅":"📋"}</div><div style={{fontSize:16,fontWeight:800}}>{result&&result.ok?"Auto-Released!":"Submitted for Approval"}</div></div>;
  return <div>
    <StepBar steps={["Configure","Review & Submit"]} cur={step}/>
    {step===0&&<Card>
      <ST>Select App_ID</ST>
      <Sel value={appId} onChange={v=>{setAppId(v);setPayeeId("");setType("");}} options={apps.map(a=>({value:a.id,label:`${a.id} — ${a.vehicle}`}))} placeholder="Choose App_ID..." required/>
      {selApp&&<>
        <div style={{background:T.accentL,borderRadius:9,padding:12,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:800,color:T.accent,marginBottom:8}}>AUTO-FILLED FROM CARS24 ADMIN PANEL</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {[["Dealer",selDealer&&selDealer.name],["Code",selDealer&&selDealer.code],["Counter",selCounter&&selCounter.name],["City",selCounter&&selCounter.city],["UCM Name",selCounter&&selCounter.ucmName],["UCM Mobile",selCounter&&selCounter.ucmMobile],["RA",selRA&&selRA.name],["GS Type",selApp.gsType]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,color:T.accent,fontWeight:700,marginBottom:1}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800,wordBreak:"break-word"}}>{v||"—"}</div></div>)}
          </div>
        </div>
        {!selApp.stockIn&&<Alrt type="error">Stock-In not complete — payouts blocked.</Alrt>}
        <Sel label="Payout Type" value={type} onChange={setType} options={[{value:"Split",label:"Split Payment (Other Charges bucket)"},{value:"Incentive",label:"Incentive"}]} placeholder="Select type..." required/>
        {type==="Split"&&<WalletDrillDown apps={apps} dealers={dealers} raId={selApp.raId} walBal={walBal} avail={avail} currentAppId={appId}/>}
        {type&&<><Sel label="Payee (linked to this dealer)" value={payeeId} onChange={setPayeeId} options={dealerPayees.map(p=>({value:p.id,label:`${p.payeeName} — ${p.bank} · ${p.fluxStatus}`}))} placeholder="Select payee..." required/>{dealerPayees.length===0&&<Alrt type="warning">No active payees linked to this dealer. Ask RA/RM to submit a SAP request.</Alrt>}
        {type==="Incentive"&&selApp.gsType==="Non-GS"&&<div style={{background:T.successL,borderRadius:8,padding:10,marginBottom:10}}><Lbl color={T.success}>Non-GS Calculation</Lbl><Row label="Base Amount" value={fmt(base)}/><Row label={`${configs.NONGS_RATE}% of Base`} value={fmt((configs.NONGS_RATE/100)*base)}/><Row label="Cap" value={fmt(configs.NONGS_CAP)}/><Row label="Pre-filled" value={fmt(calcInc)}/></div>}
        <Fld label="Amount (₹)" value={amount} onChange={setAmount} type="number" required hint={type==="Split"?`Bucket: ${fmt(avail)}`:""} error={amtErr||walErr}/>
        <Fld label="Reason / Remarks" value={reason} onChange={setReason} required/></>}
      </>}

    </Card>}
    {step===1&&result&&<>
      <Card style={{marginBottom:12,border:`1.5px solid ${result.ok?"#BBF7D0":result.route==="BLOCKED"?"#FECACA":"#FDE68A"}`}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}><div style={{fontSize:36}}>{result.ok?"✅":result.route==="BLOCKED"?"🚫":"🔀"}</div><div><div style={{fontSize:15,fontWeight:900,color:result.ok?T.success:result.route==="BLOCKED"?T.danger:T.warn}}>{result.route}</div><div style={{fontSize:12,color:T.mid,marginTop:2}}>{result.reason}</div></div></div>
      </Card>
      <Card style={{marginBottom:12}}><Lbl>Summary</Lbl>{[["App_ID",appId],["Dealer",selDealer&&selDealer.name],["Counter",selCounter&&selCounter.name],["UCM",selCounter&&selCounter.ucmName],["RA",selRA&&selRA.name],["Type",type],["Amount",fmt(amount)],["Payee",selPayee&&selPayee.payeeName],["Reason",reason]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}</Card>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="secondary" onClick={()=>setStep(0)}>← Edit</Btn><Btn v={result.route==="BLOCKED"?"secondary":result.ok?"success":"primary"} disabled={result.route==="BLOCKED"} onClick={submit}>{result.ok?"✓ Confirm & Release":"Submit for Approval"}</Btn></div>
    </>}
  </div>;
}

    {req&&app&&<Card style={{marginTop:12,border:`1.5px solid ${T.accent}`}}>

      {showRej&&<div style={{padding:12,background:T.dangerL,borderRadius:8,marginTop:8}}><Fld label="Rejection Reason *" value={rejectReason} onChange={setRejectReason}/><div style={{display:"flex",gap:8}}><Btn v="danger" sm onClick={reject}>Confirm Reject</Btn><Btn v="ghost" sm onClick={()=>setShowRej(false)}>Cancel</Btn></div></div>}
      {!showRej&&<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}><Btn v="secondary" sm onClick={()=>setShowRej(true)}>Reject</Btn><Btn v="success" icon="✓" onClick={approve}>{user.role==="Finance"?"Final Approve & Release":"Approve →"}</Btn></div>}
    </Card>}
    <div style={{marginTop:14}}><Lbl>All Requests ({payoutRequests.length})</Lbl>{payoutRequests.slice().reverse().map(r=>{const rApp=apps.find(a=>a.id===r.appId);return <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${T.border}`}}><div><div style={{fontSize:12,fontWeight:700}}>{r.id} — {fmt(r.amount)}</div><div style={{fontSize:10,color:T.mute}}>{r.type} · {rApp&&rApp.vehicle}</div></div><Badge s={r.status} sm/></div>;})} </div>
  </div>;
}

function DataTransferModule({user,shared}){
  const{dealers,setDealers,counters,setCounters,apps,setApps,payees,setPayees}=shared;
  const[fromId,setFromId]=useState("");const[toId,setToId]=useState("");const[reason,setReason]=useState("");const[scope,setScope]=useState("all");const[confirmed,setConfirmed]=useState(false);const[auditLog,setAuditLog]=useState([]);
  const[mapMode,setMapMode]=useState("bulk");const[entityType,setEntityType]=useState("");const[entityId,setEntityId]=useState("");const[newVal,setNewVal]=useState("");
  if(!["Central Ops","Business Head"].includes(user.role))return <div style={{textAlign:"center",padding:60,color:T.mute}}><div style={{fontSize:40,marginBottom:10}}>🔒</div><div style={{fontSize:14,fontWeight:700}}>Central Ops & Business Head only.</div></div>;
  const ras=ALL_USERS.filter(u=>["RA","RM"].includes(u.role));const fromUser=ALL_USERS.find(u=>u.id===fromId);const toUser=ALL_USERS.find(u=>u.id===toId);
  function executeBulk(){if(!fromId||!toId||!reason||!confirmed){alert("Fill all and confirm");return;}if(fromId===toId){alert("Cannot transfer to same person");return;}if(scope==="all"||scope==="dealers")setDealers(prev=>prev.map(d=>d.raId===fromId?{...d,raId:toId}:d));if(scope==="all"||scope==="appids")setApps(prev=>prev.map(a=>a.raId===fromId?{...a,raId:toId}:a));if(scope==="all"||scope==="payees")setPayees(prev=>prev.map(p=>p.raId===fromId?{...p,raId:toId}:p));setAuditLog(p=>[...p,{id:`TXF${uid()}`,mode:"bulk",fromName:fromUser&&fromUser.name,toName:toUser&&toUser.name,scope,reason,executedBy:user.role,at:now()}]);alert(`✓ Transfer done!`);setFromId("");setToId("");setReason("");setConfirmed(false);}
  function executeEntity(){if(!entityType||!entityId||!reason){alert("Fill all fields");return;}let desc="";if(entityType==="dealer_ra"){setDealers(prev=>prev.map(d=>d.id===entityId?{...d,raId:newVal}:d));desc=`Dealer ${entityId} → RA ${newVal}`;}if(entityType==="app_ra"){setApps(prev=>prev.map(a=>a.id===entityId?{...a,raId:newVal}:a));desc=`App_ID ${entityId} → RA ${newVal}`;}if(entityType==="payee_dealer"){setPayees(prev=>prev.map(p=>p.id===entityId?{...p,dealerIds:p.dealerIds.includes(newVal)?p.dealerIds:[...p.dealerIds,newVal]}:p));desc=`Payee ${entityId} added dealer ${newVal}`;}if(entityType==="counter_dealer"){setCounters(prev=>prev.map(c=>c.id===entityId?{...c,dealerId:newVal}:c));desc=`Counter ${entityId} → Dealer ${newVal}`;}setAuditLog(p=>[...p,{id:`TXF${uid()}`,mode:"entity",desc,reason,executedBy:user.role,at:now()}]);alert(`✓ Re-mapping applied`);setEntityType("");setEntityId("");setNewVal("");setReason("");}
  return <div>
    <Alrt type="warning">All changes are permanently audit-logged. Central Ops & BH have full access.</Alrt>
    <div style={{display:"flex",gap:8,marginBottom:12}}><Btn v={mapMode==="bulk"?"primary":"secondary"} sm onClick={()=>setMapMode("bulk")}>Bulk Transfer</Btn><Btn v={mapMode==="entity"?"primary":"secondary"} sm onClick={()=>setMapMode("entity")}>Single Entity Re-map</Btn></div>
    {mapMode==="bulk"&&<Card style={{marginBottom:12}}>
      <ST>Bulk Data Transfer</ST>
      <G2><Sel label="Transfer FROM" value={fromId} onChange={v=>{setFromId(v);setConfirmed(false);}} options={ras.map(u=>({value:u.id,label:`${u.name} (${u.role})`}))} placeholder="Select..." required/><Sel label="Transfer TO" value={toId} onChange={v=>{setToId(v);setConfirmed(false);}} options={ras.filter(u=>u.id!==fromId).map(u=>({value:u.id,label:`${u.name} (${u.role})`}))} placeholder="Select..." required/></G2>
      <Sel label="Scope" value={scope} onChange={v=>{setScope(v);setConfirmed(false);}} options={[{value:"all",label:"All data (dealers + App_IDs + payees)"},{value:"dealers",label:"Dealers only"},{value:"appids",label:"App_IDs only"},{value:"payees",label:"Payees only"}]}/>
      <Fld label="Reason *" value={reason} onChange={setReason} required placeholder="e.g. RA resigned"/>
      {fromId&&toId&&<div style={{background:"#F7F9FC",borderRadius:8,padding:10,marginBottom:10}}><Lbl>Preview</Lbl><Row label="Dealers to transfer" value={dealers.filter(d=>d.raId===fromId).length}/><Row label="App_IDs to transfer" value={apps.filter(a=>a.raId===fromId).length}/></div>}
      <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer"}}><input type="checkbox" checked={confirmed} onChange={e=>setConfirmed(e.target.checked)}/><span style={{fontSize:12,color:T.danger,fontWeight:700}}>I confirm this is authorised and permanent</span></label>
      <Btn v="danger" icon="⚡" disabled={!fromId||!toId||!reason||!confirmed} onClick={executeBulk}>Execute Bulk Transfer</Btn>
    </Card>}
    {mapMode==="entity"&&<Card style={{marginBottom:12}}>
      <ST>Single Entity Re-mapping</ST>
      <Sel label="Mapping Type" value={entityType} onChange={v=>{setEntityType(v);setEntityId("");setNewVal("");}} options={[{value:"dealer_ra",label:"Change Dealer → RA mapping"},{value:"app_ra",label:"Change App_ID → RA mapping"},{value:"counter_dealer",label:"Change Counter → Dealer mapping"},{value:"payee_dealer",label:"Add Dealer to Payee"}]} placeholder="Select type..."/>
      {entityType==="dealer_ra"&&<><Sel label="Select Dealer" value={entityId} onChange={setEntityId} options={dealers.map(d=>({value:d.id,label:d.name}))} placeholder="Select dealer..."/><Sel label="New RA" value={newVal} onChange={setNewVal} options={ALL_USERS.filter(u=>u.role==="RA").map(u=>({value:u.id,label:u.name}))} placeholder="Select new RA..."/></>}
      {entityType==="app_ra"&&<><Sel label="Select App_ID" value={entityId} onChange={setEntityId} options={apps.map(a=>({value:a.id,label:`${a.id} — ${a.vehicle}`}))} placeholder="Select App_ID..."/><Sel label="New RA" value={newVal} onChange={setNewVal} options={ALL_USERS.filter(u=>u.role==="RA").map(u=>({value:u.id,label:u.name}))} placeholder="Select new RA..."/></>}
      {entityType==="counter_dealer"&&<><Sel label="Select Counter" value={entityId} onChange={setEntityId} options={counters.map(c=>({value:c.id,label:c.name}))} placeholder="Select counter..."/><Sel label="New Dealer" value={newVal} onChange={setNewVal} options={dealers.filter(d=>d.status==="Active").map(d=>({value:d.id,label:d.name}))} placeholder="Select new dealer..."/></>}
      {entityType==="payee_dealer"&&<><Sel label="Select Payee" value={entityId} onChange={setEntityId} options={payees.map(p=>({value:p.id,label:p.payeeName}))} placeholder="Select payee..."/><Sel label="Add Dealer" value={newVal} onChange={setNewVal} options={dealers.filter(d=>d.status==="Active").map(d=>({value:d.id,label:d.name}))} placeholder="Select dealer..."/></>}
      {entityType&&<Fld label="Reason *" value={reason} onChange={setReason} required/>}
      <Btn v="warning" icon="⚡" disabled={!entityType||!entityId||!newVal||!reason} onClick={executeEntity}>Apply Re-mapping</Btn>
    </Card>}
    {auditLog.length>0&&<Card><Lbl>Audit Log ({auditLog.length})</Lbl>{auditLog.slice().reverse().map(e=><div key={e.id} style={{padding:"7px 0",borderBottom:`1px solid ${T.border}`}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:700}}>{e.mode==="bulk"?`${e.fromName} → ${e.toName}`:e.desc}</span><span style={{fontSize:10,color:T.mute}}>{e.at}</span></div><div style={{fontSize:11,color:T.mute}}>Reason: {e.reason} · By: {e.executedBy}</div></div>)}</Card>}
  </div>;
}
