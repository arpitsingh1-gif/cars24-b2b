// ═══════════════════════════════════════════════
// STAGE MARKING MODULE (RA/RM + Ops/TM view)
// ═══════════════════════════════════════════════
function StageModule({user,shared}){
  const{apps,setApps,leads,setLeads,dealers,counters}=shared;
  const[selAppId,setSelAppId]=useState("");const[activeStage,setActiveStage]=useState(null);const[form,setForm]=useState({});const[showConfirm,setShowConfirm]=useState(false);
  const isOps=["TM","Central Ops","Business Head"].includes(user.role);
  let raIds=[user.id];if(user.role==="RM"&&user.raIds)raIds=[user.id,...user.raIds];
  const myApps=isOps?apps:apps.filter(a=>raIds.includes(a.raId));
  const selApp=apps.find(a=>a.id===selAppId);
  const selDealer=selApp?dealers.find(d=>d.id===selApp.dealerId):null;
  const selCounter=selApp?counters.find(c=>c.id===selApp.counterId):null;
  const lead=selApp?leads.find(l=>l.appId===selApp.id):null;
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const stages=[
    {id:"inspection",label:"Inspection Done",icon:"🔍",doneKey:"inspectionDone",atKey:"inspectionAt",color:"#5B21B6",bg:"#F5F3FF",
     fields:[{k:"inspectionNotes",l:"Inspection Notes / Remarks",ph:"e.g. Clean car, AC works fine, minor tyre wear"}]},
    {id:"token",label:"Token Done",icon:"🤝",doneKey:"tokenDone",atKey:"tokenAt",color:"#065F46",bg:"#ECFDF5",
     fields:[{k:"tokenAmount",l:"Token Amount (₹)",type:"number",ph:"e.g. 5000"},{k:"tokenNotes",l:"Token Notes",ph:"e.g. Cheque received"}]},
    {id:"si",label:"Stock-In (SI) Done",icon:"✅",doneKey:"siDone",atKey:"siAt",color:"#0F4C81",bg:"#EBF4FF",
     fields:[{k:"siOtherCharges",l:"Other Charges (₹)",type:"number",ph:"e.g. 18000"},{k:"siGsType",l:"GS Type",type:"sel",opts:["GS","Non-GS"]},{k:"siServiceCharge",l:"Service Charge (₹)",type:"number",ph:"optional override"},{k:"siChallan",l:"Challan (₹)",type:"number",ph:"optional"},{k:"siEstRefurb",l:"Est. Refurb (₹)",type:"number",ph:"optional"},{k:"siNotes",l:"SI Notes",ph:"e.g. All docs verified"}]},
  ];

  function openStage(stageId){
    if(!selAppId){alert("Select an App_ID first");return;}
    const st=stages.find(s=>s.id===stageId);
    if(selApp[st.doneKey]){if(!window.confirm("This stage is already marked. Re-mark / update?"))return;}
    const prefill={};st.fields.forEach(f=>{if(selApp[f.k]!==undefined)prefill[f.k]=String(selApp[f.k]);});
    setForm(prefill);setActiveStage(stageId);setShowConfirm(false);
  }

  function saveStage(){
    const st=stages.find(s=>s.id===activeStage);const nowTs=new Date().toLocaleString("en-IN",{hour12:false}).slice(0,16);
    const updates={[st.doneKey]:true,[st.atKey]:nowTs};
    st.fields.forEach(f=>{updates[f.k]=f.type==="number"?Number(form[f.k]||0):(form[f.k]||"");});
    // if SI marked, update stock-in, otherCharges, gsType on the app
    if(activeStage==="si"){
      updates.stockIn=true;
      if(form.siOtherCharges)updates.otherCharges=Number(form.siOtherCharges);
      if(form.siGsType)updates.gsType=form.siGsType;
      if(form.siServiceCharge)updates.serviceCharge=Number(form.siServiceCharge);
      if(form.siChallan)updates.challan=Number(form.siChallan);
      if(form.siEstRefurb)updates.estRefurb=Number(form.siEstRefurb);
    }
    setApps(prev=>prev.map(a=>a.id===selAppId?{...a,...updates}:a));
    // also update linked lead status
    const leadStatus=activeStage==="inspection"?"Inspection Done":activeStage==="token"?"Token Done":"App_ID Created";
    setLeads(prev=>prev.map(l=>l.appId===selAppId?{...l,status:activeStage==="si"?"App_ID Created":leadStatus}:l));
    setActiveStage(null);setForm({});
    alert("✓ Stage marked! Lead status and App_ID updated.");
  }

  const stageColor={inspection:{c:"#5B21B6",bg:"#F5F3FF"},token:{c:"#065F46",bg:"#ECFDF5"},si:{c:"#0F4C81",bg:"#EBF4FF"}};

  return <div>
    <Alrt type="info">Select any App_ID to mark/update stage milestones. SI marking updates stockIn flag, wallet, and GS type in real time.</Alrt>
    <Card style={{marginBottom:14}}>
      <ST>Select App_ID</ST>
      <Sel value={selAppId} onChange={v=>{setSelAppId(v);setActiveStage(null);setForm({});}} options={myApps.map(a=>{const d=dealers.find(dd=>dd.id===a.dealerId);return{value:a.id,label:`${a.id} — ${a.vehicle} (${d?d.name:""})`};})} placeholder="Choose App_ID..."/>
      {selApp&&<>
        <div style={{background:T.accentL,borderRadius:9,padding:12,marginTop:10}}>
          <div style={{fontSize:10,fontWeight:800,color:T.accent,marginBottom:6}}>APP_ID DETAILS</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {[["Vehicle",selApp.vehicle],["Reg. No.",selApp.regNo],["Dealer",selDealer&&selDealer.name],["Counter",selCounter&&selCounter.name],["UCM",selCounter&&selCounter.ucmName],["GS Type",selApp.gsType],["Quote",fmt(selApp.quote)],["Wallet",fmt(selApp.otherCharges-selApp.splitReleased)]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,color:T.accent,fontWeight:700}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800,wordBreak:"break-word"}}>{v||"—"}</div></div>)}
          </div>
        </div>
        {lead&&<div style={{marginTop:8,fontSize:11,color:T.mid}}>Linked Lead: <strong>{lead.id}</strong> · Status: <Badge s={lead.status} sm/></div>}
      </>}
    </Card>

    {selApp&&<>
      <Lbl>Stage Timeline</Lbl>
      <div style={{position:"relative",marginBottom:14}}>
        <div style={{position:"absolute",left:18,top:0,bottom:0,width:2,background:T.border,zIndex:0}}/>
        {stages.map((st,i)=>{const done=selApp[st.doneKey];const at=selApp[st.atKey];const sc=stageColor[st.id];return <div key={st.id} style={{display:"flex",gap:12,marginBottom:12,position:"relative",zIndex:1}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:done?sc.bg:"#F1F5F9",border:`2px solid ${done?sc.c:T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{done?st.icon:"○"}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <div><span style={{fontSize:13,fontWeight:800,color:done?sc.c:T.mute}}>{st.label}</span>{done&&<span style={{marginLeft:6,fontSize:10,color:T.mute}}>· {at}</span>}</div>
              <Btn sm v={done?"secondary":"primary"} onClick={()=>openStage(st.id)}>{done?"Update":"Mark Done"}</Btn>
            </div>
            {done&&st.id==="inspection"&&selApp.inspectionNotes&&<div style={{fontSize:11,color:T.mid,background:sc.bg,borderRadius:6,padding:"4px 8px"}}>{selApp.inspectionNotes}</div>}
            {done&&st.id==="token"&&<div style={{fontSize:11,color:T.mid,background:sc.bg,borderRadius:6,padding:"4px 8px"}}>Token: {fmt(selApp.tokenAmount||0)}{selApp.tokenNotes?` · ${selApp.tokenNotes}`:""}</div>}
            {done&&st.id==="si"&&<div style={{fontSize:11,color:T.mid,background:sc.bg,borderRadius:6,padding:"4px 8px"}}>Other Charges: {fmt(selApp.siOtherCharges||0)} · GS: {selApp.siGsType}{selApp.siNotes?` · ${selApp.siNotes}`:""}</div>}
          </div>
        </div>;})}
      </div>

      {activeStage&&<Card style={{border:`1.5px solid ${stageColor[activeStage].c}`,background:stageColor[activeStage].bg+"44"}}>
        <ST>{stages.find(s=>s.id===activeStage).icon} {stages.find(s=>s.id===activeStage).label}</ST>
        {activeStage==="si"&&<Alrt type="info">Marking SI Done will set stockIn=true on this App_ID, unlock the wallet, and update GS type. RA will see wallet as available immediately.</Alrt>}
        {stages.find(s=>s.id===activeStage).fields.map(fld=>fld.type==="sel"?<Sel key={fld.k} label={fld.l} value={form[fld.k]||""} onChange={v=>f(fld.k,v)} options={fld.opts} placeholder="Select..."/>:<Fld key={fld.k} label={fld.l} value={form[fld.k]||""} onChange={v=>f(fld.k,v)} type={fld.type||"text"} placeholder={fld.ph}/>)}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}><Btn v="secondary" sm onClick={()=>{setActiveStage(null);setForm({});}}>Cancel</Btn><Btn v="success" icon="✓" onClick={saveStage}>Confirm & Save</Btn></div>
      </Card>}
    </>}
  </div>;
}

// ═══════════════════════════════════════════════
// COUNTER/UCM OVERRIDE MODULE (TM / Central Ops / BH)
// ═══════════════════════════════════════════════
function CounterUCMOverride({user,shared}){
  const{apps,setApps,counters,dealers}=shared;
  const canAccess=["TM","Central Ops","Business Head"].includes(user.role);
  if(!canAccess)return <div style={{textAlign:"center",padding:60,color:T.mute}}><div style={{fontSize:40,marginBottom:10}}>🔒</div><div style={{fontSize:14,fontWeight:700}}>TM, Central Ops & BH only.</div></div>;

  const[selAppId,setSelAppId]=useState("");
  const[newDealerId,setNewDealerId]=useState("");
  const[newCounterId,setNewCounterId]=useState("");
  const[reason,setReason]=useState("");
  const[log,setLog]=useState([]);
  const[flash,setFlash]=useState(false);

  const selApp=apps.find(a=>a.id===selAppId);
  const currentDealer=selApp?dealers.find(d=>d.id===selApp.dealerId):null;
  const currentCounter=selApp?counters.find(c=>c.id===selApp.counterId):null;

  // When app changes, reset dealer/counter selection
  const handleAppChange=v=>{setSelAppId(v);setNewDealerId("");setNewCounterId("");};
  // When dealer changes, reset counter
  const handleDealerChange=v=>{setNewDealerId(v);setNewCounterId("");};

  const targetDealer=newDealerId?dealers.find(d=>d.id===newDealerId):null;
  // counters for the newly selected dealer only
  const dealerCounters=newDealerId?counters.filter(c=>c.dealerId===newDealerId&&c.status==="Active"):[];
  const newCounter=counters.find(c=>c.id===newCounterId);

  function applyOverride(){
    if(!selAppId||!newDealerId||!newCounterId||!reason){alert("Select App_ID, Dealer, Counter and enter a reason");return;}
    const entry={
      id:`OVR${Math.random().toString(36).slice(2,7).toUpperCase()}`,
      appId:selAppId,vehicle:selApp.vehicle,
      prevDealer:currentDealer&&currentDealer.name,prevCounter:currentCounter&&currentCounter.name,prevUCM:currentCounter&&currentCounter.ucmName,
      newDealer:targetDealer&&targetDealer.name,newCounter:newCounter&&newCounter.name,newUCM:newCounter&&newCounter.ucmName,
      reason,by:user.role,at:new Date().toLocaleString("en-IN",{hour12:false}).slice(0,16)
    };
    setApps(prev=>prev.map(a=>a.id===selAppId?{...a,dealerId:newDealerId,counterId:newCounterId}:a));
    setLog(p=>[entry,...p]);
    setFlash(true);setTimeout(()=>{setFlash(false);setSelAppId("");setNewDealerId("");setNewCounterId("");setReason("");},1500);
  }

  if(flash)return <div style={{textAlign:"center",padding:60}}><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontSize:15,fontWeight:800}}>Dealer, Counter & UCM Updated!</div><div style={{fontSize:12,color:T.mute,marginTop:4}}>All payout & lead references now use the new mapping</div></div>;

  return <div>
    <Alrt type="warning">Changes Dealer + Counter + UCM on any App_ID. All payout auto-fills, lead details and approval views will reflect the new mapping immediately.</Alrt>
    <Card style={{marginBottom:14}}>
      <ST>Step 1 — Select App_ID</ST>
      <Sel value={selAppId} onChange={handleAppChange} options={apps.map(a=>{const d=dealers.find(dd=>dd.id===a.dealerId);return{value:a.id,label:`${a.id} — ${a.vehicle} (${d?d.name:""})`};})} placeholder="Choose App_ID..." label="App_ID"/>
      {selApp&&<div style={{background:T.accentL,borderRadius:9,padding:12,marginTop:8}}>
        <div style={{fontSize:10,fontWeight:800,color:T.accent,marginBottom:6}}>CURRENT MAPPING</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {[["Dealer",currentDealer&&currentDealer.name],["Dealer Code",currentDealer&&currentDealer.code],["Counter",currentCounter&&currentCounter.name],["UCM Name",currentCounter&&currentCounter.ucmName],["UCM Mobile",currentCounter&&currentCounter.ucmMobile],["City",currentCounter&&currentCounter.city]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,color:T.accent,fontWeight:700}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800}}>{v||"—"}</div></div>)}
        </div>
      </div>}
    </Card>

    {selApp&&<Card style={{marginBottom:14}}>
      <ST>Step 2 — Select New Dealer</ST>
      <Sel label="New Dealer" value={newDealerId} onChange={handleDealerChange} options={dealers.filter(d=>d.status==="Active").map(d=>({value:d.id,label:`${d.name} (${d.code}) — ${d.city}`}))} placeholder="Select dealer..."/>
      {newDealerId&&dealerCounters.length===0&&<Alrt type="warning">No active counters for this dealer. Approve a counter request first.</Alrt>}
      {newDealerId&&dealerCounters.length>0&&<>
        <ST>Step 3 — Select Counter & UCM</ST>
        <Sel label="Counter" value={newCounterId} onChange={setNewCounterId} options={dealerCounters.map(c=>({value:c.id,label:`${c.name} — UCM: ${c.ucmName} (${c.city})`}))} placeholder="Select counter..."/>
        {newCounter&&<div style={{background:T.successL,border:"1px solid #BBF7D0",borderRadius:9,padding:12,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:800,color:T.success,marginBottom:6}}>NEW MAPPING PREVIEW</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {[["Dealer",targetDealer&&targetDealer.name],["Counter",newCounter.name],["UCM Name",newCounter.ucmName],["UCM Mobile",newCounter.ucmMobile],["City",newCounter.city]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,color:T.success,fontWeight:700}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800}}>{v||"—"}</div></div>)}
          </div>
          {newDealerId!==selApp.dealerId&&<div style={{fontSize:10,color:T.orange,fontWeight:700,marginTop:6}}>⚠ Dealer is changing — this will also update the App_ID's dealer mapping</div>}
        </div>}
        <Fld label="Reason / Note *" value={reason} onChange={setReason} placeholder="e.g. Admin mapped to different counter, testing UCM scenario" required/>
        <Btn full v="primary" icon="⚡" disabled={!newCounterId||!reason} onClick={applyOverride}>Apply Override</Btn>
      </>}
    </Card>}

    {log.length>0&&<Card><Lbl>Override History ({log.length})</Lbl>{log.map(e=><div key={e.id} style={{padding:"9px 0",borderBottom:`1px solid ${T.border}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:12,fontWeight:800}}>{e.appId} — {e.vehicle}</span><span style={{fontSize:10,color:T.mute}}>{e.at}</span></div><div style={{fontSize:11,color:T.mid}}>From dealer: <b>{e.prevDealer}</b> / {e.prevCounter} (UCM: {e.prevUCM})</div><div style={{fontSize:11,color:T.success,fontWeight:700}}>→ {e.newDealer} / {e.newCounter} (UCM: {e.newUCM})</div><div style={{fontSize:10,color:T.mute,marginTop:2}}>Reason: {e.reason} · By: {e.by}</div></div>)}</Card>}
  </div>;
}

function RoleGuide({user,onClose}){
  const[tab,setTab]=useState(0);
  const g=ROLE_GUIDES[user.role]||ROLE_GUIDES["RA"];
  const step=g.steps[Math.min(tab,g.steps.length-1)];
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9500,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
    <div style={{width:"100%",maxWidth:520,background:"#fff",borderRadius:"20px 20px 0 0",maxHeight:"88vh",overflowY:"auto",paddingBottom:32}}>
      <div style={{background:"linear-gradient(135deg,"+g.color+"dd,"+g.color+")",padding:"16px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.65)",fontWeight:800,marginBottom:2,letterSpacing:1}}>HOW TO USE THIS SIMULATION</div>
          <div style={{color:"#fff",fontSize:15,fontWeight:900}}>{g.icon} {g.title}</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>x</button>
      </div>
      <div style={{padding:"8px 18px",background:g.bg,borderBottom:"1px solid "+g.color+"22",fontSize:12,color:g.color,fontWeight:600,lineHeight:1.5}}>{g.desc}</div>
      <div style={{background:"#FEF2F2",padding:"7px 18px",fontSize:10,color:"#7F1D1D",fontWeight:700,borderBottom:"1px solid #FECACA"}}>Simulation only — no real payments. Switch roles via top-right dropdown to test every perspective.</div>
      <div style={{display:"flex",overflowX:"auto",padding:"10px 12px 0",gap:6,borderBottom:"1px solid "+T.border,WebkitOverflowScrolling:"touch"}}>
        {g.steps.map(function(s,i){return <button key={i} onClick={function(){setTab(i);}} style={{flexShrink:0,padding:"5px 10px",borderRadius:20,border:"1.5px solid "+(tab===i?g.color:T.border),background:tab===i?g.bg:"#fff",color:tab===i?g.color:T.mute,cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap",marginBottom:8}}>{s.icon} {s.title}</button>;})}

        <div style={{fontSize:13,color:T.mid,lineHeight:1.7}}>{step.body}</div>
      </div>
      <div style={{padding:"0 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:11,color:T.mute}}>{tab+1} / {g.steps.length}</div>
        <div style={{display:"flex",gap:8}}>
          {tab>0?<Btn v="secondary" sm onClick={function(){setTab(function(t){return t-1;});}}>Back</Btn>:null}
          {tab<g.steps.length-1?<Btn sm onClick={function(){setTab(function(t){return t+1;});}}>Next</Btn>:<Btn v="success" sm onClick={onClose}>Got it!</Btn>}
        </div>
      </div>
    </div>
  </div>;
}

      {raApps.map(a=>{const d=dealers.find(dd=>dd.id===a.dealerId);const bal=a.otherCharges-a.splitReleased;const isCurrent=a.id===currentAppId;return <div key={a.id} style={{padding:"8px 12px",borderTop:`1px solid ${T.border}`,display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",alignItems:"center",background:isCurrent?T.accentL:"#fff"}}>
        <div><div style={{fontSize:11,fontWeight:isCurrent?800:600,color:isCurrent?T.accent:T.text}}>{a.id}</div><div style={{fontSize:9,color:T.mute}}>{a.vehicle}{d?` · ${d.name}`:""}</div></div>
        <div style={{textAlign:"right",fontSize:11,fontWeight:600}}>{fmt(a.otherCharges)}</div>
        <div style={{textAlign:"right",fontSize:11,fontWeight:600,color:T.mute}}>{fmt(a.splitReleased)}</div>
        <div style={{textAlign:"right",fontSize:12,fontWeight:800,color:bal>0?T.accent:T.danger}}>{fmt(bal)}</div>
      </div>;})}
      {raApps.length===0&&<div style={{padding:16,textAlign:"center",color:T.mute,fontSize:11}}>No App_IDs with available balance</div>}
    </div>}
  </div>;
}

    <div style={{background:"linear-gradient(135deg,#0D1B2A 0%,#162D44 50%,#1B3A5C 100%)",padding:"0 20px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 24px rgba(0,0,0,0.2),0 1px 4px rgba(0,0,0,0.1)",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{background:"#fff",borderRadius:10,padding:"4px 10px",boxShadow:"0 2px 12px rgba(69,53,241,0.15)",display:"flex",alignItems:"center"}}><img src={C24_LOGO} alt="Cars24" style={{height:28,objectFit:"contain"}}/></div>
        <div style={{borderLeft:"1px solid rgba(255,255,255,0.1)",paddingLeft:14}}>
          <div style={{color:"#fff",fontSize:14,fontWeight:800,letterSpacing:0.4}}>B2B Procurement</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,fontWeight:600,letterSpacing:0.5,marginTop:1}}>{TITLES[activePage]||"Dashboard"}</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{textAlign:"right"}}>
          <div style={{color:"#fff",fontSize:12,fontWeight:700}}>{user.name}</div>
          <div style={{fontSize:9,padding:"3px 10px",borderRadius:12,background:`${roleColor}18`,color:roleColor,fontWeight:800,marginTop:2,textAlign:"center",border:`1px solid ${roleColor}30`,letterSpacing:0.5}}>{user.role}</div>
        </div>
        <div style={{width:38,height:38,borderRadius:13,background:"linear-gradient(135deg,#4535F1,#6558F5)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:14,boxShadow:"0 4px 12px rgba(69,53,241,0.3),0 0 0 2px rgba(69,53,241,0.1)",border:"2px solid rgba(255,255,255,0.1)"}}>{user.name.charAt(0)}</div>
        <button onClick={()=>setGuideOpen(true)} title="Show guide" style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:11,padding:"7px 13px",color:"#6558F5",cursor:"pointer",fontSize:14,fontWeight:900,fontFamily:"inherit",transition:"all 0.25s",backdropFilter:"blur(8px)"}}>?</button>
        <select value={userId} onChange={e=>setUserId(e.target.value)} style={{background:"rgba(255,255,255,0.06)",color:"#fff",border:"1px solid rgba(255,255,255,0.12)",borderRadius:11,padding:"7px 12px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",outline:"none",maxWidth:155,backdropFilter:"blur(8px)",transition:"all 0.25s"}}>
          <optgroup label="── Field Team ──" style={{color:"#0D1B2A"}}>
            {ALL_USERS.filter(u=>isFieldRole(u.role)).map(u=><option key={u.id} value={u.id} style={{color:"#0D1B2A"}}>{u.name} ({u.role})</option>)}
          </optgroup>
          <optgroup label="── Ops / Management ──" style={{color:"#0D1B2A"}}>
            {ALL_USERS.filter(u=>isOpsRole(u.role)).map(u=><option key={u.id} value={u.id} style={{color:"#0D1B2A"}}>{u.name} ({u.role})</option>)}
          </optgroup>
        </select>
      </div>
    </div>

    {/* SIMULATION BANNER */}
    <div style={{background:"linear-gradient(90deg,#4535F1 0%,#6558F5 50%,#3428C9 100%)",padding:"5px 0",textAlign:"center",flexShrink:0,boxShadow:"0 2px 8px rgba(69,53,241,0.2)"}}><span style={{fontSize:9,fontWeight:800,color:"#fff",letterSpacing:1.5,textTransform:"uppercase"}}>✦ SIMULATION — NO REAL PAYOUTS · SHARED STATE — ALL ROLES SEE SAME DATA ✦</span></div>

    {/* DESKTOP SIDEBAR + MAIN */}
    <div className="desktop-only" style={{flex:1,display:"flex",minHeight:0}}>
      {/* Sidebar — Dark themed with blue accents */}
      <div style={{width:240,background:"linear-gradient(180deg,#0D1B2A 0%,#0F2132 40%,#132B42 100%)",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto",borderRight:"1px solid rgba(255,255,255,0.04)"}}>
        <nav style={{flex:1,padding:"16px 12px"}}>
          {nav.map((n,i)=>{const active=activePage===n.id;const cnt=n.badge?badges[n.badge]:0;return <button key={n.id} onClick={()=>setPage(n.id)} className={`c24-nav-item ${active?"c24-nav-active":""}`} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"11px 14px",borderRadius:12,border:"none",cursor:"pointer",background:active?"linear-gradient(135deg,rgba(69,53,241,0.12),rgba(69,53,241,0.06))":"transparent",color:active?"#6558F5":"#6B7F96",marginBottom:4,textAlign:"left",fontFamily:"inherit",animationDelay:`${i*0.03}s`}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18,filter:active?"none":"grayscale(0.3)",transition:"filter 0.25s"}}>{n.icon}</span><span style={{fontSize:12,fontWeight:active?800:500,letterSpacing:active?0.3:0,transition:"all 0.25s"}}>{n.label}</span></div>{cnt>0&&<span style={{background:"linear-gradient(135deg,#DC3545,#C82333)",color:"#fff",fontSize:8,fontWeight:900,padding:"2px 7px",borderRadius:10,minWidth:18,textAlign:"center",boxShadow:"0 2px 6px rgba(220,53,69,0.3)",animation:"pulseGlow 2s infinite"}}>{cnt}</span>}</button>;})}
        </nav>
        <div style={{padding:"12px 14px 18px",borderTop:"1px solid rgba(255,255,255,0.04)"}}><div style={{background:"linear-gradient(135deg,rgba(69,53,241,0.06),rgba(69,53,241,0.02))",border:"1px solid rgba(69,53,241,0.1)",borderRadius:12,padding:"11px 14px"}}><div style={{fontSize:9,fontWeight:800,color:"#6558F5",letterSpacing:1}}>✦ SIMULATION MODE</div><div style={{fontSize:9,color:"#5A7088",marginTop:4,lineHeight:1.5}}>Data shared across all roles in real time</div></div></div>
      </div>
      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:28,background:"linear-gradient(180deg,#F0F2F5 0%,#E8ECF1 100%)"}}>{renderPage()}</div>
    </div>

    {/* MOBILE — CONTENT + BOTTOM NAV */}
    <div className="mobile-only" style={{flex:1,flexDirection:"column",minHeight:0}}>
      <div style={{flex:1,overflowY:"auto",padding:14,paddingBottom:85}}>{renderPage()}</div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,0.92)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderTop:"1px solid rgba(0,0,0,0.06)",display:"flex",zIndex:100,overflowX:"auto",WebkitOverflowScrolling:"touch",boxShadow:"0 -4px 20px rgba(0,0,0,0.06)",padding:"2px 0 4px"}}>
        {nav.map(n=>{const active=activePage===n.id;const cnt=n.badge?badges[n.badge]:0;return <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,minWidth:52,padding:"8px 4px 6px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative",transition:"all 0.2s"}}><span style={{fontSize:19,transition:"transform 0.2s",transform:active?"scale(1.1)":"scale(1)"}}>{n.icon}</span><span style={{fontSize:8,fontWeight:active?800:600,color:active?T.accent:T.mute,whiteSpace:"nowrap",letterSpacing:active?0.3:0,transition:"all 0.2s"}}>{n.label}</span>{active&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,background:"linear-gradient(90deg,#4535F1,#6558F5)",borderRadius:3,boxShadow:"0 0 8px rgba(69,53,241,0.4)"}}/>}{cnt>0&&<div style={{position:"absolute",top:3,right:4,background:"linear-gradient(135deg,#DC3545,#C82333)",color:"#fff",fontSize:7,fontWeight:900,borderRadius:8,minWidth:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",boxShadow:"0 2px 6px rgba(220,53,69,0.3)"}}>{cnt}</div>}</button>;})}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
