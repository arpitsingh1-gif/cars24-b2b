function autoApprove(req,app,cfg){if(!app.stockIn)return{ok:false,route:"BLOCKED",reason:"Stock-In not complete"};if(req.type==="Split"){const avail=app.otherCharges-app.splitReleased;if(req.amount>avail)return{ok:false,route:"BLOCKED",reason:`Insufficient bucket. Available: ${fmt(avail)}`};if(req.amount<cfg.SPLIT_SAME_APP_GATE)return{ok:true,route:"AUTO-APPROVED",reason:`Below ${fmt(cfg.SPLIT_SAME_APP_GATE)} gate`};return{ok:false,route:"Ops Review → Finance",reason:`≥ ${fmt(cfg.SPLIT_SAME_APP_GATE)} — manual required`};}if(req.type==="Incentive"){if(app.splitReleased>0)return{ok:false,route:"Business Head",reason:"Prior split on this App_ID"};if(app.gsType==="Non-GS"){const base=app.quote-(app.serviceCharge+app.challan+app.estRefurb);const calc=Math.min((cfg.NONGS_RATE/100)*base,cfg.NONGS_CAP);if(req.amount>calc*1.01)return{ok:false,route:"Business Head",reason:`Exceeds calculated ${fmt(calc)}`};if(req.amount<=cfg.NONGS_AUTO_GATE)return{ok:true,route:"AUTO-APPROVED",reason:"Within cap & gate"};return{ok:false,route:"Business Head",reason:`Above auto-gate ${fmt(cfg.NONGS_AUTO_GATE)}`};}return{ok:false,route:"Business Head",reason:"GS incentive needs BH approval"};}return{ok:false,route:"Pending",reason:""};}

function Card({children,style={},onClick}){return <div onClick={onClick} style={{background:T.card,borderRadius:12,border:`1px solid ${T.border}`,padding:14,...style,cursor:onClick?"pointer":undefined}}>{children}</div>;}
function Lbl({children,color}){return <div style={{fontSize:9,fontWeight:800,color:color||T.mute,letterSpacing:1.1,textTransform:"uppercase",marginBottom:8}}>{children}</div>;}

function Btn({children,onClick,v="primary",disabled,sm,icon,full}){const V={primary:{bg:T.accent,c:"#fff",b:T.accent},secondary:{bg:"#fff",c:T.mid,b:T.border},success:{bg:T.success,c:"#fff",b:T.success},danger:{bg:T.danger,c:"#fff",b:T.danger},ghost:{bg:"transparent",c:T.mute,b:"transparent"},warning:{bg:T.warn,c:"#fff",b:T.warn}};const s=V[v]||V.primary;return <button onClick={onClick} disabled={disabled} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5,background:disabled?"#F1F5F9":s.bg,color:disabled?"#94A3B8":s.c,border:`1.5px solid ${disabled?T.border:s.b}`,borderRadius:8,padding:sm?"5px 11px":"9px 16px",fontSize:sm?11:12,fontWeight:700,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",width:full?"100%":undefined}}>{icon&&<span>{icon}</span>}{children}</button>;}

function Sel({label,value,onChange,options,disabled,placeholder,required}){return <div style={{marginBottom:10}}>{label&&<label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>{label}{required&&<span style={{color:T.danger}}> *</span>}</label>}<select value={value||""} onChange={e=>onChange&&onChange(e.target.value)} disabled={disabled} style={{width:"100%",padding:"9px 10px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:13,background:disabled?"#F8FAFC":"#fff",color:value?T.text:T.mute,outline:"none",fontFamily:"inherit",cursor:disabled?"not-allowed":"pointer"}}>{placeholder&&<option value="">{placeholder}</option>}{options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}</select></div>;}
function G2({children,gap=8}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap}}>{children}</div>;}
function StepBar({steps,cur}){return <div style={{display:"flex",alignItems:"center",marginBottom:14,overflowX:"auto",paddingBottom:2}}>{steps.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",flexShrink:0}}><div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:20,height:20,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,background:i<cur?T.success:i===cur?T.accent:"#E2E8F0",color:i<=cur?"#fff":T.mute}}>{i<cur?"✓":i+1}</div><span style={{fontSize:9,fontWeight:700,color:i===cur?T.accent:i<cur?T.success:T.mute,whiteSpace:"nowrap"}}>{s}</span></div>{i<steps.length-1&&<div style={{width:10,height:1,background:i<cur?T.success:T.border,margin:"0 4px"}}/>}</div>)}</div>;}
function FileInput({label,value,onChange,required,hint}){return <div style={{marginBottom:10}}>{label&&<label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>{label}{required&&<span style={{color:T.danger}}> *</span>}</label>}{hint&&<p style={{fontSize:10,color:T.mute,marginBottom:3}}>{hint}</p>}<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,border:`1.5px dashed ${value?"#10B981":T.border}`,borderRadius:8,padding:"8px 10px",background:value?T.successL:"#FAFAFA",cursor:"pointer"}} onClick={()=>{const n=prompt(`Enter filename for "${label}" (simulated upload):`);if(n)onChange(n);}}>{value?<span style={{fontSize:11,color:T.success,fontWeight:700}}>📄 {value}</span>:<span style={{fontSize:11,color:T.mute}}>Tap to upload (simulated)</span>}</div>{value&&<button onClick={()=>onChange("")} style={{background:"none",border:"none",color:T.danger,cursor:"pointer",fontSize:16,fontWeight:700}}>×</button>}</div></div>;}
function MultiDealerSel({dealers,selected,onChange}){return <div style={{marginBottom:10}}><label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:4}}>Linked Dealers <span style={{color:T.danger}}>*</span></label><div style={{border:`1.5px solid ${T.border}`,borderRadius:8,padding:8,background:"#fff",minHeight:44}}><div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:selected.length>0?5:0}}>{selected.map(id=>{const d=dealers.find(dd=>dd.id===id);return <span key={id} style={{display:"inline-flex",alignItems:"center",gap:4,background:T.accentL,color:T.accent,borderRadius:12,padding:"2px 8px",fontSize:11,fontWeight:700}}>{d?d.name:"?"}<button onClick={()=>onChange(selected.filter(x=>x!==id))} style={{background:"none",border:"none",color:T.accent,cursor:"pointer",fontSize:12,fontWeight:900}}>×</button></span>;})}</div><select value="" onChange={e=>{if(e.target.value&&!selected.includes(e.target.value))onChange([...selected,e.target.value]);}} style={{width:"100%",border:"none",outline:"none",fontSize:11,color:T.mute,background:"transparent",cursor:"pointer",fontFamily:"inherit"}}><option value="">+ Add dealer...</option>{dealers.filter(d=>d.status==="Active"&&!selected.includes(d.id)).map(d=><option key={d.id} value={d.id}>{d.name} ({d.code})</option>)}</select></div><p style={{fontSize:10,color:T.mute,marginTop:2}}>Payee will be available for payout across all selected dealers</p></div>;}
function Toast({msg,type,onDone}){useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);const bg=type==="error"?T.danger:type==="warning"?T.warn:T.success;return <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:700,zIndex:9999,boxShadow:"0 6px 24px rgba(0,0,0,0.25)",maxWidth:340,textAlign:"center",whiteSpace:"nowrap"}}>{msg}</div>;}

function RADashboard({user,shared}){
  const{apps,dealers,leads,onboarding,payoutRequests}=shared;
  let raIds=[user.id];if(user.role==="RM"&&user.raIds)raIds=[user.id,...user.raIds];
  const myLeads=leads.filter(l=>raIds.includes(l.raId));const myApps=apps.filter(a=>raIds.includes(a.raId));const myDealers=dealers.filter(d=>raIds.includes(d.raId));const myPR=payoutRequests.filter(p=>raIds.includes(p.raId));
  const walBal=raIds.reduce((s,r)=>s+raWalBal(r,apps),0);
  const kpis=[{icon:"📋",label:"Leads",value:myLeads.length,sub:`${myLeads.filter(l=>l.status==="App_ID Created").length} converted`,color:T.accent,bg:T.accentL},{icon:"🚗",label:"Stock-In Pending",value:myApps.filter(a=>!a.stockIn).length,sub:"of "+myApps.length+" apps",color:T.orange,bg:T.orangeL},{icon:"✅",label:"Active Deals",value:myApps.filter(a=>a.status==="Active").length,color:T.success,bg:T.successL},{icon:"⏳",label:"Pending Payouts",value:myPR.filter(p=>!["Auto-Approved","Released","Rejected"].includes(p.status)).length,color:T.warn,bg:T.warnL},{icon:"🏢",label:"Active Dealers",value:myDealers.filter(d=>d.status==="Active").length,color:T.purple,bg:T.purpleL},{icon:"💰",label:"Wallet",value:fmt(walBal),sub:"available",color:T.accentD,bg:T.accentL}];
  return <div>
    <div style={{background:`linear-gradient(135deg,${T.accentD},${T.accent})`,borderRadius:14,padding:16,color:"#fff",marginBottom:12}}>
      <div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,opacity:0.7,marginBottom:4}}>{user.role==="RM"?"TEAM WALLET":"MY WALLET"} — OTHER CHARGES</div>
      <div style={{fontSize:26,fontWeight:900}}>{fmt(walBal)}</div>
      <div style={{fontSize:11,opacity:0.7,marginTop:2}}>Available to split</div>
      {user.role==="RM"&&user.raIds&&<div style={{marginTop:10,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.2)",display:"flex",gap:6,flexWrap:"wrap"}}>{[user.id,...user.raIds].map(rid=>{const ra=ALL_USERS.find(u=>u.id===rid);return <div key={rid} style={{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"4px 8px",fontSize:10}}><div style={{fontWeight:700}}>{ra&&ra.name.split(" ")[0]}</div><div style={{opacity:0.8}}>{fmt(raWalBal(rid,apps))}</div></div>;})} </div>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>{kpis.map(k=><div key={k.label} style={{background:k.bg,borderRadius:10,padding:10,border:`1px solid ${k.color}22`}}><div style={{fontSize:16,marginBottom:3}}>{k.icon}</div><div style={{fontSize:18,fontWeight:900,color:T.text}}>{k.value}</div><div style={{fontSize:9,fontWeight:800,color:k.color,letterSpacing:0.7,textTransform:"uppercase",marginTop:1}}>{k.label}</div>{k.sub&&<div style={{fontSize:10,color:T.mute,marginTop:1}}>{k.sub}</div>}</div>)}</div>
    {user.role==="RM"&&user.raIds&&<Card style={{marginBottom:10}}><Lbl>Team Breakdown</Lbl>{user.raIds.map(raId=>{const ra=ALL_USERS.find(u=>u.id===raId);const raL=leads.filter(l=>l.raId===raId);const raA=apps.filter(a=>a.raId===raId);return <div key={raId} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><div style={{fontSize:12,fontWeight:800}}>{ra&&ra.name}</div><div style={{fontSize:13,fontWeight:800,color:T.accent}}>{fmt(raWalBal(raId,apps))}</div></div><div style={{display:"flex",gap:10}}><span style={{fontSize:10,color:T.mute}}>{raL.length} leads</span><span style={{fontSize:10,color:T.mute}}>{raA.length} apps</span></div></div>;})} </Card>}
    <Card><Lbl>Recent Leads</Lbl>{myLeads.slice(-3).reverse().map(l=><div key={l.id} style={{padding:"6px 0",borderBottom:`1px solid ${T.border}`}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:700}}>{l.make} {l.model} {l.year}</span><Badge s={l.status} sm/></div><div style={{fontSize:10,color:T.mute}}>{l.regNo} · {l.createdAt}</div></div>)}{myLeads.length===0&&<div style={{fontSize:11,color:T.mute,padding:"8px 0"}}>No leads yet</div>}</Card>
  </div>;
}

// STAGE DIALOGUE — lifted out of LeadsModule to prevent remount on keystroke
// ═══════════════════════════════════════════════
const ALL_STAGES_ORDER={"Lead Created":0,"Inspection Done":1,"Token Done":2,"PR Done":3,"Delivery Released":4,"SI Done":5};
const ALL_STAGES_LIST=["Lead Created","Inspection Done","Token Done","PR Done","Delivery Released","SI Done"];

function StageDialogue({lead,apps,setApps,setLeads,onClose}){
  const app=apps.find(a=>a.id===lead.appId);
  const[form,setForm]=useState(()=>({
    targetStage:lead.status||"Lead Created",
    c24Quote:lead.c24Quote>0?String(lead.c24Quote):app?String(app.quote):"",
    inspectionNotes:lead.inspectionNotes||app?.inspectionNotes||"",
    tokenAmount:lead.tokenAmount>0?String(lead.tokenAmount):app?.tokenAmount>0?String(app.tokenAmount):"1",
    tokenNotes:lead.tokenNotes||app?.tokenNotes||"",
    challan:lead.challan>0?String(lead.challan):app?String(app.challan||0):"0",
    otherCharges:lead.otherCharges_lead>0?String(lead.otherCharges_lead):app?String(app.otherCharges||0):"0",
    partyPeshi:lead.partyPeshi>0?String(lead.partyPeshi):"0",
    deliveryReleased:lead.deliveryReleased>0?String(lead.deliveryReleased):"",
    deliveryNotes:lead.deliveryNotes||"",
    siGsType:lead.siGsType||app?.gsType||"GS",
    siNotes:lead.siNotes||app?.siNotes||"",
  }));
  // sf: stable setter per field — won't recreate on render
  const sf=useCallback((k)=>(e)=>setForm(p=>({...p,[k]:typeof e==="string"?e:e.target.value})),[]);

  const tgt=form.targetStage||"Lead Created";
  const tgtIdx=ALL_STAGES_ORDER[tgt]||0;
  const curIdx=ALL_STAGES_ORDER[lead.status]||0;
  const sc=form.c24Quote?Math.round(Number(form.c24Quote)*0.02):0;
  const finalPayable=Number(form.c24Quote||0)-sc;
  const deliveryPayment=Math.max(0,finalPayable-Number(form.challan||0)-Number(form.otherCharges||0)-Number(form.partyPeshi||0));
  const delivRel=Number(form.deliveryReleased||0);
  const delivPending=Math.max(0,deliveryPayment-delivRel);
  const needsInsp=tgtIdx>=1;
  const needsToken=tgtIdx>=2;
  const needsPR=tgtIdx>=3;
  const needsDeliv=tgtIdx>=4;
  const needsSI=tgtIdx>=5;

  function save(){
    const ts=new Date().toLocaleString("en-IN",{hour12:false}).slice(0,16);
    const delivRelFinal=Math.min(delivRel,deliveryPayment);
    // Update lead
    setLeads(prev=>prev.map(l=>l.id===lead.id?{...l,
      status:tgt,
      c24Quote:Number(form.c24Quote||0),
      serviceCharge:sc,
      finalPayable,
      challan:Number(form.challan||0),
      otherCharges_lead:Number(form.otherCharges||0),
      partyPeshi:Number(form.partyPeshi||0),
      deliveryPayment,
      deliveryReleased:delivRelFinal,
      deliveryNotes:form.deliveryNotes||"",
      deliveryPending:Math.max(0,deliveryPayment-delivRelFinal),
      tokenAmount:Number(form.tokenAmount||0),
      tokenNotes:form.tokenNotes||"",
      inspectionNotes:form.inspectionNotes||"",
      siGsType:form.siGsType||"GS",
      siNotes:form.siNotes||"",
      stageUpdatedAt:ts,
    }:l));
    // Sync App_ID — update all fields so every role sees latest state
    if(app){
      const u={};
      if(tgtIdx>=1){
        u.quote=Number(form.c24Quote||app.quote);
        u.serviceCharge=sc;
        u.inspectionDone=true;u.inspectionAt=ts;u.inspectionNotes=form.inspectionNotes||"";
      }
      if(tgtIdx>=2){u.tokenDone=true;u.tokenAt=ts;u.tokenAmount=Number(form.tokenAmount||0);u.tokenNotes=form.tokenNotes||"";}
      if(tgtIdx>=3){u.challan=Number(form.challan||0);u.partyPeshi=Number(form.partyPeshi||0);}
      if(tgtIdx>=4){u.deliveryReleasedAmt=delivRelFinal;}
      if(tgtIdx>=5){
        // SI Done: fully unlock — this is what TM payout, override, approvals all read
        u.stockIn=true;
        u.siDone=true;u.siAt=ts;u.siNotes=form.siNotes||"";
        u.gsType=form.siGsType||"GS";
        u.otherCharges=Number(form.otherCharges||0);
        u.status="Active";
      }
      setApps(prev=>prev.map(a=>a.id===app.id?{...a,...u}:a));
    } else if(tgtIdx>=5) {
      // SI Done but no App_ID linked yet — auto-create one
      const otherChargesVal=Number(form.otherCharges||0);
      const newAppId="APP"+Math.random().toString(36).slice(2,6).toUpperCase();
      const newApp={
        id:newAppId,dealerId:lead.dealerId,counterId:lead.counterId,raId:lead.raId,
        vehicle:`${lead.year||""} ${lead.make||""} ${lead.model||""}${lead.variant?" "+lead.variant:""}`.trim(),
        regNo:lead.regNo||"",quote:Number(form.c24Quote||0),serviceCharge:sc,
        challan:Number(form.challan||0),estRefurb:0,
        gsType:form.siGsType||"GS",stockIn:true,
        otherCharges:otherChargesVal,splitReleased:0,incentiveReleased:0,status:"Active",
        inspectionDone:tgtIdx>=1,inspectionAt:tgtIdx>=1?ts:"",inspectionNotes:form.inspectionNotes||"",
        tokenDone:tgtIdx>=2,tokenAt:tgtIdx>=2?ts:"",
        tokenAmount:Number(form.tokenAmount||0),tokenNotes:form.tokenNotes||"",
        siDone:true,siAt:ts,siNotes:form.siNotes||"",
        partyPeshi:Number(form.partyPeshi||0),
      };
      setApps(prev=>[...prev,newApp]);
      setLeads(prev=>prev.map(l=>l.id===lead.id?{...l,appId:newAppId}:l));
    }
    onClose();
  }

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:9000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:16,paddingBottom:24}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:480,maxHeight:"calc(100vh - 40px)",background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,0.35)",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${T.accentD},${T.accent})`,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div><div style={{color:"#fff",fontSize:14,fontWeight:900}}>Update Lead Stage</div><div style={{color:"rgba(255,255,255,0.65)",fontSize:11,marginTop:2}}>{lead.make} {lead.model} {lead.year} · {lead.regNo}</div></div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>×</button>
      </div>
      <div style={{padding:16,overflowY:"auto",flex:1,WebkitOverflowScrolling:"touch"}}>
        {/* Stage selector */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:800,color:T.mute,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Select Target Stage</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {ALL_STAGES_LIST.map(s=>{const isCur=s===lead.status;const isSel=s===tgt;const idx=ALL_STAGES_ORDER[s];const isPast=idx<curIdx;return <button key={s} onClick={()=>setForm(p=>({...p,targetStage:s}))} style={{padding:"8px 8px 7px",borderRadius:9,border:`2px solid ${isSel?T.accent:isPast?"#BBF7D0":T.border}`,background:isSel?T.accentL:isPast?"#ECFDF5":"#fff",cursor:"pointer",textAlign:"left",fontFamily:"inherit",transition:"all 0.1s"}}><div style={{fontSize:8,fontWeight:800,color:isSel?T.accent:isPast?T.success:T.mute,textTransform:"uppercase",letterSpacing:0.8,marginBottom:2}}>{isSel?"→ TARGET":isCur?"CURRENT":isPast?"✓ DONE":""}</div><div style={{fontSize:11,fontWeight:800,color:isSel?T.accentD:T.text}}>{s}</div></button>;})}
          </div>
          {tgtIdx>curIdx+1&&<div style={{background:T.warnL,border:`1px solid #FDE68A`,borderRadius:7,padding:"6px 10px",marginTop:8,fontSize:11,color:T.warn,fontWeight:700}}>⚠ Skipping stages — all inputs collected below</div>}
        </div>

        {/* INSPECTION */}
        {needsInsp&&<div style={{background:"#F5F3FF",borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:900,color:"#5B21B6",marginBottom:10}}>🔍 Inspection</div>
          <div style={{marginBottom:8}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>C24 Quote (₹) <span style={{color:T.danger}}>*</span></label>
            <input value={form.c24Quote} onChange={sf("c24Quote")} inputMode="decimal" pattern="[0-9]*" placeholder="e.g. 850000"
              style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",outline:"none",WebkitAppearance:"none",touchAction:"manipulation"}}/>
          </div>
          {form.c24Quote&&Number(form.c24Quote)>0&&<div style={{background:"#fff",borderRadius:8,padding:10,marginBottom:8,border:"1px solid #DDD6FE"}}>
            <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}><span style={{fontSize:11,color:T.mid}}>C24 Quote</span><span style={{fontSize:12,fontWeight:700}}>{fmt(Number(form.c24Quote))}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}><span style={{fontSize:11,color:T.mid}}>Service Charge (2%)</span><span style={{fontSize:12,fontWeight:700,color:T.danger}}>− {fmt(sc)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderTop:"1px solid #DDD6FE",marginTop:2}}><span style={{fontSize:11,fontWeight:800}}>Final Payable to CX</span><span style={{fontSize:14,fontWeight:900,color:T.success}}>{fmt(finalPayable)}</span></div>
          </div>}
          <div style={{marginBottom:0}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>Inspection Notes</label>
            <input value={form.inspectionNotes} onChange={sf("inspectionNotes")} placeholder="Condition, wear, defects..."
              style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
          </div>
        </div>}

        {/* TOKEN */}
        {needsToken&&<div style={{background:"#ECFDF5",borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:900,color:T.success,marginBottom:10}}>🤝 Token</div>
          <div style={{marginBottom:8}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>Token Amount (₹)</label>
            <input value={form.tokenAmount} onChange={sf("tokenAmount")} inputMode="decimal" pattern="[0-9]*" placeholder="Default: 1"
              style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",outline:"none"}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>Token Notes</label>
            <input value={form.tokenNotes} onChange={sf("tokenNotes")} placeholder="Mode, reference..."
              style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
          </div>
        </div>}

        {/* PR DONE */}
        {needsPR&&<div style={{background:"#EBF4FF",borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:900,color:T.accent,marginBottom:4}}>📋 PR & Price Breakup</div>
          {finalPayable>0&&<div style={{fontSize:11,color:T.mid,marginBottom:10,fontWeight:700}}>Final Payable to CX: {fmt(finalPayable)}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>Challan (₹)</label><input value={form.challan} onChange={sf("challan")} inputMode="decimal" pattern="[0-9]*" placeholder="0" style={{width:"100%",padding:"9px 10px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none"}}/></div>
            <div><label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>Other Charges (₹)</label><input value={form.otherCharges} onChange={sf("otherCharges")} inputMode="decimal" pattern="[0-9]*" placeholder="0" style={{width:"100%",padding:"9px 10px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none"}}/></div>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>Party Peshi (₹)</label>

            {delivRel>deliveryPayment&&deliveryPayment>0&&<div style={{fontSize:10,color:T.danger,marginTop:2,fontWeight:700}}>⚠ Cannot exceed {fmt(deliveryPayment)} — will be capped on save</div>}

            <input value={form.deliveryNotes} onChange={sf("deliveryNotes")} placeholder="NEFT ref, cheque no., remarks..."

          {form.deliveryReleased&&deliveryPayment>0&&<div style={{background:"#fff",borderRadius:8,padding:10,border:"1px solid #BBF7D0"}}>
            <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}><span style={{fontSize:11,color:T.mid}}>Delivery Payment</span><span style={{fontSize:12,fontWeight:700}}>{fmt(deliveryPayment)}</span></div>

            {delivPending>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderTop:"1px solid #BBF7D0",marginTop:2}}><span style={{fontSize:11,color:T.warn,fontWeight:800}}>⏳ Pending</span><span style={{fontSize:12,fontWeight:800,color:T.warn}}>{fmt(delivPending)}</span></div>}

          </div>}
        </div>}

        {/* SI */}
        {needsSI&&<div style={{background:T.accentL,borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:900,color:T.accentD,marginBottom:10}}>✅ Stock-In (SI)</div>
          <div style={{background:T.warnL,border:`1px solid #FDE68A`,borderRadius:7,padding:"6px 10px",marginBottom:10,fontSize:11,color:T.warn,fontWeight:700}}>SI Done will mark stockIn=true and unlock payout wallet for TM.</div>
          <div style={{marginBottom:8}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>GS Type</label>
            <select value={form.siGsType} onChange={sf("siGsType")} style={{width:"100%",padding:"9px 10px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none"}}>
              <option value="GS">GS</option><option value="Non-GS">Non-GS</option>
            </select>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>SI Notes</label>
            <input value={form.siNotes} onChange={sf("siNotes")} placeholder="Any SI remarks..."
              style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
          </div>
        </div>}


      </div>
      <div style={{padding:"12px 16px",borderTop:`1px solid ${T.border}`,flexShrink:0,background:"#fff",display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Btn v="secondary" sm onClick={onClose}>Cancel</Btn>
        <Btn v="success" icon="✓" onClick={save} disabled={!form.targetStage||(needsInsp&&!form.c24Quote)}>Save Stage</Btn>
      </div>
    </div>
  </div>;
}

function LeadsModule({user,shared}){

  const[newLeadForm,setNewLeadForm]=useState({});
  const nf=(k,v)=>setNewLeadForm(p=>({...p,[k]:v}));

  let raIds=[user.id];
  if(user.role==="RM"&&user.raIds) raIds=[user.id,...user.raIds];
  const isOps=["TM","Central Ops","Business Head"].includes(user.role);

  const myDealers=isOps?dealers.filter(d=>d.status==="Active"):dealers.filter(d=>raIds.includes(d.raId)&&d.status==="Active");

  const selCtr=counters.find(c=>c.id===newLeadForm.counterId);
  const selDealer=dealers.find(d=>d.id===newLeadForm.dealerId);

  const calcPrice=(fd)=>{
    let base=0;const yr=parseInt(fd.year||"2020");const km=parseInt(fd.km||"0");const mk=fd.make||"";
    if(["Mercedes-Benz","BMW","Audi","Volvo"].includes(mk))base=1200000;
    else if(["Kia","Skoda","Volkswagen","Jeep","MG Motors"].includes(mk))base=800000;
    else if(["Hyundai","Honda","Toyota","Tata Motors","Mahindra"].includes(mk))base=600000;
    else base=450000;
    base=base*Math.pow(0.82,2026-yr);base=base*(1-(km/200000)*0.25);
    if(fd.accident==="Major")base*=0.80;else if(fd.accident==="Minor")base*=0.92;
    if(fd.flood==="Yes")base*=0.75;if(fd.tyres==="Poor")base*=0.96;

    return Math.round(base/1000)*1000;

        </div>
        {lead.finalPayable>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:6,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.15)"}}>
          {[["Svc Charge",fmt(lead.serviceCharge)],["Final Payable",fmt(lead.finalPayable)],["Delivery Pmt",fmt(lead.deliveryPayment)]].map(([l,v])=><div key={l}><div style={{fontSize:9,opacity:0.6,marginBottom:1}}>{l}</div><div style={{fontSize:11,fontWeight:800}}>{v}</div></div>)}
        </div>}

        </div>}

      <Card style={{marginBottom:8}}><ST>Vehicle</ST>{[["Reg. No.",lead.regNo],["Make / Model",`${lead.make} ${lead.model}`],["Year / Variant",`${lead.year} ${lead.variant||""}`],["Fuel",lead.fuel],["Transmission",lead.transmission],["KM Driven",Number(lead.km||0).toLocaleString("en-IN")+" km"],["Ownership",lead.ownership],["Accident",lead.accident+(lead.accidentDesc?` (${lead.accidentDesc})`:"")],["Tyres",lead.tyres]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}</Card>
      <Card style={{marginBottom:8}}><ST>Dealership</ST>{[["Dealer",ld&&ld.name],["Counter",lc&&lc.name],["UCM",lc&&lc.ucmName],["RA",ra&&ra.name]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}</Card>
      {app&&<Card style={{marginBottom:8}}><ST>App_ID</ST>{[["App_ID",app.id],["GS Type",app.gsType],["Wallet",fmt(app.otherCharges-app.splitReleased)],["Stock-In",app.stockIn?"✓":"✗"]].map(([l,v])=><Row key={l} label={l} value={v}/>)}</Card>}

    {stageLeadId&&<StageDialogue lead={leads.find(l=>l.id===stageLeadId)||{id:"",make:"",model:"",year:"",regNo:"",status:"Lead Created",c24Quote:0,serviceCharge:0,finalPayable:0,challan:0,otherCharges_lead:0,partyPeshi:0,deliveryPayment:0,deliveryReleased:0,deliveryPending:0,inspectionNotes:"",tokenAmount:0,tokenNotes:"",siGsType:"GS",siNotes:""}} apps={apps} setApps={setApps} setLeads={setLeads} onClose={()=>setStageLeadId(null)}/>}
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><Btn v="ghost" onClick={()=>{setView("list");setStep(0);setNewLeadForm({});}} sm>← Back</Btn><span style={{fontSize:14,fontWeight:800}}>New Lead</span></div>
    <StepBar steps={["Location","Vehicle","Condition","Price"]} cur={step}/>
    {step===0&&<Card><ST>Step 1 — Dealership & Counter</ST>

      {newLeadForm.dealerId&&<>{dealerCtrs.length===0?<Alrt type="warning">No active counters for this dealer.</Alrt>:<Sel label="Counter" value={newLeadForm.counterId} onChange={v=>nf("counterId",v)} options={dealerCtrs.map(c=>({value:c.id,label:`${c.name} — ${c.city}`}))} placeholder="Select counter..." required/>}{selCtr&&<div style={{background:T.accentL,borderRadius:8,padding:10,marginBottom:10}}><div style={{fontSize:10,fontWeight:800,color:T.accent,marginBottom:4}}>AUTO-FILLED</div><Row label="UCM" value={selCtr.ucmName}/><Row label="Mobile" value={selCtr.ucmMobile}/></div>}</>}
      <Fld label="Registration Number" value={newLeadForm.regNo} onChange={v=>nf("regNo",v.toUpperCase())} required placeholder="e.g. DL3CAB1234" maxLength={15}/>
      <div style={{display:"flex",justifyContent:"flex-end"}}><Btn disabled={!newLeadForm.dealerId||!newLeadForm.counterId||!newLeadForm.regNo} onClick={()=>setStep(1)}>Next →</Btn></div>
    </Card>}
    {step===1&&<Card><ST>Step 2 — Vehicle</ST>

      <Sel label="Ownership" value={newLeadForm.ownership} onChange={v=>nf("ownership",v)} options={["1st","2nd","3rd+"]} placeholder="Select..." required/>
      <div style={{display:"flex",justifyContent:"space-between"}}><Btn v="secondary" onClick={()=>setStep(0)}>← Back</Btn><Btn disabled={!newLeadForm.make||!newLeadForm.model||!newLeadForm.year||!newLeadForm.fuel||!newLeadForm.transmission||!newLeadForm.km||!newLeadForm.ownership} onClick={()=>setStep(2)}>Next →</Btn></div>

    {(user.role==="RA"||isOps)&&myLeads.map(l=>renderLeadCard(l))}

      <div style={{fontSize:11,color:T.mute,marginBottom:4}}>{l.regNo} · {d&&d.name} · {c&&c.name}</div>
      {l.appId&&<div style={{fontSize:10,color:T.success,fontWeight:700,marginBottom:4}}>App_ID: {l.appId}</div>}

      </div>
    </Card>;
  }
}

function RaisePayoutModule({user,shared}){
  const{apps,setApps,dealers,counters,payees,payoutRequests,setPayoutRequests,configs}=shared;
  const[step,setStep]=useState(0);const[appId,setAppId]=useState("");const[payeeId,setPayeeId]=useState("");const[type,setType]=useState("");const[amount,setAmount]=useState("");const[reason,setReason]=useState("");const[ackCross,setAckCross]=useState(false);const[result,setResult]=useState(null);const[done,setDone]=useState(false);
  if(user.role!=="TM")return <div style={{textAlign:"center",padding:60,color:T.mute}}><div style={{fontSize:40,marginBottom:12}}>🔒</div><div style={{fontSize:14,fontWeight:700,color:T.text}}>Only TM / City Head can raise payments.</div></div>;
  const selApp=apps.find(a=>a.id===appId);const selDealer=selApp?dealers.find(d=>d.id===selApp.dealerId):null;const selCounter=selApp?counters.find(ct=>ct.id===selApp.counterId):null;const selRA=selApp?ALL_USERS.find(u=>u.id===selApp.raId):null;const walBal=selApp?raWalBal(selApp.raId,apps):0;const avail=selApp?selApp.otherCharges-selApp.splitReleased:0;
  const dealerPayees=selApp?payees.filter(p=>p.status==="Active"&&p.dealerIds&&p.dealerIds.includes(selApp.dealerId)):[];
  const selPayee=payees.find(p=>p.id===payeeId);const isCross=selPayee&&selApp&&!selPayee.dealerIds.includes(selApp.dealerId);
  const base=selApp?selApp.quote-(selApp.serviceCharge+selApp.challan+selApp.estRefurb):0;
  const calcInc=selApp?Math.min((configs.NONGS_RATE/100)*base,configs.NONGS_CAP):0;
  useEffect(()=>{if(type==="Incentive"&&selApp&&selApp.gsType==="Non-GS")setAmount(String(Math.round(calcInc)));else if(type!=="Incentive")setAmount("");},[type,appId]);
  const amtErr=type==="Split"&&Number(amount)>avail?`Exceeds bucket (${fmt(avail)} available)`:"";const walErr=type==="Split"&&walBal<=0?"RA wallet is zero — split blocked":"";
  function preview(){if(!appId||!type||!amount||!reason||!payeeId){alert("Fill all required fields");return;}if(!selApp.stockIn){alert("Stock-In not complete");return;}setResult(autoApprove({type,amount:Number(amount)},selApp,configs));setStep(1);}
  function submit(){const amt=Number(amount);const newReq={id:`PR${uid()}`,appId,payeeId,raId:selApp.raId,type,amount:amt,status:result.ok?"Auto-Approved":result.route.includes("Finance")||result.route.includes("Ops")?"Submitted":"BH Review",createdBy:"TM",createdAt:now(),reason,rejectionReason:null,bhEdited:false,originalAmount:amt,utr:result.ok?`UTR${Math.floor(Math.random()*9e8+1e8)}`:null,crossDealerFlag:isCross||false};if(result.ok&&type==="Split")setApps(prev=>prev.map(a=>a.id===appId?{...a,splitReleased:a.splitReleased+amt}:a));setPayoutRequests(p=>[...p,newReq]);setDone(true);setTimeout(()=>{setDone(false);setStep(0);setAppId("");setPayeeId("");setType("");setAmount("");setReason("");setAckCross(false);setResult(null);},1800);}
  if(done)return <div style={{textAlign:"center",padding:60}}><div style={{fontSize:50,marginBottom:14}}>{result&&result.ok?"✅":"📋"}</div><div style={{fontSize:16,fontWeight:800}}>{result&&result.ok?"Auto-Released!":"Submitted for Approval"}</div></div>;
  return <div>
    <StepBar steps={["Configure","Review & Submit"]} cur={step}/>
    {step===0&&<Card>
      <ST>Select App_ID</ST>
      <Sel value={appId} onChange={v=>{setAppId(v);setPayeeId("");setType("");}} options={apps.map(a=>({value:a.id,label:`${a.id} — ${a.vehicle}`}))} placeholder="Choose App_ID..." required/>
      {selApp&&<>
        <div style={{background:T.accentL,borderRadius:9,padding:12,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:800,color:T.accent,marginBottom:8}}>AUTO-FILLED FROM CARS24 ADMIN PANEL</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {[["Dealer",selDealer&&selDealer.name],["Code",selDealer&&selDealer.code],["Counter",selCounter&&selCounter.name],["City",selCounter&&selCounter.city],["UCM Name",selCounter&&selCounter.ucmName],["UCM Mobile",selCounter&&selCounter.ucmMobile],["RA",selRA&&selRA.name],["GS Type",selApp.gsType]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,color:T.accent,fontWeight:700,marginBottom:1}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800,wordBreak:"break-word"}}>{v||"—"}</div></div>)}
          </div>
        </div>
        {!selApp.stockIn&&<Alrt type="error">Stock-In not complete — payouts blocked.</Alrt>}
        <Sel label="Payout Type" value={type} onChange={setType} options={[{value:"Split",label:"Split Payment (Other Charges bucket)"},{value:"Incentive",label:"Incentive"}]} placeholder="Select type..." required/>
        {type==="Split"&&<div style={{background:walBal>0?T.accentL:T.dangerL,border:`1px solid ${walBal>0?"#BFDBFE":"#FECACA"}`,borderRadius:8,padding:12,marginBottom:10}}><div style={{fontSize:10,fontWeight:800,color:walBal>0?T.accentD:T.danger,marginBottom:2}}>RA WALLET (SPLIT ONLY)</div><div style={{fontSize:22,fontWeight:900,color:walBal>0?T.accent:T.danger}}>{fmt(walBal)}</div><div style={{fontSize:11,color:T.mute,marginTop:2}}>Bucket available: {fmt(avail)}</div></div>}
        {type&&<><Sel label="Payee (linked to this dealer)" value={payeeId} onChange={setPayeeId} options={dealerPayees.map(p=>({value:p.id,label:`${p.payeeName} — ${p.bank} · ${p.fluxStatus}`}))} placeholder="Select payee..." required/>{dealerPayees.length===0&&<Alrt type="warning">No active payees linked to this dealer. Ask RA/RM to submit a SAP request.</Alrt>}
        {type==="Incentive"&&selApp.gsType==="Non-GS"&&<div style={{background:T.successL,borderRadius:8,padding:10,marginBottom:10}}><Lbl color={T.success}>Non-GS Calculation</Lbl><Row label="Base Amount" value={fmt(base)}/><Row label={`${configs.NONGS_RATE}% of Base`} value={fmt((configs.NONGS_RATE/100)*base)}/><Row label="Cap" value={fmt(configs.NONGS_CAP)}/><Row label="Pre-filled" value={fmt(calcInc)}/></div>}
        <Fld label="Amount (₹)" value={amount} onChange={setAmount} type="number" required hint={type==="Split"?`Bucket: ${fmt(avail)}`:""} error={amtErr||walErr}/>
        <Fld label="Reason / Remarks" value={reason} onChange={setReason} required/></>}
      </>}
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}><Btn onClick={preview} disabled={!appId||!type||!amount||!reason||!payeeId||!!amtErr||!!walErr}>Check Rules →</Btn></div>
    </Card>}
    {step===1&&result&&<>
      <Card style={{marginBottom:12,border:`1.5px solid ${result.ok?"#BBF7D0":result.route==="BLOCKED"?"#FECACA":"#FDE68A"}`}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}><div style={{fontSize:36}}>{result.ok?"✅":result.route==="BLOCKED"?"🚫":"🔀"}</div><div><div style={{fontSize:15,fontWeight:900,color:result.ok?T.success:result.route==="BLOCKED"?T.danger:T.warn}}>{result.route}</div><div style={{fontSize:12,color:T.mid,marginTop:2}}>{result.reason}</div></div></div>
      </Card>
      <Card style={{marginBottom:12}}><Lbl>Summary</Lbl>{[["App_ID",appId],["Dealer",selDealer&&selDealer.name],["Counter",selCounter&&selCounter.name],["UCM",selCounter&&selCounter.ucmName],["RA",selRA&&selRA.name],["Type",type],["Amount",fmt(amount)],["Payee",selPayee&&selPayee.payeeName],["Reason",reason]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}</Card>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="secondary" onClick={()=>setStep(0)}>← Edit</Btn><Btn v={result.route==="BLOCKED"?"secondary":result.ok?"success":"primary"} disabled={result.route==="BLOCKED"} onClick={submit}>{result.ok?"✓ Confirm & Release":"Submit for Approval"}</Btn></div>
    </>}
  </div>;
}

      {entityType==="dealer_ra"&&<><Sel label="Select Dealer" value={entityId} onChange={setEntityId} options={dealers.map(d=>({value:d.id,label:d.name}))} placeholder="Select dealer..."/><Sel label="New RA" value={newVal} onChange={setNewVal} options={ALL_USERS.filter(u=>u.role==="RA").map(u=>({value:u.id,label:u.name}))} placeholder="Select new RA..."/></>}
      {entityType==="app_ra"&&<><Sel label="Select App_ID" value={entityId} onChange={setEntityId} options={apps.map(a=>({value:a.id,label:`${a.id} — ${a.vehicle}`}))} placeholder="Select App_ID..."/><Sel label="New RA" value={newVal} onChange={setNewVal} options={ALL_USERS.filter(u=>u.role==="RA").map(u=>({value:u.id,label:u.name}))} placeholder="Select new RA..."/></>}
      {entityType==="counter_dealer"&&<><Sel label="Select Counter" value={entityId} onChange={setEntityId} options={counters.map(c=>({value:c.id,label:c.name}))} placeholder="Select counter..."/><Sel label="New Dealer" value={newVal} onChange={setNewVal} options={dealers.filter(d=>d.status==="Active").map(d=>({value:d.id,label:d.name}))} placeholder="Select new dealer..."/></>}
      {entityType==="payee_dealer"&&<><Sel label="Select Payee" value={entityId} onChange={setEntityId} options={payees.map(p=>({value:p.id,label:p.payeeName}))} placeholder="Select payee..."/><Sel label="Add Dealer" value={newVal} onChange={setNewVal} options={dealers.filter(d=>d.status==="Active").map(d=>({value:d.id,label:d.name}))} placeholder="Select dealer..."/></>}
      {entityType&&<Fld label="Reason *" value={reason} onChange={setReason} required/>}

    </Card>}

}

function ConfigModule({user,shared}){
  const{configs,setConfigs}=shared;const[local,setLocal]=useState({...configs});
  if(user.role!=="Business Head")return <div style={{textAlign:"center",padding:60,color:T.mute}}><div style={{fontSize:40,marginBottom:10}}>🔒</div><div style={{fontSize:14,fontWeight:700}}>Config: Business Head only.</div></div>;
  const LABELS={SPLIT_SAME_APP_GATE:["Split Same App_ID Gate (₹)","Auto-approve splits below this"],SPLIT_CROSS_APP_GATE:["Split Cross App_ID Gate (₹)","Cross-app gate"],NONGS_RATE:["Non-GS Incentive Rate (%)","Applied on base amount"],NONGS_CAP:["Non-GS Cap (₹)","Max incentive per vehicle"],NONGS_AUTO_GATE:["Non-GS Auto-Approve Gate (₹)","Incentive below this auto-approved"],FINANCE_GATE:["Finance Gate (₹)","Routes to Finance at/above this"]};
  return <div><Alrt type="warning">Changes apply immediately to all new requests and are audit-logged.</Alrt>
    <Card>{Object.entries(local).map(([k,v])=><div key={k} style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:T.text}}>{LABELS[k]&&LABELS[k][0]||k}</div><div style={{fontSize:11,color:T.mute,marginBottom:4}}>{LABELS[k]&&LABELS[k][1]}</div><div style={{display:"flex",gap:8,alignItems:"center"}}><input value={v} type="number" onChange={e=>setLocal(p=>({...p,[k]:Number(e.target.value)}))} style={{flex:1,padding:"9px 10px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:14,fontWeight:700,fontFamily:"inherit",color:T.text,outline:"none"}}/><span style={{fontSize:13,color:T.mute,width:20}}>{k.includes("RATE")?"%":"₹"}</span></div></div>)}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}><Btn v="secondary" sm onClick={()=>setLocal({...CONFIGS_DEFAULT})}>Reset</Btn><Btn sm icon="✓" onClick={()=>{setConfigs({...local});alert("✓ Config saved!");}}>Save Config</Btn></div>
    </Card>
  </div>;
}

function CounterUCMOverride({user,shared}){
  const{apps,setApps,counters,dealers}=shared;
  const[selAppId,setSelAppId]=useState("");
  const[newDealerId,setNewDealerId]=useState("");
  const[newCounterId,setNewCounterId]=useState("");
  const[reason,setReason]=useState("");
  const[log,setLog]=useState([]);
  const[done,setDone]=useState(false);

  const canAccess=["TM","Central Ops","Business Head"].includes(user.role);
  if(!canAccess)return <div style={{textAlign:"center",padding:60,color:T.mute}}><div style={{fontSize:40,marginBottom:10}}>🔒</div><div style={{fontSize:14,fontWeight:700}}>TM, Central Ops & BH only.</div></div>;

  const selApp=apps.find(a=>a.id===selAppId);
  const currentDealer=selApp?dealers.find(d=>d.id===selApp.dealerId):null;
  const currentCounter=selApp?counters.find(c=>c.id===selApp.counterId):null;
  const newDealer=dealers.find(d=>d.id===newDealerId);
  // Filter counters to only those of the selected new dealer
  const dealerCounters=counters.filter(c=>c.dealerId===newDealerId&&c.status==="Active");
  const newCounter=counters.find(c=>c.id===newCounterId);

  function applyOverride(){
    if(!selAppId||!newDealerId||!newCounterId||!reason){alert("Fill all fields");return;}
    const entry={id:`OVR${Math.random().toString(36).slice(2,7).toUpperCase()}`,appId:selAppId,vehicle:selApp.vehicle,
      prevDealer:currentDealer?.name,prevCounter:currentCounter?.name,prevUCM:currentCounter?.ucmName,
      newDealer:newDealer?.name,newCounter:newCounter?.name,newUCM:newCounter?.ucmName,
      reason,by:user.role,at:new Date().toLocaleString("en-IN",{hour12:false}).slice(0,16)};
    setApps(prev=>prev.map(a=>a.id===selAppId?{...a,dealerId:newDealerId,counterId:newCounterId}:a));
    setLog(p=>[entry,...p]);
    setDone(true);
    setTimeout(()=>{setDone(false);setSelAppId("");setNewDealerId("");setNewCounterId("");setReason("");},1400);
  }

  if(done)return <div style={{textAlign:"center",padding:60}}><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontSize:15,fontWeight:800}}>Dealer, Counter & UCM Updated!</div><div style={{fontSize:12,color:T.mute,marginTop:4}}>All downstream references now reflect the new mapping</div></div>;

  return <div>
    <Alrt type="warning">Override the Dealer, Counter and UCM on any App_ID. Used for scenario testing since Admin Panel is not integrated.</Alrt>
    <Card style={{marginBottom:14}}>
      <ST>Select App_ID to Override</ST>
      <Sel value={selAppId} onChange={v=>{setSelAppId(v);setNewDealerId("");setNewCounterId("");}}
        options={apps.map(a=>{const d=dealers.find(dd=>dd.id===a.dealerId);return{value:a.id,label:`${a.id} — ${a.vehicle} (${d?d.name:""})`};})}
        placeholder="Choose App_ID..."/>

      {selApp&&<>
        <div style={{background:T.accentL,borderRadius:9,padding:12,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:800,color:T.accent,marginBottom:6}}>CURRENT MAPPING</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {[["Dealer",currentDealer?.name],["Dealer Code",currentDealer?.code],["Counter",currentCounter?.name],["UCM Name",currentCounter?.ucmName],["UCM Mobile",currentCounter?.ucmMobile],["Counter City",currentCounter?.city]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,color:T.accent,fontWeight:700}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800}}>{v||"—"}</div></div>)}
          </div>
        </div>

        <ST>New Dealer → Counter → UCM</ST>
        <Sel label="Step 1 — Select New Dealer" value={newDealerId} onChange={v=>{setNewDealerId(v);setNewCounterId("");}}
          options={dealers.filter(d=>d.status==="Active"&&d.id!==selApp.dealerId).map(d=>({value:d.id,label:`${d.name} (${d.code}) — ${d.city}`}))}
          placeholder="Select new dealer..."/>

        {newDealerId&&<>
          {dealerCounters.length===0?<Alrt type="warning">No active counters for this dealer yet.</Alrt>:
          <Sel label="Step 2 — Select Counter (filtered to new dealer)" value={newCounterId} onChange={setNewCounterId}
            options={dealerCounters.map(c=>({value:c.id,label:`${c.name} — ${c.ucmName} (${c.city})`}))}
            placeholder="Select counter..."/>}

          {newCounter&&<div style={{background:T.successL,border:"1px solid #BBF7D0",borderRadius:9,padding:12,marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:800,color:T.success,marginBottom:6}}>NEW MAPPING PREVIEW</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {[["Dealer",newDealer?.name],["Counter",newCounter.name],["UCM Name",newCounter.ucmName],["UCM Mobile",newCounter.ucmMobile],["City",newCounter.city]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,color:T.success,fontWeight:700}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800}}>{v||"—"}</div></div>)}
            </div>
          </div>}
        </>}

        <Fld label="Reason / Note *" value={reason} onChange={setReason} placeholder="e.g. Admin mapped to different dealer / scenario testing" required/>
        <Btn full v="primary" icon="⚡" disabled={!newDealerId||!newCounterId||!reason} onClick={applyOverride}>Apply Override</Btn>
      </>}
    </Card>
    {log.length>0&&<Card><Lbl>Override Log ({log.length})</Lbl>{log.map(e=><div key={e.id} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:12,fontWeight:800}}>{e.appId} — {e.vehicle}</span><span style={{fontSize:10,color:T.mute}}>{e.at}</span></div>
      <div style={{fontSize:11,color:T.mid}}>From: <strong>{e.prevDealer}</strong> / {e.prevCounter} / {e.prevUCM}</div>
      <div style={{fontSize:11,color:T.success,fontWeight:700}}>→ To: {e.newDealer} / {e.newCounter} / {e.newUCM}</div>
      <div style={{fontSize:10,color:T.mute}}>Reason: {e.reason} · By: {e.by}</div>
    </div>)}</Card>}
  </div>;
}

function RoleGuide({user,onClose}){

  const step=guide.steps[tab];
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9500,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px 12px",overflowY:"auto"}}>
    <div style={{width:"100%",maxWidth:480,background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${guide.color}dd,${guide.color})`,padding:"16px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:11,color:"rgba(255,255,255,0.65)",fontWeight:800,marginBottom:2,letterSpacing:1}}>ROLE GUIDE</div><div style={{color:"#fff",fontSize:16,fontWeight:900}}>{guide.icon} {guide.title}</div></div>

      {/* Desc */}
      <div style={{padding:"12px 18px",background:guide.bg,borderBottom:`1px solid ${guide.color}22`,fontSize:12,color:guide.color,fontWeight:600,lineHeight:1.5}}>{guide.desc}</div>
      {/* Steps nav */}
      <div style={{display:"flex",overflowX:"auto",padding:"10px 12px 0",gap:6,borderBottom:`1px solid ${T.border}`,WebkitOverflowScrolling:"touch"}}>
        {guide.steps.map((s,i)=><button key={i} onClick={()=>setTab(i)} style={{flexShrink:0,padding:"5px 10px",borderRadius:20,border:`1.5px solid ${tab===i?guide.color:T.border}`,background:tab===i?guide.bg:"#fff",color:tab===i?guide.color:T.mute,cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap",marginBottom:8}}>{s.icon} {s.title}</button>)}
      </div>
      {/* Step content */}
      <div style={{padding:"20px 18px"}}>
        <div style={{fontSize:22,marginBottom:8}}>{step.icon}</div>
        <div style={{fontSize:15,fontWeight:900,color:T.text,marginBottom:8}}>{step.title}</div>
        <div style={{fontSize:13,color:T.mid,lineHeight:1.65}}>{step.body}</div>

        <div style={{fontSize:11,color:T.mute}}>{tab+1} / {guide.steps.length}</div>

          {tab>0&&<Btn v="secondary" sm onClick={()=>setTab(t=>t-1)}>← Prev</Btn>}
          {tab<guide.steps.length-1?<Btn v="primary" sm onClick={()=>setTab(t=>t+1)}>Next →</Btn>:<Btn v="success" sm icon="✓" onClick={onClose}>Got it!</Btn>}
        </div>
      </div>
    </div>
  </div>;
}

  "RA":{icon:"📱",color:"#0F4C81",bg:"#EBF4FF",title:"RA — Relationship Associate",subtitle:"Field agent who creates leads and manages dealer relationships",steps:[
    {step:"1",icon:"🏢",title:"Create a New Lead","desc":"Go to Leads → tap + New Lead. Fill dealer, counter, vehicle details across 4 steps. After submit, a stage dialogue opens automatically."},
    {step:"2",icon:"🎯",title:"Update Lead Stage","desc":"From any lead card tap 'Update Stage'. Select a target stage — Inspection, Token, PR, Delivery Released, or SI Done. All required inputs appear below."},
    {step:"3",icon:"🔍",title:"Inspection Done","desc":"Enter C24 Quote → Service Charge (2%) auto-calculates → Final Payable to CX is shown."},
    {step:"4",icon:"🤝",title:"Token Done","desc":"Enter token amount (minimum ₹1) and any reference notes."},
    {step:"5",icon:"📋",title:"PR Done","desc":"Enter Challan, Other Charges, Party Peshi → Final Delivery Payment auto-calculates."},
    {step:"6",icon:"💸",title:"Delivery Released","desc":"Enter amount released (cannot exceed delivery payment). Pending amount shown if partially released."},
    {step:"7",icon:"✅",title:"SI Done","desc":"Select GS/Non-GS type, add notes → saves to App_ID. TM can now raise payouts for this vehicle."},
    {step:"8",icon:"🏦",title:"Submit SAP / Counter requests","desc":"Use Counter and SAP tabs to raise mapping requests to Central Ops."},
  ]},
  "RM":{icon:"👥",color:"#5B21B6",bg:"#F5F3FF",title:"RM — Regional Manager",subtitle:"Supervises RA team, monitors pipeline and wallets",steps:[
    {step:"1",icon:"🏠",title:"Dashboard","desc":"See team wallet breakdown per RA, leads count, stock-in pending, and active deals at a glance."},
    {step:"2",icon:"📋",title:"Leads — Team View","desc":"Leads tab shows all leads grouped by RA. Each card has stage badges. Tap 'Update Stage' to mark any lead on behalf of your RA."},
    {step:"3",icon:"🚗",title:"App_IDs","desc":"See stage pills (Insp / Token / SI) and wallet balance per vehicle. Expand for full pricing breakdown."},
    {step:"4",icon:"💸",title:"Payout Status","desc":"Track all payment requests raised by TM for your team. See UTR numbers for released payments."},
  ]},
  "TM":{icon:"🏙",color:"#065F46",bg:"#ECFDF5",title:"TM / City Head",subtitle:"Final payout authority — raises all payment requests",steps:[
    {step:"1",icon:"📋",title:"Leads — Full View","desc":"See all leads across your city. Leads tab works the same as RA — you can update stages for any lead."},
    {step:"2",icon:"💸",title:"Raise Payout","desc":"Select App_ID (only SI Done apps show wallet) → type auto-fills dealer/counter/UCM/RA → choose Split or Incentive → select payee → enter amount → check auto-approval rules."},
    {step:"3",icon:"🔄",title:"Counter & UCM Override","desc":"Pick App_ID → select new Dealer → then counter filters to that dealer → apply override. Useful when Admin Panel mapping differs."},
    {step:"4",icon:"🏢",title:"Request Onboarding / Counter / SAP","desc":"TM can raise all three request types just like RA — goes to Central Ops queue."},
  ]},
  "Central Ops":{icon:"⚙️",color:"#92400E",bg:"#FFFBEB",title:"Central Ops",subtitle:"Approves onboarding, counters, SAP, and payouts",steps:[
    {step:"1",icon:"▦",title:"Dashboard","desc":"See all pending queues at a glance — onboarding, counter requests, SAP requests, payout approvals."},
    {step:"2",icon:"🏢",title:"Onboarding Queue","desc":"Review dealer requests. Simulate dealer code receipt → complete OEM tagging → activate dealer. Activated dealers appear for all RA roles instantly."},
    {step:"3",icon:"🔗",title:"Counter Queue","desc":"Review and approve counter+UCM mapping requests. Approved counters appear in RA lead form dropdown immediately."},
    {step:"4",icon:"🏦",title:"SAP Queue","desc":"Review payee creation requests. Approve to assign SAP code — payee then appears in TM payout form."},
    {step:"5",icon:"✓",title:"Payout Approvals","desc":"Approve 'Submitted' payout requests → routes to BH or Finance based on amount."},
    {step:"6",icon:"⚡",title:"Data Transfer","desc":"Bulk transfer all RA data to another RA (e.g. if RA resigns), or remap individual entities."},
    {step:"7",icon:"🔄",title:"Counter Override","desc":"Change dealer+counter+UCM on any App_ID — select new dealer first, then filtered counters appear."},
  ]},
  "Business Head":{icon:"👔",color:"#C2410C",bg:"#FFF7ED",title:"Business Head",subtitle:"Final approvals, config keys, and team oversight",steps:[
    {step:"1",icon:"▦",title:"BH Dashboard","desc":"Full team wallet, released MTD, pipeline amount, all RA wallet breakdowns, and recent payout activity."},
    {step:"2",icon:"✓",title:"Approvals","desc":"BH Review queue shows payout requests routed to you. You can override the amount (permanently flagged), approve, or reject."},
    {step:"3",icon:"⚙",title:"Config Keys","desc":"Change auto-approval gates, Non-GS rate/cap, Finance gate. Changes apply to all new requests immediately."},
    {step:"4",icon:"⚡",title:"Data Transfer","desc":"Both bulk and single-entity remapping available. Full audit log maintained."},
  ]},
  "Finance":{icon:"💰",color:"#991B1B",bg:"#FEF2F2",title:"Finance",subtitle:"Final release of high-value payouts",steps:[
    {step:"1",icon:"✓",title:"Finance Queue","desc":"Only see payout requests with status 'BH Approved' AND amount ≥ Finance Gate (₹15,000 by default)."},
    {step:"2",icon:"💸",title:"Approve & Release","desc":"Review full payout details — dealer, App_ID, vehicle, payee, amount. Click Approve to release and generate UTR."},
    {step:"3",icon:"📊",title:"All Requests View","desc":"Bottom of approvals page shows all historical requests with status for reference."},
  ]},
};


// ═══════════════════════════════════════════════
// ROLE META
// ═══════════════════════════════════════════════
const ROLE_COLOR={"RA":"#0F4C81","RM":"#5B21B6","TM":"#065F46","Central Ops":"#92400E","Business Head":"#C2410C","Finance":"#991B1B"};
const isFieldRole=r=>["RA","RM"].includes(r);
const isOpsRole=r=>["TM","Central Ops","Business Head","Finance"].includes(r);

function getNavForUser(user){
  if(isFieldRole(user.role))return fieldNav;
  return opsNav.filter(n=>!n.roles||n.roles.includes(user.role));
}

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════
function App(){
  const[userId,setUserId]=useState("RA001");
  const[page,setPage]=useState("dashboard");
  const[toast,setToast]=useState(null);
  const[guideOpen,setGuideOpen]=useState(true); // show guide on load

  // SHARED STATE — single source of truth for ALL roles
  const[apps,setApps]=useState(INIT_APPS);
  const[dealers,setDealers]=useState(INIT_DEALERS);
  const[counters,setCounters]=useState(INIT_COUNTERS);
  const[leads,setLeads]=useState(INIT_LEADS);
  const[payees,setPayees]=useState(INIT_PAYEES);
  const[payoutRequests,setPayoutRequests]=useState(INIT_PR);
  const[onboarding,setOnboarding]=useState(INIT_OB);
  const[counterReqs,setCounterReqs]=useState(INIT_COUNTER_REQS);
  const[sapReqs,setSapReqs]=useState(INIT_SAP_REQS);
  const[configs,setConfigs]=useState({...CONFIGS_DEFAULT});

  const shared={apps,setApps,dealers,setDealers,counters,setCounters,leads,setLeads,payees,setPayees,payoutRequests,setPayoutRequests,onboarding,setOnboarding,counterReqs,setCounterReqs,sapReqs,setSapReqs,configs,setConfigs};

  const user=ALL_USERS.find(u=>u.id===userId);
  const nav=getNavForUser(user);
  const roleColor=ROLE_COLOR[user.role]||T.accent;

  // Badges for ops nav
  const badges={apr:payoutRequests.filter(r=>{if(user.role==="Central Ops")return r.status==="Submitted";if(user.role==="Business Head")return["BH Review","Ops Approved"].includes(r.status);if(user.role==="Finance")return r.status==="BH Approved"&&r.amount>=configs.FINANCE_GATE;return false;}).length,ob:onboarding.filter(o=>["Admin Panel Pending","OEM Tagging Pending","Ops Review"].includes(o.status)).length,ctr:counterReqs.filter(r=>r.status==="Ops Review").length,sap:sapReqs.filter(r=>r.status==="Ops Review").length};

  useEffect(()=>{const firstPage=nav[0]&&nav[0].id;setPage(firstPage||"dashboard");setGuideOpen(true);},[userId]);

  const showToast=useCallback((msg,type="success")=>setToast({msg,type,k:Date.now()}),[]);

  const TITLES={dashboard:"Dashboard",leads:"All Leads",appids:"All App_IDs",stages:"Stage Marking",override:"Counter & UCM Override",onboarding:"Dealer Onboarding",counter:"Counter & UCM",sap:"SAP & Payees",payouts:"Payout Status",payout:"Raise Payout",approvals:"Approvals",transfer:"Data Transfer",config:"Config Keys"};

  function renderPage(){
    if(isFieldRole(user.role)){
      if(page==="dashboard")return <RADashboard user={user} shared={shared}/>;
      if(page==="leads")     return <LeadsModule user={user} shared={shared}/>;
      if(page==="appids")    return <AppIDsModule user={user} shared={shared}/>;
      if(page==="onboarding")return <OnboardingModuleRA user={user} shared={shared}/>;
      if(page==="counter")   return <CounterModuleRA user={user} shared={shared}/>;
      if(page==="sap")       return <SAPModuleRA user={user} shared={shared}/>;
      if(page==="payouts")   return <PayoutsModule user={user} shared={shared}/>;
    } else {
      if(page==="dashboard") return <OpsDashboard user={user} shared={shared}/>;
      if(page==="leads")     return <LeadsModule user={user} shared={shared}/>;
      if(page==="appids")    return <AppIDsModule user={user} shared={shared}/>;
      if(page==="payout")    return <RaisePayoutModule user={user} shared={shared}/>;
      if(page==="override")  return <CounterUCMOverride user={user} shared={shared}/>;
      if(page==="onboarding")return <OnboardingModuleOps user={user} shared={shared}/>;
      if(page==="counter")   return <CounterModuleOps user={user} shared={shared}/>;
      if(page==="sap")       return <SAPModuleOps user={user} shared={shared}/>;
      if(page==="approvals") return <ApprovalsModule user={user} shared={shared}/>;
      if(page==="transfer")  return <DataTransferModule user={user} shared={shared}/>;
      if(page==="config")    return <ConfigModule user={user} shared={shared}/>;
    }
    return null;
  }

  return <div style={{background:T.bg,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    {toast&&<Toast key={toast.k} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    {guideOpen&&<RoleGuide user={user} onClose={()=>setGuideOpen(false)}/>}

    {/* TOP HEADER */}
    <div style={{background:T.accentD,padding:"0 14px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{background:"rgba(255,255,255,0.15)",borderRadius:7,padding:"4px 10px"}}><span style={{color:"#fff",fontWeight:900,fontSize:13}}>C24</span></div>
        <div>
          <div style={{color:"#fff",fontSize:12,fontWeight:800}}>B2B Procurement</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:9}}>{TITLES[page]||"Dashboard"}</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{textAlign:"right"}}>
          <div style={{color:"#fff",fontSize:11,fontWeight:800}}>{user.name}</div>
          <div style={{display:"flex",alignItems:"center",gap:4,marginTop:1}}><div style={{fontSize:9,padding:"1px 6px",borderRadius:8,background:`${roleColor}33`,color:roleColor,fontWeight:800}}>{user.role}</div><button onClick={()=>setShowGuide(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>? Guide</button></div>
        </div>
        <button onClick={()=>setGuideOpen(true)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:7,padding:"5px 9px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:800,flexShrink:0}}>?</button>
        <select value={userId} onChange={e=>setUserId(e.target.value)} style={{background:"rgba(255,255,255,0.12)",color:"#fff",border:"1px solid rgba(255,255,255,0.25)",borderRadius:7,padding:"5px 8px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",outline:"none",maxWidth:130}}>
          <optgroup label="── Field Team ──" style={{color:"#000"}}>
            {ALL_USERS.filter(u=>isFieldRole(u.role)).map(u=><option key={u.id} value={u.id} style={{color:"#000"}}>{u.name} ({u.role})</option>)}
          </optgroup>
          <optgroup label="── Ops / Management ──" style={{color:"#000"}}>
            {ALL_USERS.filter(u=>isOpsRole(u.role)).map(u=><option key={u.id} value={u.id} style={{color:"#000"}}>{u.name} ({u.role})</option>)}
          </optgroup>
        </select>
      </div>
    </div>

    {/* SIMULATION BANNER */}
    <div style={{background:"#FF4B2B",padding:"3px 0",textAlign:"center",flexShrink:0}}><span style={{fontSize:9,fontWeight:800,color:"#fff",letterSpacing:1}}>SIMULATION — NO REAL PAYOUTS · SHARED STATE — ALL ROLES SEE SAME DATA</span></div>

    {/* DESKTOP SIDEBAR + MAIN */}
    <div className="desktop-only" style={{flex:1,display:"flex",minHeight:0}}>
      {/* Sidebar */}
      <div style={{width:200,background:T.sidebar,display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
        <nav style={{flex:1,padding:"10px 8px"}}>
          {nav.map(n=>{const active=page===n.id;const cnt=n.badge?badges[n.badge]:0;return <button key={n.id} onClick={()=>setPage(n.id)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,padding:"9px 10px",borderRadius:7,border:"none",cursor:"pointer",background:active?"rgba(15,76,129,0.3)":"transparent",color:active?"#7AB3F5":"#6B8CAE",marginBottom:2,textAlign:"left",fontFamily:"inherit"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{n.icon}</span><span style={{fontSize:11,fontWeight:active?800:500}}>{n.label}</span></div>{cnt>0&&<span style={{background:T.danger,color:"#fff",fontSize:9,fontWeight:900,padding:"1px 5px",borderRadius:10,minWidth:16,textAlign:"center"}}>{cnt}</span>}</button>;})}
        </nav>
        <div style={{padding:"8px 10px 14px",borderTop:`1px solid ${T.sidebarB}`}}><div style={{background:"rgba(255,75,43,0.12)",border:"1px solid rgba(255,75,43,0.3)",borderRadius:7,padding:"7px 10px"}}><div style={{fontSize:9,fontWeight:800,color:"#FF7A5C",letterSpacing:0.8}}>SIMULATION MODE</div><div style={{fontSize:9,color:"#A0694A",marginTop:2}}>Data shared across all roles in real time</div></div></div>
      </div>
      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:20}}>{renderPage()}</div>
    </div>

    {/* MOBILE — CONTENT + BOTTOM NAV */}
    <div className="mobile-only" style={{flex:1,flexDirection:"column",minHeight:0}}>
      <div style={{flex:1,overflowY:"auto",padding:12,paddingBottom:80}}>{renderPage()}</div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:`1px solid ${T.border}`,display:"flex",zIndex:100,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {nav.map(n=>{const active=page===n.id;const cnt=n.badge?badges[n.badge]:0;return <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,minWidth:52,padding:"8px 4px 6px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative"}}><span style={{fontSize:18}}>{n.icon}</span><span style={{fontSize:8,fontWeight:700,color:active?T.accent:T.mute,whiteSpace:"nowrap"}}>{n.label}</span>{active&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:T.accent,borderRadius:2}}/>}{cnt>0&&<div style={{position:"absolute",top:4,right:6,background:T.danger,color:"#fff",fontSize:8,fontWeight:900,borderRadius:8,minWidth:14,height:14,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{cnt}</div>}</button>;})}
      </div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
