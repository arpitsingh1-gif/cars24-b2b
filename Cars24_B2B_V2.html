<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cars24 B2B Partner Panel V2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
:root{--p:#ef6e0b;--pd:#d4620a;--pl:#fef4ec;--bg:#fafafa;--card:#fff;--sid:#0f0f10;--txt:#0f0f10;--sub:#717272;--brd:#ebebeb;--rad:12px;
--orange-500:#ef6e0b;--orange-600:#d4620a;--orange-100:#facfae;--orange-50:#fce7d6;--orange-0:#fef4ec;
--green-500:#4dbb3e;--green-700:#008400;--green-50:#e3f4dc;
--red-500:#b4272e;--red-50:#fceae8;
--blue-500:#0463f0;--blue-50:#eaf2ff;
--grey-50:#f5f5f5;--grey-100:#ebebeb;--grey-200:#d6d6d6;--grey-300:#b0b0b0;--grey-500:#717272;--grey-700:#414242;--grey-800:#262626;--grey-900:#0f0f10;
--yellow-500:#f4be34;--yellow-50:#fff8eb;
--purple-500:#7a5af8;--purple-50:#f4f3ff;
--teal-500:#0c6a64;--teal-50:#daf5f3;
--crimson-500:#f63d68;--crimson-50:#fff1f3;
--shadow-base:0px 0px 16px 0px rgba(0,0,0,.08)}
.sidebar{position:fixed;left:0;top:36px;bottom:0;width:230px;background:var(--sid);color:#fff;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar .logo-wrap{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sidebar .logo-text{font-size:22px;font-weight:800;color:#ed6b00;letter-spacing:-0.5px;line-height:1}
.sidebar .logo-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;font-weight:500}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-radius:8px;margin:2px 8px;font-size:13px;font-weight:500;transition:.15s;color:rgba(255,255,255,.6)}
.nav-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.nav-item.active{background:var(--p);color:#fff}
.nav-section{padding:8px 16px 4px;font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-weight:600}
.main{margin-left:230px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--brd);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.content{padding:20px 24px;flex:1}
.card{background:#fff;border-radius:var(--rad);border:1px solid var(--brd);padding:16px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.04)}
.card-hd{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--txt)}
.stat-card{background:#fff;border-radius:var(--rad);border:1px solid var(--brd);padding:16px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.stat-card:hover{border-color:var(--p);box-shadow:0 0 0 3px rgba(239,110,11,.08)}
.stat-val{font-size:22px;font-weight:700;color:var(--txt)}
.stat-lbl{font-size:12px;color:var(--sub)}
.stat-delta{font-size:12px;font-weight:600}
.delta-up{color:#008400}.delta-dn{color:#b4272e}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.g6{grid-template-columns:repeat(6,1fr)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:'DM Sans',sans-serif}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-out{background:#fff;color:var(--p);border:1.5px solid var(--p)}.btn-out:hover{background:var(--pl)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--brd)}.btn-ghost:hover{background:var(--grey-50)}
.btn-red{background:#b4272e;color:#fff}.btn-red:hover{background:#8f0015}
.btn-grn{background:#008400;color:#fff}.btn-grn:hover{background:#006600}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:12px;font-weight:600;color:var(--sub)}
.fld input,.fld select,.fld textarea{padding:8px 10px;border:1.5px solid var(--brd);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;color:var(--txt);transition:.15s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(239,110,11,.1)}
.fld textarea{resize:vertical;min-height:64px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:var(--blue-50);color:var(--blue-500)}
.badge-grn{background:var(--green-50);color:var(--green-700)}
.badge-red{background:var(--red-50);color:var(--red-500)}
.badge-org{background:var(--orange-0);color:var(--orange-500)}
.badge-prp{background:var(--purple-50);color:var(--purple-500)}
.badge-ylw{background:var(--yellow-50);color:#ca8a04}
.badge-sky{background:#e0f2fe;color:#0284c7}
.badge-gry{background:var(--grey-50);color:var(--grey-500)}
.badge-pnk{background:var(--crimson-50);color:var(--crimson-500)}
.badge-transacting{background:#dcfce7;color:#166534;border:1px solid #86efac;font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600}
.badge-non-transacting{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600}
.timeline-node{display:flex;gap:12px;padding-bottom:16px;position:relative}
.timeline-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--p);background:#fff;flex-shrink:0;margin-top:4px;z-index:1}
.timeline-dot.done{background:var(--p)}
.timeline-line{position:absolute;left:5px;top:16px;bottom:0;width:2px;background:var(--brd)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--sub);padding:8px 10px;border-bottom:2px solid var(--brd);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--brd);font-size:13px;vertical-align:middle}
tr:hover td{background:var(--grey-50)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;justify-content:flex-end}
.drawer{background:#fff;width:min(600px,100vw);height:100%;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.drawer-hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:min(520px,100%);max-height:90vh;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;max-width:320px;animation:slide-in .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast-success{background:#008400;color:#fff}
.toast-error{background:#b4272e;color:#fff}
.toast-info{background:#0463f0;color:#fff}
@keyframes slide-in{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
.step-bar{display:flex;align-items:center;gap:0;margin:8px 0;overflow-x:auto;padding-bottom:4px}
.step{display:flex;flex-direction:column;align-items:center;min-width:90px}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--brd);background:#fff;color:var(--sub);z-index:1;position:relative}
.step-circle.done{background:var(--p);border-color:var(--p);color:#fff}
.step-circle.active{background:#fff;border-color:var(--p);color:var(--p)}
.step-lbl{font-size:10px;color:var(--sub);margin-top:4px;text-align:center;white-space:nowrap}
.step-line{flex:1;height:2px;background:var(--brd);min-width:20px}
.step-line.done{background:var(--p)}
.search-box{position:relative;display:flex;align-items:center}
.search-box input{padding:8px 10px 8px 32px;border:1.5px solid var(--brd);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;min-width:200px}
.search-box input:focus{border-color:var(--p)}
.search-icon{position:absolute;left:9px;color:var(--sub);font-size:14px}
.sim-banner{background:linear-gradient(90deg,#ef6e0b,#d4620a);color:#fff;padding:6px 16px;font-size:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:nowrap;gap:8px;position:sticky;top:0;z-index:200;min-height:36px}
.role-switcher{display:flex;align-items:center;gap:8px}
.role-switcher select{padding:3px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.role-switcher select option,.role-switcher select optgroup{background:#1a1a2e;color:#fff}
.section-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:4px}
.section-sub{font-size:13px;color:var(--sub);margin-bottom:16px}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--brd);margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
.tab.active{color:var(--p);border-bottom-color:var(--p)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd);font-size:13px}
.info-row:last-child{border:none}
.info-lbl{color:var(--sub);font-weight:500}
.info-val{font-weight:600;text-align:right}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1.5px solid var(--brd);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;background:#fff}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--p)}
.empty-state{text-align:center;padding:48px 16px;color:var(--sub)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.priority-p0{background:#fceae8;color:#8f0015;border:1px solid #f2c1bb}
.priority-p1{background:var(--orange-0);color:#9a3412;border:1px solid var(--orange-100)}
.priority-p2{background:var(--yellow-50);color:#854d0e;border:1px solid #fde047}
.chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin:2px}
.prog-bar{height:6px;border-radius:3px;background:var(--brd);overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--p);transition:.3s}

/* ── CHANGE 3: New CSS Classes ─────────────────────────────── */
.float-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s}
.float-card:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 30px rgba(0,0,0,.12)}
.click-card{cursor:pointer;border:1.5px solid var(--brd);transition:border-color .15s,box-shadow .15s}
.click-card:hover{border-color:var(--p);box-shadow:0 0 0 3px rgba(239,110,11,.1)}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:8px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1}
.bar{width:100%;border-radius:4px 4px 0 0;background:var(--p);min-height:4px;transition:height .3s}
.bar-label{font-size:10px;color:var(--sub);margin-top:4px;text-align:center}
.bar-val{font-size:10px;font-weight:700;margin-bottom:2px}
.compare-badge{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:10px;font-size:11px;font-weight:700}
.compare-up{background:var(--green-50);color:#008400}
.compare-dn{background:var(--red-50);color:#b4272e}
.compare-flat{background:var(--grey-50);color:var(--grey-500)}
.nudge-btn{background:#fffbeb;color:#d97706;border:1.5px solid #fde68a;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.nudge-btn:hover{background:#fef3c7}
.withdraw-btn{background:#fff;color:#b4272e;border:1.5px solid #fca5a5;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.withdraw-btn:hover{background:#fef2f2}
.dealer-card{display:flex;gap:12px;align-items:flex-start;padding:14px}
.dealer-avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:16px;flex-shrink:0}
.dealer-stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.dealer-stat{text-align:center}
.dealer-stat-val{font-size:16px;font-weight:700}
.dealer-stat-lbl{font-size:10px;color:var(--sub)}
.insight-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch}
.insight-strip::-webkit-scrollbar{display:none}
.insight-chip{flex-shrink:0;background:#fff;border-radius:12px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);min-width:120px}
.mobile-fab{display:none;position:fixed;bottom:72px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--p);color:#fff;font-size:24px;border:none;box-shadow:0 4px 12px rgba(239,110,11,.4);cursor:pointer;z-index:90;align-items:center;justify-content:center}
.mobile-menu{display:none!important}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

/* Section insight strip */
.section-insight{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:500;margin-bottom:12px;border:1px solid}
.section-insight.good{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.section-insight.warn{background:#fffbeb;border-color:#fde68a;color:#92400e}
.section-insight.bad{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.section-insight .si-icon{font-size:16px;flex-shrink:0}
.section-insight .si-text{flex:1;line-height:1.4}
/* Pulse animation for critical items */
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.2)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}
.pulse-critical{animation:pulse-red 2s infinite}
/* Clickable stat enhancements */
.stat-card.clickable{cursor:pointer;position:relative;overflow:hidden}
.stat-card.clickable::after{content:"→";position:absolute;top:8px;right:10px;font-size:14px;color:var(--sub);opacity:0;transition:.15s}
.stat-card.clickable:hover::after{opacity:1}
.stat-card.clickable:active{transform:scale(.98)}
/* Swipe hint for mobile tables */
.tbl-swipe-hint{display:none;font-size:11px;color:var(--sub);text-align:right;padding:2px 0;margin-bottom:4px}
/* Skeleton pulse for loading */
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:400px 100%;animation:shimmer 1.5s infinite;border-radius:8px}
/* Quick action row */
.quick-actions{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
.quick-actions::-webkit-scrollbar{display:none}
.quick-action{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--brd);background:#fff;transition:.15s;white-space:nowrap}
.quick-action:hover{border-color:var(--p);background:var(--pl);color:var(--p)}
.quick-action .qa-icon{font-size:16px}
/* Enhanced mobile bottom sheet */
.bottom-sheet{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.12);z-index:200;max-height:60vh;overflow-y:auto;padding:16px}
.bottom-sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--grey-200);margin:0 auto 12px}

@media(max-width:768px){
.sidebar{transform:translateX(-100%);top:0}
.sidebar.open{transform:none}
.sidebar-overlay.open{display:block}
.main{margin-left:0}
.g4{grid-template-columns:repeat(2,1fr)}
.g5{grid-template-columns:repeat(2,1fr)}
.g6{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:1fr}
.g2{grid-template-columns:1fr}
.bottom-nav{display:flex!important}
.mobile-fab{display:flex}
.content{padding:12px;padding-bottom:70px}
.topbar{padding:0 12px;height:48px}
.topbar .mobile-menu{font-size:22px}
.float-card{border-radius:12px}
.stat-card{padding:10px}
.stat-val{font-size:16px}
.stat-lbl{font-size:11px}
.card{padding:12px}
.card-hd{font-size:14px;margin-bottom:8px}
.section-title{font-size:15px}
.section-sub{font-size:12px;margin-bottom:10px}
table{font-size:11px}
td,th{padding:5px 6px}
.tbl-swipe-hint{display:block}
.mobile-menu{display:block!important}
.drawer{width:100vw}
.modal{width:calc(100% - 16px);padding:14px}
.sim-banner{font-size:9px;padding:4px 8px;gap:4px}
.sim-banner .role-switcher{gap:4px}
.sim-banner .role-switcher select{font-size:10px;padding:2px 4px}
.filter-bar{gap:4px}
.filter-bar select,.filter-bar input{font-size:11px;padding:5px 8px}
.btn{padding:7px 12px;font-size:12px}
.btn-sm{padding:4px 8px;font-size:11px}
.search-box input{min-width:140px;font-size:12px}
.dealer-card{padding:10px;flex-direction:column}
.dealer-stats{gap:10px}
.insight-strip{gap:6px}
.insight-chip{padding:8px 10px;min-width:100px}
.quick-actions{gap:6px}
.quick-action{padding:6px 10px;font-size:11px}
.section-insight{padding:8px 10px;font-size:11px}
.logo-wrap{padding:14px 12px 10px}
.nav-item{padding:8px 12px;font-size:12px}
.badge{font-size:10px;padding:1px 6px}
.alert{padding:8px 10px;font-size:12px}
.step{min-width:70px}
.step-circle{width:24px;height:24px;font-size:11px}
.step-lbl{font-size:9px}
}
@media(max-width:400px){
.g4{grid-template-columns:1fr}
.g2{grid-template-columns:1fr}
.stat-val{font-size:14px}
.content{padding:8px;padding-bottom:70px}
.sim-banner{flex-direction:column;align-items:flex-start}
}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--brd);z-index:100;padding:8px 0}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;color:var(--sub);min-height:44px;justify-content:center}
.bottom-nav-item.active{color:var(--p)}
.tooltip{position:relative}
.tooltip:hover .tip{display:block}
.tip{display:none;position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:var(--grey-900);color:#fff;padding:4px 8px;border-radius:5px;font-size:11px;white-space:nowrap;z-index:999}
.ai-fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#4535F1,#6366f1);color:#fff;font-size:24px;border:none;box-shadow:0 4px 16px rgba(69,53,241,.4);cursor:pointer;z-index:400;display:flex;align-items:center;justify-content:center;transition:.2s}
.ai-fab:hover{transform:scale(1.1)}
.ai-chat-panel{position:fixed;bottom:140px;right:20px;width:380px;max-height:520px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:401;display:flex;flex-direction:column;overflow:hidden}
.ai-chat-hd{background:linear-gradient(135deg,#4535F1,#6366f1);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.ai-chat-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;max-height:340px;min-height:200px}
.ai-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-wrap:break-word}
.ai-msg.user{background:#4535F1;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-msg.bot{background:#f1f5f9;color:#1e293b;align-self:flex-start;border-bottom-left-radius:4px}
.ai-msg.system{background:#fef3c7;color:#92400e;align-self:center;font-size:11px;text-align:center;border-radius:8px}
.ai-chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--brd)}
.ai-chat-input input{flex:1;padding:8px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.ai-chat-input input:focus{border-color:#4535F1}
.ai-chat-input button{background:#4535F1;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px}
@media(max-width:768px){.ai-chat-panel{right:8px;left:8px;width:auto;bottom:80px;max-height:70vh}.ai-fab{bottom:72px;right:12px;width:44px;height:44px;font-size:20px}}
.divider{height:1px;background:var(--brd);margin:8px 0}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;background:var(--pl);color:var(--p)}
input[type=checkbox]{accent-color:var(--p);width:14px;height:14px}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;display:flex;align-items:flex-start;gap:8px}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-info{background:var(--blue-50);border:1px solid #cde0fc;color:#234296}
.alert-err{background:var(--red-50);border:1px solid #f2c1bb;color:#8f0015}
.alert-ok{background:var(--green-50);border:1px solid #cfebc5;color:#008400}
</style>

function getMonthLabel(ym){
  if(!ym)return "--";
  var parts=ym.split("-");
  var mNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var mIdx=parseInt(parts[1],10)-1;
  var yr=parts[0].slice(2);
  return mNames[mIdx]+"'"+yr;
}

function getCompareRange(type){
  var now=new Date();
  var pad=function(n){return String(n).padStart(2,"0")};
  var ym=function(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)};
  var fmtD=function(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())};
  if(type==="MTD vs LMTD"){
    var curStart=new Date(now.getFullYear(),now.getMonth(),1);
    var prevStart=new Date(now.getFullYear(),now.getMonth()-1,1);
    var prevEnd=new Date(now.getFullYear(),now.getMonth()-1,now.getDate());
    return{current:{start:fmtD(curStart),end:fmtD(now)},previous:{start:fmtD(prevStart),end:fmtD(prevEnd)}};
  }
  if(type==="3 Months"){
    var c3=[];var p3=[];
    for(var i=0;i<3;i++){var d1=new Date(now.getFullYear(),now.getMonth()-i,1);c3.push(ym(d1))}
    for(var j=3;j<6;j++){var d2=new Date(now.getFullYear(),now.getMonth()-j,1);p3.push(ym(d2))}
    return{current:{months:c3},previous:{months:p3}};
  }
  if(type==="6 Months"){
    var c6=[];var p6=[];
    for(var i2=0;i2<6;i2++){var d3=new Date(now.getFullYear(),now.getMonth()-i2,1);c6.push(ym(d3))}
    for(var j2=6;j2<12;j2++){var d4=new Date(now.getFullYear(),now.getMonth()-j2,1);p6.push(ym(d4))}
    return{current:{months:c6},previous:{months:p6}};
  }
  if(type==="Quarter"){
    var q=Math.floor(now.getMonth()/3);
    var cq=[];var pq=[];
    for(var i3=0;i3<3;i3++){var d5=new Date(now.getFullYear(),q*3+i3,1);cq.push(ym(d5))}
    for(var j3=0;j3<3;j3++){var d6=new Date(now.getFullYear(),(q-1)*3+j3,1);pq.push(ym(d6))}
    return{current:{months:cq},previous:{months:pq}};
  }
  return{current:{start:fmtD(now),end:fmtD(now)},previous:{start:fmtD(now),end:fmtD(now)}};
}

function getDealerGrievanceInsights(grievances,apps){
  var byDealer={};
  grievances.forEach(function(g){
    var app=apps.find(function(a){return a.id===g.appId});
    var dName=app&&app.dealerName?app.dealerName:(g.dealerName||"Unknown");
    if(!byDealer[dName])byDealer[dName]={total:0,open:0,byPriority:{},byCat:{},topCat:""};
    var d=byDealer[dName];
    d.total++;
    if(g.status==="Open"||g.status==="In Progress")d.open++;
    d.byPriority[g.priority]=(d.byPriority[g.priority]||0)+1;
    d.byCat[g.category]=(d.byCat[g.category]||0)+1;
  });
  Object.keys(byDealer).forEach(function(k){
    var d=byDealer[k];
    var topCat="";var topN=0;
    Object.keys(d.byCat).forEach(function(c){if(d.byCat[c]>topN){topN=d.byCat[c];topCat=c}});
    d.topCat=topCat+" ("+topN+")";
  });
  return byDealer;
}

function pctChange(current,previous){
  if(!previous&&previous!==0)return "N/A";
  if(previous===0&&current===0)return "0%";
  if(previous===0)return "+100%";
  var pct=((current-previous)/Math.abs(previous))*100;
  var sign=pct>0?"+":"";
  return sign+pct.toFixed(1)+"%";
}

function currentMonth(){

function lastNMonths(n){
  var result=[];
  var now=new Date();
  for(var i=0;i<n;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    result.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));
  }
  return result;
}

function fmtCompact(n){
  if(!n&&n!==0)return "--";
  if(Math.abs(n)>=10000000)return "\u20B9"+(n/10000000).toFixed(1)+" Cr";
  if(Math.abs(n)>=100000)return "\u20B9"+(n/100000).toFixed(1)+"L";
  if(Math.abs(n)>=1000)return "\u20B9"+(n/1000).toFixed(1)+"K";
  return "\u20B9"+n;
}

function DateRangeFilter({value,onChange}){
  const presets=["Today","Yesterday","MTD","LMTD","Last 7 Days","Last 30 Days","Custom"];
  const getRange=(p)=>{
    const now=new Date();
    const pad=n=>String(n).padStart(2,"0");
    const fmt2=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
    if(p==="Today"){const s=fmt2(now);return{start:s,end:s}}
    if(p==="Yesterday"){const d=new Date(now);d.setDate(d.getDate()-1);const s=fmt2(d);return{start:s,end:s}}
    if(p==="MTD"){return{start:fmt2(new Date(now.getFullYear(),now.getMonth(),1)),end:fmt2(now)}}
    if(p==="LMTD"){const lm=new Date(now.getFullYear(),now.getMonth()-1,1);const lme=new Date(now.getFullYear(),now.getMonth()-1,now.getDate());return{start:fmt2(lm),end:fmt2(lme)}}
    if(p==="Last 7 Days"){const d=new Date(now);d.setDate(d.getDate()-6);return{start:fmt2(d),end:fmt2(now)}}
    if(p==="Last 30 Days"){const d=new Date(now);d.setDate(d.getDate()-29);return{start:fmt2(d),end:fmt2(now)}}
    return{start:"",end:""};
  };
  const [preset,setPreset]=useState("MTD");
  const [custom,setCustom]=useState({start:"",end:""});
  useEffect(()=>{
    if(preset!=="Custom"){const r=getRange(preset);onChange(r);}
  },[preset]);
  return React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},

    ),
    preset==="Custom"&&React.createElement(React.Fragment,null,
      React.createElement("input",{type:"date",value:custom.start,onChange:e=>{const v={...custom,start:e.target.value};setCustom(v);onChange(v)},style:{padding:"6px 10px",border:"1.5px solid var(--brd)",borderRadius:7,fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none"}}),
      React.createElement("span",{style:{color:"#64748b"}},"to"),
      React.createElement("input",{type:"date",value:custom.end,onChange:e=>{const v={...custom,end:e.target.value};setCustom(v);onChange(v)},style:{padding:"6px 10px",border:"1.5px solid var(--brd)",borderRadius:7,fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none"}})
    )

// ═════════════════════════════════════════════════════════════════════════════
// AI INSIGHTS ENGINE
// ═════════════════════════════════════════════════════════════════════════════

function generateInsights(user,leads,apps,dealers,grievances,payouts,onboarding){
  var insights=[];
  var cm=currentMonth();
  var lm=lastNMonths(2)[1]||cm;
  var role=user.role;
  var sev=function(s){return s}; // severity helper

  // ── UNIVERSAL INSIGHTS (all roles) ──────────────────────────────
  var totalLeads=leads.length;
  var siDone=leads.filter(function(l){return l.stage==="SI Done"}).length;
  var convRate=totalLeads>0?Math.round((siDone/totalLeads)*100):0;
  insights.push({type:"metric",severity:convRate<30?"warn":"good",icon:"📈",title:"Overall Conversion",body:convRate+"% — "+siDone+"/"+totalLeads+" leads",text:"SI conversion rate is "+convRate+"% ("+siDone+"/"+totalLeads+" leads). "+(convRate<30?"Below 30% threshold — needs attention.":"Healthy conversion rate."),scope:"all"});

  var openGrv=grievances.filter(function(g){return g.status==="Open"||g.status==="In Progress"}).length;
  var p0Open=grievances.filter(function(g){return g.priority==="P0"&&(g.status==="Open"||g.status==="In Progress")}).length;
  if(p0Open>0)insights.push({type:"alert",severity:"critical",icon:"🚨",title:p0Open+" Critical Grievance"+(p0Open>1?"s":"")+" Open",body:"Immediate escalation required",text:"P0 grievances require immediate attention. Escalation threshold may be breached.",scope:"all"});

  // ── RA / RM INSIGHTS ────────────────────────────────────────────
  if(role==="RA"||role==="RM"){
    var raIds=[user.id];
    if(role==="RM"&&user.raIds)raIds=[user.id].concat(user.raIds);
    var myDealers=dealers.filter(function(d){return raIds.indexOf(d.raId)!==-1&&d.status==="Active"});
    var myLeads=leads.filter(function(l){return raIds.indexOf(l.raId)!==-1});

    // Inactive dealers
    var inactive=myDealers.filter(function(d){
      var last3=lastNMonths(3);
      var any=false;
      last3.forEach(function(m){if(isTransacting(d.id,m))any=true});
      return !any;
    });
    if(inactive.length>0)insights.push({type:"action",severity:"warn",icon:"💤",title:inactive.length+" Inactive Dealer"+(inactive.length>1?"s":""),text:inactive.map(function(d){return d.name}).join(", ")+" — no SIs in last 3 months. Consider a visit or outreach.",scope:"field"});

    // Stuck leads
    var stuckLeads=myLeads.filter(function(l){return l.stage!=="SI Done"&&diffDays(l.createdAt,nowTs())>15});
    if(stuckLeads.length>0)insights.push({type:"action",severity:"warn",icon:"⏳",title:stuckLeads.length+" Lead"+(stuckLeads.length>1?"s":"")+" Stuck >15 Days",text:"These leads haven't progressed: "+stuckLeads.slice(0,3).map(function(l){return l.regNo+" ("+l.stage+")"}).join(", ")+(stuckLeads.length>3?" +more":""),scope:"field"});

    // Top performing dealer
    var dealerRevs=myDealers.map(function(d){var s=getDealerMonthlyStats(d.id,lm);return{name:d.name,rev:s.revenue}}).sort(function(a,b){return b.rev-a.rev});
    if(dealerRevs.length>0&&dealerRevs[0].rev>0)insights.push({type:"insight",severity:"good",icon:"⭐",title:"Top Dealer: "+dealerRevs[0].name,text:"Generated "+fmtCompact(dealerRevs[0].rev)+" revenue last month. Keep nurturing this relationship.",scope:"field"});

    // Pending payouts nudge suggestion
    var pendingPR=payouts.filter(function(p){return raIds.indexOf(p.raId)!==-1&&p.status!=="Approved"&&p.status!=="Rejected"&&p.status!=="Withdrawn"});
    if(pendingPR.length>0){
      var oldPR=pendingPR.filter(function(p){return diffDays(p.requestedAt,nowTs())>5});
      if(oldPR.length>0)insights.push({type:"action",severity:"warn",icon:"💸",title:oldPR.length+" Payout"+(oldPR.length>1?"s":"")+" Pending >5 Days",text:"Consider nudging: "+oldPR.slice(0,2).map(function(p){return p.id+" ("+fmt(p.amount)+")"}).join(", "),scope:"field"});
    }

    // RM-specific: RA productivity comparison
    if(role==="RM"&&user.raIds&&user.raIds.length>0){
      var raPerf=user.raIds.map(function(raId){
        var raLeads=leads.filter(function(l){return l.raId===raId});
        var raSIs=raLeads.filter(function(l){return l.stage==="SI Done"}).length;
        return{name:userName(raId),leads:raLeads.length,sis:raSIs,rate:raLeads.length>0?Math.round((raSIs/raLeads.length)*100):0};
      });
      var lowPerf=raPerf.filter(function(r){return r.rate<25&&r.leads>2});
      if(lowPerf.length>0)insights.push({type:"insight",severity:"warn",icon:"📊",title:"RA Productivity Alert",text:lowPerf.map(function(r){return r.name+" ("+r.rate+"% conversion)"}).join(", ")+" — below 25% SI rate. May need coaching.",scope:"field"});
    }
  }

  // ── TM / BH / CENTRAL OPS INSIGHTS ─────────────────────────────
  if(role==="TM"||role==="Business Head"||role==="Central Ops"){
    var allActive=dealers.filter(function(d){return d.status==="Active"});
    var allDealerIds=allActive.map(function(d){return d.id});
    var currRev=aggregateDealerStats(allDealerIds,[cm]).revenue;
    var prevRev=aggregateDealerStats(allDealerIds,[lm]).revenue;
    var revChange=prevRev>0?Math.round(((currRev-prevRev)/prevRev)*100):0;

    // Dealer churn risk
    var churnRisk=allActive.filter(function(d){
      var last2=lastNMonths(2);var anyTx=false;
      last2.forEach(function(m){if(isTransacting(d.id,m))anyTx=true});return !anyTx;
    });
    if(churnRisk.length>0)insights.push({type:"alert",severity:"critical",icon:"📉",title:churnRisk.length+" Dealer"+(churnRisk.length>1?"s":"")+" at Churn Risk",body:churnRisk.slice(0,4).map(function(d){return d.name}).join(", ")+" — no transactions in 2 months.",text:churnRisk.slice(0,4).map(function(d){return d.name}).join(", ")+" — no transactions in 2 months. Immediate intervention recommended.",scope:"leadership"});

    // Revenue trend
    insights.push({type:"metric",severity:revChange<0?"warn":"good",icon:"💰",title:"Revenue Trend: "+(revChange>=0?"+":"")+revChange+"%",body:"MTD: "+fmtCompact(currRev)+" vs LM: "+fmtCompact(prevRev),text:"Current month: "+fmtCompact(currRev)+" vs last month: "+fmtCompact(prevRev)+". "+(revChange<0?"Declining — investigate dealer activity.":"Positive trajectory."),scope:"leadership"});

    // MTD dealer transacting rate
    var txCount=allActive.filter(function(d){return isTransacting(d.id,cm)}).length;
    var txRate=allActive.length>0?Math.round((txCount/allActive.length)*100):0;
    insights.push({type:"metric",severity:txRate<50?"warn":"good",icon:"🏪",title:"Dealer Transaction Rate: "+txRate+"%",body:txCount+"/"+allActive.length+" dealers transacting MTD",text:txCount+" of "+allActive.length+" active dealers have transacted this month. "+(txRate<50?"Below 50% — push field teams.":"Healthy activity level."),scope:"leadership"});

    // Approval bottlenecks
    var pendingApprovals=payouts.filter(function(p){return p.status==="Central Ops Review"||p.status==="BH Review"||p.status==="Finance Review"});
    var totalPendingAmt=pendingApprovals.reduce(function(s,p){return s+p.amount},0);
    if(pendingApprovals.length>0)insights.push({type:"action",severity:pendingApprovals.length>3?"critical":"warn",icon:"🔒",title:pendingApprovals.length+" Payouts in Approval Pipeline",body:fmt(totalPendingAmt)+" total pending",text:fmt(totalPendingAmt)+" total value stuck in approvals. Clearing these will improve RA satisfaction and dealer retention.",scope:"leadership"});

    // Onboarding backlog
    var pendingOB=onboarding.filter(function(o){return o.status==="Pending"});
    if(pendingOB.length>0)insights.push({type:"action",severity:"warn",icon:"📝",title:pendingOB.length+" Onboarding"+(pendingOB.length>1?"s":"")+" Pending",body:pendingOB.map(function(o){return o.dealerName}).join(", "),text:pendingOB.map(function(o){return o.dealerName}).join(", ")+" awaiting approval. Delays impact new dealer activation.",scope:"leadership"});

    // RA workload imbalance
    var raWorkloads=ALL_USERS.filter(function(u){return u.role==="RA"}).map(function(u){
      return{name:u.name,count:leads.filter(function(l){return l.raId===u.id}).length};
    });
    var maxLoad=Math.max.apply(null,raWorkloads.map(function(r){return r.count}));
    var minLoad=Math.min.apply(null,raWorkloads.map(function(r){return r.count}));
    if(maxLoad>0&&(maxLoad-minLoad)>maxLoad*0.5)insights.push({type:"insight",severity:"warn",icon:"⚖️",title:"RA Workload Imbalance",body:"Gap: "+maxLoad+" vs "+minLoad+" leads",text:"Lead distribution is uneven. Highest: "+raWorkloads.filter(function(r){return r.count===maxLoad})[0].name+" ("+maxLoad+"), Lowest: "+raWorkloads.filter(function(r){return r.count===minLoad})[0].name+" ("+minLoad+"). Consider rebalancing via Data Transfer.",scope:"leadership"});

    // SI funnel efficiency
    var inspDone=leads.filter(function(l){return stageIdx(l.stage)>=2}).length;
    var inspToSI=inspDone>0?Math.round((siDone/inspDone)*100):0;
    insights.push({type:"metric",severity:inspToSI<50?"warn":"good",icon:"🔬",title:"Inspection→SI Rate: "+inspToSI+"%",body:siDone+" SIs from "+inspDone+" inspections",text:siDone+" SIs completed from "+inspDone+" inspections. "+(inspToSI<50?"Below 50% — negotiation or quality issue.":"Good funnel conversion."),scope:"leadership"});

    // Central Ops specific: High payout raises (>2L)
    if(role==="Central Ops"||role==="Business Head"){
      var highPayouts=payouts.filter(function(p){return p.amount>=200000});
      if(highPayouts.length>0)insights.push({type:"alert",severity:"warn",icon:"💎",title:highPayouts.length+" High-Value Payout"+(highPayouts.length>1?"s":"")+" (≥₹2L)",body:highPayouts.map(function(p){return p.id+" "+fmt(p.amount)}).slice(0,2).join(", "),text:"Payouts ≥₹2L need elevated scrutiny. Raised: "+highPayouts.slice(0,3).map(function(p){return p.id+" ("+fmt(p.amount)+")"}).join(", ")+". Verify app details before approving.",scope:"ops"});

      // Duplicate SAP/counter pattern (same dealer multiple requests)
      var sapByDealer={};
      payouts.forEach(function(p){if(p.type==="SAP"||p.type==="Wallet Topup"){sapByDealer[p.dealerName]=(sapByDealer[p.dealerName]||0)+1}});
      var dupSAP=Object.keys(sapByDealer).filter(function(k){return sapByDealer[k]>=3});
      if(dupSAP.length>0)insights.push({type:"alert",severity:"warn",icon:"⚠️",title:"Potential Duplicate SAP/Topup Requests",body:dupSAP.join(", ")+" — "+dupSAP.map(function(k){return sapByDealer[k]+"x"}).join(", "),text:dupSAP.join(", ")+" have raised 3+ SAP/Topup requests. Check for duplicate or fraudulent patterns.",scope:"ops"});
    }

    // BH-specific: org health score
    if(role==="Business Head"){
      var activeRate=Math.round((allActive.length/(dealers.length||1))*100);
      var grvRate=grievances.length>0?Math.round((openGrv/(grievances.length))*100):0;
      var health=Math.round((convRate*0.3)+(activeRate*0.3)+((100-grvRate)*0.2)+((revChange>0?Math.min(revChange,20):0)*0.2));
      insights.push({type:"metric",severity:health>60?"good":health>40?"warn":"critical",icon:"🏥",title:"Org Health Score: "+health+"/100",body:"Conv "+convRate+"% | Active "+activeRate+"% | GRV "+(100-grvRate)+"%",text:"Conversion: "+convRate+"% | Active Dealers: "+activeRate+"% | Grievance Resolution: "+(100-grvRate)+"% | Revenue Growth: "+(revChange>=0?"+":"")+revChange+"%",scope:"leadership"});

      // Region-wise lead distribution
      var regionMap={};
      leads.forEach(function(l){regionMap[l.region||"Unknown"]=(regionMap[l.region||"Unknown"]||0)+1});
      var topRegion=Object.keys(regionMap).sort(function(a,b){return regionMap[b]-regionMap[a]})[0];
      if(topRegion)insights.push({type:"insight",severity:"good",icon:"🗺️",title:"Top Region: "+topRegion,body:regionMap[topRegion]+" leads — "+Math.round((regionMap[topRegion]/leads.length)*100)+"% of total",text:topRegion+" leads the portfolio with "+regionMap[topRegion]+" leads ("+Math.round((regionMap[topRegion]/leads.length)*100)+"% share). Expand if market potential exists.",scope:"leadership"});
    }
  }

  // ── FINANCE INSIGHTS ────────────────────────────────────────────
  if(role==="Finance"){
    var approved=payouts.filter(function(p){return p.status==="Approved"});
    var rejected=payouts.filter(function(p){return p.status==="Rejected"});
    var approvedAmt=approved.reduce(function(s,p){return s+p.amount},0);
    var rejRate=payouts.length>0?Math.round((rejected.length/payouts.length)*100):0;
    insights.push({type:"metric",severity:"good",icon:"💳",title:"Disbursement Summary",text:fmt(approvedAmt)+" released across "+approved.length+" payouts. Rejection rate: "+rejRate+"%.",scope:"finance"});

    var highVal=payouts.filter(function(p){return p.amount>50000&&p.status!=="Approved"&&p.status!=="Rejected"});
    if(highVal.length>0)insights.push({type:"action",severity:"warn",icon:"⚠️",title:highVal.length+" High-Value Payout"+(highVal.length>1?"s":"")+" Pending",text:"Payouts >50K awaiting review: "+highVal.slice(0,3).map(function(p){return p.id+" ("+fmt(p.amount)+")"}).join(", "),scope:"finance"});
  }

  // ── SUPPORT OPS INSIGHTS ────────────────────────────────────────
  if(role==="Support Ops"){
    var avgAge=openGrv>0?Math.round(grievances.filter(function(g){return g.status==="Open"||g.status==="In Progress"}).reduce(function(s,g){return s+diffDays(g.raisedAt,nowTs())},0)/openGrv):0;
    if(avgAge>7)insights.push({type:"alert",severity:"critical",icon:"⏰",title:"Avg Open Ticket Age: "+avgAge+" Days",text:"Open tickets are aging beyond SLA. Prioritize oldest P0/P1 first.",scope:"support"});

    var repeatDealers={};
    grievances.forEach(function(g){var k=g.dealerName||"Unknown";repeatDealers[k]=(repeatDealers[k]||0)+1});
    var repeaters=Object.keys(repeatDealers).filter(function(k){return repeatDealers[k]>=3}).map(function(k){return k+" ("+repeatDealers[k]+")"});
    if(repeaters.length>0)insights.push({type:"insight",severity:"warn",icon:"🔁",title:"Repeat Grievance Dealers",text:repeaters.join(", ")+" — systemic issues likely. Consider proactive outreach.",scope:"support"});
  }

  // ── DEALER INSIGHTS ─────────────────────────────────────────────
  if(role==="Dealer"){
    var myLeads=leads.filter(function(l){return l.dealerId===user.dealerId});
    var myStats=getDealerMonthlyStats(user.dealerId,cm);
    var prevStats=getDealerMonthlyStats(user.dealerId,lm);

    if(myStats.sis>prevStats.sis)insights.push({type:"metric",severity:"good",icon:"🎉",title:"SIs Up This Month!",text:"You've done "+myStats.sis+" SIs this month vs "+prevStats.sis+" last month. Great momentum!",scope:"dealer"});
    else if(myStats.sis<prevStats.sis&&prevStats.sis>0)insights.push({type:"action",severity:"warn",icon:"📉",title:"SI Count Below Last Month",text:myStats.sis+" SIs this month vs "+prevStats.sis+" last month. Push pending leads to close the gap.",scope:"dealer"});

    var stuckMyLeads=myLeads.filter(function(l){return l.stage!=="SI Done"&&diffDays(l.createdAt,nowTs())>10});
    if(stuckMyLeads.length>0)insights.push({type:"action",severity:"warn",icon:"⏳",title:stuckMyLeads.length+" Lead"+(stuckMyLeads.length>1?"s":"")+" Need Attention",text:"Leads stuck >10 days: "+stuckMyLeads.slice(0,2).map(function(l){return l.make+" "+l.model}).join(", ")+". Follow up with your RA.",scope:"dealer"});

    var earnings=(myStats.splitEarnings||0)+(myStats.incentiveEarnings||0);
    if(earnings>0)insights.push({type:"metric",severity:"good",icon:"💰",title:"Earnings This Month: "+fmtCompact(earnings),text:"Split: "+fmtCompact(myStats.splitEarnings||0)+" + Incentive: "+fmtCompact(myStats.incentiveEarnings||0),scope:"dealer"});
  }

  return insights;
}

        React.createElement("div",{style:{fontSize:24,fontWeight:800,color:"#dc2626"}},critCount),
        React.createElement("div",{style:{fontSize:11,color:"#64748b"}},"Critical")
      ),
      React.createElement(Card,{style:{background:warnCount>0?"#fffbeb":"#f8fafc",cursor:"pointer",textAlign:"center"},onClick:function(){setFilter(filter==="action"?"all":"action")}},
        React.createElement("div",{style:{fontSize:24,fontWeight:800,color:"#d97706"}},warnCount),
        React.createElement("div",{style:{fontSize:11,color:"#64748b"}},"Warnings")
      ),
      React.createElement(Card,{style:{background:"#f0fdf4",cursor:"pointer",textAlign:"center"},onClick:function(){setFilter(filter==="metric"?"all":"metric")}},
        React.createElement("div",{style:{fontSize:24,fontWeight:800,color:"#16a34a"}},goodCount),
        React.createElement("div",{style:{fontSize:11,color:"#64748b"}},"Positive")
      )
    ),
    React.createElement("div",{style:{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}},
      ["all","alert","action","insight","metric"].map(function(t){
        return React.createElement("button",{key:t,onClick:function(){setFilter(t)},style:{padding:"4px 12px",borderRadius:20,border:filter===t?"2px solid var(--p)":"1px solid var(--brd)",background:filter===t?"#fff7ed":"#fff",fontSize:11,fontWeight:600,cursor:"pointer",color:filter===t?"var(--p)":"#64748b"}},
          t==="all"?"All ("+insights.length+")":typeLabel(t)+" ("+insights.filter(function(i){return i.type===t}).length+")"
        );
      })
    ),
    filtered.map(function(ins,idx){
      var c=sevColor(ins.severity);
      return React.createElement(Card,{key:idx,style:{marginBottom:10,borderLeft:"4px solid "+c.border,background:c.bg}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
            React.createElement("span",{style:{fontSize:20}},ins.icon),
            React.createElement("div",null,
              React.createElement("div",{style:{fontWeight:700,fontSize:14,color:c.text}},ins.title),
              React.createElement("span",{style:{fontSize:10,padding:"2px 6px",borderRadius:4,background:c.border,color:c.text,fontWeight:600}},typeLabel(ins.type))
            )
          )
        ),

function buildAgentContext(user,leads,apps,dealers,grievances,payouts){
  var role=user.role;
  var cm=currentMonth();
  var ctx="You are an AI assistant for the Cars24 B2B procurement panel. ";
  ctx+="Current user: "+user.name+" ("+role+"). Current month: "+cm+". ";

  if(role==="RA"||role==="RM"){
    var raIds=[user.id];
    if(role==="RM"&&user.raIds)raIds=[user.id].concat(user.raIds);
    var myDealers=dealers.filter(function(d){return raIds.indexOf(d.raId)!==-1});
    var myLeads=leads.filter(function(l){return raIds.indexOf(l.raId)!==-1});
    ctx+="Portfolio: "+myDealers.length+" dealers, "+myLeads.length+" leads. ";
    ctx+="Active dealers: "+myDealers.filter(function(d){return d.status==="Active"}).length+". ";
    ctx+="SI done: "+myLeads.filter(function(l){return l.stage==="SI Done"}).length+". ";
    myDealers.forEach(function(d){
      var s=getDealerMonthlyStats(d.id,cm);
      ctx+=d.name+": "+s.leads+" leads, "+s.sis+" SIs, rev "+fmtCompact(s.revenue)+", "+(isTransacting(d.id,cm)?"transacting":"non-transacting")+". ";
    });
    var pendPR=payouts.filter(function(p){return raIds.indexOf(p.raId)!==-1&&p.status!=="Approved"&&p.status!=="Rejected"});
    ctx+="Pending payouts: "+pendPR.length+" ("+fmtCompact(pendPR.reduce(function(s,p){return s+p.amount},0))+"). ";
  }

  if(role==="TM"||role==="Business Head"||role==="Central Ops"){
    var allActive=dealers.filter(function(d){return d.status==="Active"});
    ctx+="Org: "+allActive.length+" active dealers, "+leads.length+" total leads, "+leads.filter(function(l){return l.stage==="SI Done"}).length+" SIs. ";
    ctx+="Open grievances: "+grievances.filter(function(g){return g.status==="Open"||g.status==="In Progress"}).length+". ";
    ctx+="Pending approvals: "+payouts.filter(function(p){return p.status!=="Approved"&&p.status!=="Rejected"}).length+". ";
    var allIds=allActive.map(function(d){return d.id});
    var lm=lastNMonths(2)[1]||cm;
    ctx+="Revenue this month: "+fmtCompact(aggregateDealerStats(allIds,[cm]).revenue)+", last month: "+fmtCompact(aggregateDealerStats(allIds,[lm]).revenue)+". ";
    allActive.forEach(function(d){
      var s=getDealerMonthlyStats(d.id,cm);
      ctx+=d.name+"("+d.id+"): "+s.sis+" SIs, "+fmtCompact(s.revenue)+" rev. ";
    });
    ALL_USERS.filter(function(u){return u.role==="RA"}).forEach(function(u){
      var raL=leads.filter(function(l){return l.raId===u.id});
      ctx+="RA "+u.name+": "+raL.length+" leads, "+raL.filter(function(l){return l.stage==="SI Done"}).length+" SIs. ";
    });
  }

  if(role==="Finance"){
    var approved=payouts.filter(function(p){return p.status==="Approved"});
    var pending=payouts.filter(function(p){return p.status!=="Approved"&&p.status!=="Rejected"});
    ctx+="Payouts: "+payouts.length+" total, "+approved.length+" approved ("+fmtCompact(approved.reduce(function(s,p){return s+p.amount},0))+"), "+pending.length+" pending ("+fmtCompact(pending.reduce(function(s,p){return s+p.amount},0))+"). ";
  }

  if(role==="Support Ops"){
    ctx+="Grievances: "+grievances.length+" total, "+grievances.filter(function(g){return g.status==="Open"}).length+" open, "+grievances.filter(function(g){return g.priority==="P0"}).length+" P0. ";
    var cats={};grievances.forEach(function(g){cats[g.category]=(cats[g.category]||0)+1});
    ctx+="Categories: "+Object.keys(cats).map(function(c){return c+"("+cats[c]+")"}).join(", ")+". ";
  }

  if(role==="Dealer"){
    var myLeads=leads.filter(function(l){return l.dealerId===user.dealerId});
    var myStats=getDealerMonthlyStats(user.dealerId,cm);
    ctx+="Your leads: "+myLeads.length+", SIs this month: "+myStats.sis+", revenue: "+fmtCompact(myStats.revenue)+". ";
    ctx+="Earnings: split "+fmtCompact(myStats.splitEarnings||0)+", incentive "+fmtCompact(myStats.incentiveEarnings||0)+". ";
    ctx+="Your stages: "+myLeads.map(function(l){return l.make+" "+l.model+"("+l.stage+")"}).join(", ")+". ";
  }

  ctx+="Keep responses concise (2-4 sentences). Focus on actionable insights relevant to this "+role+" role. Use Indian currency format.";
  return ctx;
}

function AIAgentChat({user,leads,apps,dealers,grievances,payouts}){
  var [open,setOpen]=useState(false);
  var [apiKey,setApiKey]=useState(function(){try{return localStorage.getItem("c24_ai_key")||""}catch(e){return ""}});
  var [messages,setMessages]=useState([{role:"system",text:"Hi "+user.name+"! I'm your AI assistant. Ask me anything about your "+user.role+" data. You'll need an API key to get started."}]);
  var [input,setInput]=useState("");
  var [loading,setLoading]=useState(false);
  var bodyRef=useRef(null);

  function saveKey(k){
    setApiKey(k);
    try{localStorage.setItem("c24_ai_key",k)}catch(e){}
  }

  function scrollBottom(){
    if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;
  }

  function sendMessage(){
    if(!input.trim())return;
    if(!apiKey){
      setMessages(function(p){return p.concat([{role:"system",text:"Please enter your Claude API key above to start chatting."}])});
      return;
    }
    var userMsg=input.trim();
    setInput("");
    setMessages(function(p){return p.concat([{role:"user",text:userMsg}])});
    setLoading(true);
    setTimeout(scrollBottom,50);

    var ctx=buildAgentContext(user,leads,apps,dealers,grievances,payouts);
    var apiMessages=[
      {role:"user",content:ctx+"\n\nUser question: "+userMsg}
    ];

    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:300,messages:apiMessages})
    }).then(function(r){return r.json()}).then(function(data){
      var reply="Sorry, I couldn't process that.";
      if(data&&data.content&&data.content[0]&&data.content[0].text){
        reply=data.content[0].text;
      }else if(data&&data.error&&data.error.message){
        reply="Error: "+data.error.message;
      }
      setMessages(function(p){return p.concat([{role:"bot",text:reply}])});
      setLoading(false);
      setTimeout(scrollBottom,50);
    }).catch(function(err){
      setMessages(function(p){return p.concat([{role:"bot",text:"Network error: "+(err&&err.message?err.message:"Could not reach API")}])});
      setLoading(false);
      setTimeout(scrollBottom,50);
    });
  }

  var suggestions=[];
  if(user.role==="RA"||user.role==="RM")suggestions=["Which dealer should I visit?","How are my leads performing?","Any payouts I should nudge?"];
  else if(user.role==="TM"||user.role==="Business Head")suggestions=["Where is the biggest revenue leak?","Which RAs need coaching?","Dealer churn risk?"];
  else if(user.role==="Finance")suggestions=["Any payout anomalies?","High-value pending items?","Disbursement summary"];
  else if(user.role==="Support Ops")suggestions=["Which dealers have repeat issues?","Oldest open tickets?","SLA compliance?"];
  else if(user.role==="Dealer")suggestions=["Why is my lead stuck?","How are my earnings?","What should I focus on?"];
  else suggestions=["How is the business doing?","Any issues to flag?"];

  return React.createElement("div",null,
    React.createElement("button",{className:"ai-fab",onClick:function(){setOpen(!open)},title:"AI Agent"},open?"×":"🤖"),
    open&&React.createElement("div",{className:"ai-chat-panel"},
      React.createElement("div",{className:"ai-chat-hd"},
        React.createElement("div",null,
          React.createElement("div",{style:{fontWeight:700,fontSize:14}},"AI Agent"),
          React.createElement("div",{style:{fontSize:11,opacity:.8}},user.role+" Assistant")
        ),
        React.createElement("button",{onClick:function(){setOpen(false)},style:{background:"none",border:"none",color:"#fff",fontSize:18,cursor:"pointer"}},"×")
      ),
      !apiKey&&React.createElement("div",{style:{padding:"8px 12px",background:"#fef3c7",display:"flex",gap:6,alignItems:"center"}},
        React.createElement("input",{placeholder:"Enter Claude API Key...",value:apiKey,onChange:function(e){saveKey(e.target.value)},style:{flex:1,padding:"6px 8px",border:"1px solid #fde68a",borderRadius:6,fontSize:11},type:"password"}),
        React.createElement("span",{style:{fontSize:10,color:"#92400e"}},"Required")
      ),
      apiKey&&React.createElement("div",{style:{padding:"4px 12px",background:"#f0fdf4",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement("span",{style:{fontSize:10,color:"#16a34a"}},"API key set (***"+apiKey.slice(-4)+")"),
        React.createElement("button",{onClick:function(){saveKey("")},style:{background:"none",border:"none",fontSize:10,color:"#dc2626",cursor:"pointer"}},"Clear")
      ),
      React.createElement("div",{className:"ai-chat-body",ref:bodyRef},
        messages.map(function(m,i){
          return React.createElement("div",{key:i,className:"ai-msg "+(m.role==="user"?"user":m.role==="system"?"system":"bot")},m.text);
        }),
        loading&&React.createElement("div",{className:"ai-msg bot",style:{fontStyle:"italic",color:"#94a3b8"}},"Thinking..."),
        messages.length<=1&&React.createElement("div",{style:{padding:"8px 0"}},
          React.createElement("div",{style:{fontSize:11,color:"#94a3b8",marginBottom:6}},"Try asking:"),
          suggestions.map(function(s,i){
            return React.createElement("button",{key:i,onClick:function(){setInput(s)},style:{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",marginBottom:4,background:"#f8fafc",border:"1px solid var(--brd)",borderRadius:8,fontSize:11,cursor:"pointer",color:"#475569"}},s);
          })
        )
      ),
      React.createElement("div",{className:"ai-chat-input"},
        React.createElement("input",{value:input,onChange:function(e){setInput(e.target.value)},onKeyDown:function(e){if(e.key==="Enter"&&!loading)sendMessage()},placeholder:"Ask about your data...",disabled:loading}),
        React.createElement("button",{onClick:sendMessage,disabled:loading},loading?"...":"Send")
      )
    )
  );
}

  var [userId,setUserId]=useState("RA001");
  var [page,setPage]=useState("dashboard");
  var [sidebarOpen,setSidebarOpen]=useState(false);
  var {toasts,addToast}=useToast();

  var [onboarding,setOnboarding]=useState(INIT_OB);
  var [counterReqs,setCounterReqs]=useState(INIT_COUNTER_REQS);
  var [sapReqs,setSapReqs]=useState(INIT_SAP_REQS);

  var [counters,setCounters]=useState(INIT_COUNTERS);

  useEffect(function(){

    setPage(firstPage);

  },[userId]);

  var validPage=navItems.some(function(n){return n.id===page});
  var activePage=validPage?page:(navItems[0]?navItems[0].id:"dashboard");

  // Pre-compute insights for dashboard summary cards
  var dashInsights=useMemo(function(){
    return generateInsights(user,leads,apps,dealers,grievances,payouts,onboarding);
  },[user,leads,apps,dealers,grievances,payouts,onboarding]);

  function renderPage(){
    try{
    var role=user.role;
    // AI Insights
    if(activePage==="ai_insights")return React.createElement(AIInsightsModule,{user:user,leads:leads,apps:apps,dealers:dealers,grievances:grievances,payouts:payouts,onboarding:onboarding});

    // Dashboards
    if(activePage==="dashboard"&&role==="Support Ops")return React.createElement(DashboardSupportOps,{user:user,grievances:grievances,setPage:setPage});
    if(activePage==="home"&&role==="Dealer")return React.createElement(DashboardDealer,{user:user,leads:leads,grievances:grievances,notifications:notifications,apps:apps,configs:configs,setPage:setPage});
    if(activePage==="dashboard"&&role==="Finance")return React.createElement(DashboardFinance,{user:user,payouts:payouts,setPage:setPage});
    if(activePage==="dashboard"&&(role==="RA"||role==="RM"))return React.createElement(DashboardRA,{user:user,leads:leads,apps:apps,dealers:dealers,grievances:grievances,payouts:payouts,configs:configs,setPage:setPage,insights:dashInsights});
