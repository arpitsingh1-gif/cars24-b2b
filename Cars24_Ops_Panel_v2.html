function autoApprove(req,app,cfg){
  if(!app.stockIn)return{ok:false,route:"BLOCKED",reason:"Stock-In not complete"};
  if(req.type==="Split"){
    const avail=app.otherCharges-app.splitReleased;
    if(req.amount>avail)return{ok:false,route:"BLOCKED",reason:`Insufficient bucket. Available: ${fmt(avail)}`};
    if(req.amount<cfg.SPLIT_SAME_APP_GATE)return{ok:true,route:"AUTO-APPROVED",reason:`Below ${fmt(cfg.SPLIT_SAME_APP_GATE)} gate`};
    return{ok:false,route:"Ops Review → Finance",reason:`≥ ${fmt(cfg.SPLIT_SAME_APP_GATE)} — manual required`};
  }
  if(req.type==="Incentive"){
    if(app.splitReleased>0)return{ok:false,route:"Business Head",reason:"Prior split on this App_ID"};
    if(app.gsType==="Non-GS"){
      const base=app.quote-(app.serviceCharge+app.challan+app.estRefurb);
      const calc=Math.min((cfg.NONGS_RATE/100)*base,cfg.NONGS_CAP);
      if(req.amount>calc*1.01)return{ok:false,route:"Business Head",reason:`Exceeds calculated ${fmt(calc)}`};
      if(req.amount<=cfg.NONGS_AUTO_GATE)return{ok:true,route:"AUTO-APPROVED",reason:"Within cap & gate"};
      return{ok:false,route:"Business Head",reason:`Above auto-gate ${fmt(cfg.NONGS_AUTO_GATE)}`};
    }
    return{ok:false,route:"Business Head",reason:"GS incentive needs BH approval"};
  }
  return{ok:false,route:"Pending",reason:""};
}

function Dashboard({role,apps,dealers,counters,onboarding,requests,counterReqs,sapReqs,configs}){
  const allRAs=USERS.filter(u=>u.role==="RA");
  const totalWallet=allRAs.reduce((s,ra)=>s+raWalBal(ra.id,apps),0);
  const pendingApprovals=requests.filter(r=>!["Released","Auto-Approved","Rejected"].includes(r.status)).length;
  const obPending=onboarding.filter(o=>o.status!=="Active"&&o.status!=="Rejected").length;
  const counterPending=counterReqs.filter(r=>r.status==="Ops Review").length;
  const sapPending=sapReqs.filter(r=>r.status==="Ops Review").length;

  if(role==="Business Head"){
    // BH sees full team overview
    const bhApprovalPending=requests.filter(r=>["BH Review","Ops Approved"].includes(r.status)).length;
    const totalApps=apps.length;const stockInPending=apps.filter(a=>!a.stockIn).length;
    const releasedMTD=requests.filter(r=>r.status==="Released"||r.status==="Auto-Approved").reduce((s,r)=>s+r.amount,0);
    const pendingPayout=requests.filter(r=>!["Released","Auto-Approved","Rejected"].includes(r.status)).reduce((s,r)=>s+r.amount,0);
    return <div>
      <div style={{background:`linear-gradient(135deg,${C.accentD},${C.accent})`,borderRadius:12,padding:16,color:"#fff",marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:1,opacity:0.7,marginBottom:4}}>TEAM WALLET — ALL RAs</div>
        <div style={{fontSize:32,fontWeight:900}}>{fmt(totalWallet)}</div>
        <div style={{fontSize:12,opacity:0.75,marginTop:2}}>Total available across all RA portfolios</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        <StatBox icon="⏳" label="BH Approvals" value={bhApprovalPending} color={bhApprovalPending>0?C.warn:C.success} bg={bhApprovalPending>0?C.warnL:C.successL}/>

  // Ops / Finance dashboard
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      <StatBox icon="💰" label="Team Wallet" value={fmt(totalWallet)} color={C.accent} bg={C.accentL}/>
      <StatBox icon="⏳" label="Pending Approvals" value={pendingApprovals} color={pendingApprovals>0?C.warn:C.success} bg={pendingApprovals>0?C.warnL:C.successL}/>
      <StatBox icon="🏢" label="Onboarding Pending" value={obPending} color={C.purple} bg={C.purpleL}/>

// ─── RAISE PAYOUT (TM) ───────────────────────────────────────────────────────
function RaisePayout({role,apps,setApps,dealers,counters,payees,requests,setRequests,configs,toast}){
  const [step,setStep]=useState(0);const [appId,setAppId]=useState("");const [payeeId,setPayeeId]=useState("");const [type,setType]=useState("");const [amount,setAmount]=useState("");const [reason,setReason]=useState("");const [ackCross,setAckCross]=useState(false);const [result,setResult]=useState(null);const [done,setDone]=useState(false);

  if(role!=="TM / City Head")return <div style={{textAlign:"center",padding:60,color:C.mute}}><div style={{fontSize:40,marginBottom:12}}>🔒</div><div style={{fontSize:14,fontWeight:700,color:C.text}}>Only TM / City Head can raise payments.</div></div>;

  const selApp=apps.find(a=>a.id===appId);
  const selDealer=selApp?dealers.find(d=>d.id===selApp.dealerId):null;
  const selCounter=selApp?counters.find(ct=>ct.id===selApp.counterId):null;
  const selRA=selApp?USERS.find(u=>u.id===selApp.raId):null;
  const walBal=selApp?raWalBal(selApp.raId,apps):0;
  const avail=selApp?selApp.otherCharges-selApp.splitReleased:0;

  // Payees linked to the dealer of the selected app
  const dealerPayees=selApp?payees.filter(p=>p.status==="Active"&&p.dealerIds&&p.dealerIds.includes(selApp.dealerId)):[];
  const selPayee=payees.find(p=>p.id===payeeId);
  const isCross=selPayee&&selApp&&!selPayee.dealerIds.includes(selApp.dealerId);

  const base=selApp?selApp.quote-(selApp.serviceCharge+selApp.challan+selApp.estRefurb):0;
  const calcInc=selApp?Math.min((configs.NONGS_RATE/100)*base,configs.NONGS_CAP):0;

  useEffect(()=>{if(type==="Incentive"&&selApp&&selApp.gsType==="Non-GS")setAmount(String(Math.round(calcInc)));else if(type!=="Incentive")setAmount("");},[type,appId]);

  const amtErr=type==="Split"&&Number(amount)>avail?`Exceeds bucket (${fmt(avail)} available)`:"";
  const walErr=type==="Split"&&walBal<=0?"RA wallet is zero — split blocked":"";

  function preview(){if(!appId||!type||!amount||!reason||!payeeId){alert("Fill all required fields");return;}if(!selApp.stockIn){alert("Stock-In not complete");return;}if(walBal<=0&&type==="Split"){alert("Wallet empty");return;}setResult(autoApprove({type,amount:Number(amount)},selApp,configs));setStep(1);}

  function submit(){const amt=Number(amount);const newReq={id:`PR${uid()}`,appId,payeeId,raId:selApp.raId,type,amount:amt,status:result.ok?"Auto-Approved":result.route.includes("Finance")||result.route.includes("Ops")?"Submitted":"BH Review",createdBy:"TM",createdAt:now(),reason,rejectionReason:null,bhEdited:false,originalAmount:amt,utr:result.ok?`UTR${Math.floor(Math.random()*9e8+1e8)}`:null,crossDealerFlag:isCross||false};if(result.ok&&type==="Split")setApps(prev=>prev.map(a=>a.id===appId?{...a,splitReleased:a.splitReleased+amt}:a));setRequests(p=>[...p,newReq]);toast(result.ok?"✓ Auto-approved & released!":`Submitted for ${result.route}`,result.ok?"success":isCross?"warning":"info");setDone(true);setTimeout(()=>{setDone(false);setStep(0);setAppId("");setPayeeId("");setType("");setAmount("");setReason("");setAckCross(false);setResult(null);},1800);}

  if(done)return <div style={{textAlign:"center",padding:60}}><div style={{fontSize:50,marginBottom:14}}>{result&&result.ok?"✅":"📋"}</div><div style={{fontSize:16,fontWeight:800}}>{result&&result.ok?"Auto-Released!":"Submitted for Approval"}</div></div>;

  return <div style={{maxWidth:640}}>
    <StepBar steps={["Configure","Review & Submit"]} cur={step}/>
    {step===0&&<>
      <Card style={{marginBottom:12}}>
        <ST>Select App_ID</ST>
        <Sel value={appId} onChange={v=>{setAppId(v);setPayeeId("");setType("");}} options={apps.map(a=>({value:a.id,label:`${a.id} — ${a.vehicle}`}))} placeholder="Choose App_ID..." required/>
        {selApp&&<>
          {/* Auto-filled dealer, counter, UCM, RA */}
          <div style={{background:C.accentL,borderRadius:9,padding:12,marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:800,color:C.accent,marginBottom:8}}>AUTO-FILLED FROM CARS24 ADMIN PANEL</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {[["Dealer",selDealer&&selDealer.name],["Dealer Code",selDealer&&selDealer.code],["Counter",selCounter&&selCounter.name],["Counter City",selCounter&&selCounter.city],["UCM Name",selCounter&&selCounter.ucmName],["UCM Mobile",selCounter&&selCounter.ucmMobile],["RA",selRA&&selRA.name],["Region",selDealer&&selDealer.region]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,color:C.accent,fontWeight:700,marginBottom:1}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800,color:C.text}}>{v||"—"}</div></div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:6}}>
              {[["C24 Quote",fmt(selApp.quote)],["GS Type",selApp.gsType],["Stock-In",selApp.stockIn?"✓ Complete":"✗ Pending"]].map(([l,v])=><div key={l} style={{background:l==="Stock-In"?(selApp.stockIn?"rgba(5,150,105,0.12)":"rgba(220,38,38,0.12)"):("rgba(255,255,255,0.7)"),borderRadius:6,padding:"5px 8px"}}><div style={{fontSize:9,fontWeight:700,color:C.mute,marginBottom:1}}>{l.toUpperCase()}</div><div style={{fontSize:11,fontWeight:800}}>{v}</div></div>)}
            </div>
          </div>
          {!selApp.stockIn&&<Alrt type="error">Stock-In not complete — payouts blocked for this App_ID.</Alrt>}
          <ST>Payout Type</ST>
          <Sel value={type} onChange={setType} options={[{value:"Split",label:"Split Payment (from Other Charges bucket)"},{value:"Incentive",label:"Incentive"}]} placeholder="Select type..." required/>
          {type==="Split"&&<>
            <div style={{background:walBal>0?C.accentL:C.dangerL,border:`1px solid ${walBal>0?"#BFDBFE":"#FECACA"}`,borderRadius:8,padding:12,marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:800,color:walBal>0?C.accentD:C.danger,marginBottom:2}}>RA WALLET (VALID FOR SPLIT ONLY)</div>
              <div style={{fontSize:24,fontWeight:900,color:walBal>0?C.accent:C.danger}}>{fmt(walBal)}</div>
              <div style={{fontSize:11,color:C.mute,marginTop:2}}>This App_ID bucket available: {fmt(avail)}</div>
            </div>
          </>}
          {type&&<>
            <ST>Payee (linked to this dealer)</ST>
            {dealerPayees.length===0?<Alrt type="warning">No active payees linked to this dealer. Ask RA/RM to submit a SAP request.</Alrt>:
              <Sel value={payeeId} onChange={setPayeeId} options={dealerPayees.map(p=>({value:p.id,label:`${p.payeeName} — ${p.bank} · ${p.fluxStatus}`}))} placeholder="Select payee..." required/>}
            {isCross&&<Alrt type="warning">Note: This payee is cross-dealer. Deducted from this App_ID's bucket, flagged for BH.<div style={{marginTop:6}}><label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:11}}><input type="checkbox" checked={ackCross} onChange={e=>setAckCross(e.target.checked)}/>I acknowledge cross-dealer payment</label></div></Alrt>}
            {type==="Incentive"&&selApp.gsType==="Non-GS"&&<div style={{background:C.successL,border:`1px solid #BBF7D0`,borderRadius:8,padding:12,marginBottom:10}}><Lbl color={C.success}>Non-GS Auto-Calculation</Lbl>{[["Base Amount",fmt(base)],[`${configs.NONGS_RATE}% of Base`,fmt((configs.NONGS_RATE/100)*base)],["Cap",fmt(configs.NONGS_CAP)],["Pre-filled Amount",fmt(calcInc)]].map(([l,v])=><Row key={l} label={l} value={v}/>)}</div>}
            <Fld label="Amount (₹)" value={amount} onChange={setAmount} type="number" required hint={type==="Split"?`Bucket: ${fmt(avail)} · Wallet: ${fmt(walBal)}`:""} error={amtErr||walErr}/>
            <Fld label="Reason / Remarks" value={reason} onChange={setReason} required placeholder="Purpose of this payment"/>
          </>}
        </>}
      </Card>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="secondary" onClick={()=>{setAppId("");setPayeeId("");setType("");setAmount("");setReason("");setAckCross(false);}}>Reset</Btn><Btn onClick={preview} disabled={!appId||!type||!amount||!reason||!payeeId||!!amtErr||!!walErr||(isCross&&!ackCross)}>Check Rules →</Btn></div>
    </>}
    {step===1&&result&&<>
      <Card style={{marginBottom:12,border:`1.5px solid ${result.ok?"#BBF7D0":result.route==="BLOCKED"?"#FECACA":"#FDE68A"}`}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}><div style={{fontSize:40}}>{result.ok?"✅":result.route==="BLOCKED"?"🚫":"🔀"}</div><div><div style={{fontSize:15,fontWeight:900,color:result.ok?C.success:result.route==="BLOCKED"?C.danger:C.warn}}>{result.route}</div><div style={{fontSize:12,color:C.mid,marginTop:3}}>{result.reason}</div></div></div>
        {result.ok&&<Alrt type="success">Auto-released instantly. App_ID bucket deducted, RA wallet updated.</Alrt>}
        {result.route==="BLOCKED"&&<Alrt type="error">Cannot proceed. Go back and fix.</Alrt>}
      </Card>
      <Card style={{background:C.surfaceAlt,marginBottom:12}}><Lbl>Summary</Lbl>
        {[["App_ID",appId],["Dealer",selDealer&&selDealer.name],["Counter",selCounter&&selCounter.name],["UCM",selCounter&&selCounter.ucmName],["RA",selRA&&selRA.name],["Type",type],["Amount",fmt(amount)],["Payee",selPayee&&selPayee.payeeName],["RA Wallet After",fmt(walBal-Number(amount))],["Reason",reason]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}
      </Card>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="secondary" onClick={()=>setStep(0)}>← Edit</Btn><Btn v={result.route==="BLOCKED"?"secondary":result.ok?"success":"primary"} disabled={result.route==="BLOCKED"} onClick={submit}>{result.ok?"✓ Confirm & Release":"Submit for Approval"}</Btn></div>
    </>}
  </div>;
}

// ─── ONBOARDING (Central Ops / TM) ───────────────────────────────────────────
function OnboardingModule({role,onboarding,setOnboarding,dealers,setDealers,counters,toast}){
  const [sel,setSel]=useState(null);const [rejectReason,setRejectReason]=useState("");const [showRej,setShowRej]=useState(false);
  // TM form
  const [view,setView]=useState("list");const [step,setStep]=useState(0);const [form,setForm]=useState({});const [docs,setDocs]=useState({gst:"",pan:"",bank:"",cancelledCheque:"",other:""});const [oemDocs,setOemDocs]=useState({franchiseAgreement:"",oemLetter:"",other:""});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const queue=onboarding.filter(o=>["Admin Panel Pending","OEM Tagging Pending","Ops Review"].includes(o.status));
  const ob=sel?onboarding.find(o=>o.id===sel):null;const ra=ob?USERS.find(u=>u.id===ob.raId):null;

  function simCode(id){const code=String(100000+Math.floor(Math.random()*99999));setOnboarding(p=>p.map(o=>o.id===id?{...o,dealerCode:code,status:"OEM Tagging Pending"}:o));toast(`Dealer code ${code} received`,"success");}
  function completeOEM(id){setOnboarding(p=>p.map(o=>o.id===id?{...o,status:"Ops Review"}:o));toast("OEM tagging done","success");setSel(null);}
  function activate(id){const o=onboarding.find(ob=>ob.id===id);setOnboarding(p=>p.map(ob=>ob.id===id?{...ob,status:"Active"}:ob));setDealers(p=>[...p,{id:`D${uid()}`,name:o.dealerName,code:o.dealerCode,type:o.type,oem:o.oem,region:o.region,city:o.city||"",raId:o.raId,status:"Active",onboardedAt:new Date().toISOString().slice(0,10)}]);toast(`${o.dealerName} activated!`,"success");setSel(null);}
  function reject(id){if(!rejectReason){alert("Reason required");return;}setOnboarding(p=>p.map(o=>o.id===id?{...o,status:"Rejected",rejectionReason:rejectReason}:o));toast("Rejected","error");setSel(null);setRejectReason("");setShowRej(false);}

  function submitTMForm(){const item={id:`OB${uid()}`,raId:"TM001",submittedBy:"TM",...form,docs,oemDocs,status:"Admin Panel Pending",dealerCode:"",submittedAt:now()};setOnboarding(p=>[...p,item]);setView("list");setStep(0);setForm({});setDocs({gst:"",pan:"",bank:"",cancelledCheque:"",other:""});setOemDocs({franchiseAgreement:"",oemLetter:"",other:""});toast("Submitted — auto-email sent","success");}

  const allDealers=role==="TM / City Head"?dealers:dealers;

  if(role==="TM / City Head"&&view==="form")return <div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><Btn v="ghost" onClick={()=>{setView("list");setStep(0);setForm({});}} sm>← Back</Btn><span style={{fontSize:14,fontWeight:800}}>New Dealer Onboarding (TM)</span></div>
    <StepBar steps={["Dealer Info","Bank & Docs","OEM Details","Review"]} cur={step}/>
    {step===0&&<Card><ST>Dealer Information</ST>
      <Fld label="Dealer / Company Name" value={form.dealerName} onChange={v=>f("dealerName",v)} required/><G2><Sel label="Region" value={form.region} onChange={v=>f("region",v)} options={REGIONS} placeholder="Select region..." required/><Sel label="City" value={form.city} onChange={v=>f("city",v)} options={CITIES} placeholder="Select city..." required/></G2><G2><Fld label="Mobile" value={form.mobile} onChange={v=>f("mobile",v)} required/><Fld label="Email" value={form.email} onChange={v=>f("email",v)}/></G2><Fld label="Full Address" value={form.address} onChange={v=>f("address",v)} required/>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}><Btn disabled={!form.dealerName||!form.region||!form.city||!form.mobile||!form.address} onClick={()=>setStep(1)}>Next →</Btn></div>
    </Card>}
    {step===1&&<Card><ST>Bank & Tax</ST>
      <G2><Fld label="PAN" value={form.pan} onChange={v=>f("pan",v.toUpperCase())} required maxLength={10}/><Fld label="GST" value={form.gst} onChange={v=>f("gst",v.toUpperCase())}/></G2>
      <Sel label="Bank" value={form.bank} onChange={v=>f("bank",v)} options={BANK_LIST} placeholder="Select bank..." required/><G2><Fld label="Account No." value={form.account} onChange={v=>f("account",v)} required/><Fld label="IFSC" value={form.ifsc} onChange={v=>f("ifsc",v.toUpperCase())} required/></G2>
      <ST>Mandatory Documents</ST>
      <FileInput label="GST Certificate" value={docs.gst} onChange={v=>setDocs(p=>({...p,gst:v}))} required hint="GST registration certificate"/>
      <FileInput label="PAN Card" value={docs.pan} onChange={v=>setDocs(p=>({...p,pan:v}))} required hint="Company/proprietor PAN"/>
      <FileInput label="Bank Statement (3 months)" value={docs.bank} onChange={v=>setDocs(p=>({...p,bank:v}))} required hint="Latest 3-month statement"/>
      <FileInput label="Cancelled Cheque" value={docs.cancelledCheque} onChange={v=>setDocs(p=>({...p,cancelledCheque:v}))} required hint="Account name must match dealer"/>
      <ST>Other (Optional)</ST><FileInput label="Other Document" value={docs.other} onChange={v=>setDocs(p=>({...p,other:v}))}/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><Btn v="secondary" onClick={()=>setStep(0)}>← Back</Btn><Btn disabled={!form.pan||!form.bank||!form.account||!form.ifsc||!docs.gst||!docs.pan||!docs.bank||!docs.cancelledCheque} onClick={()=>setStep(2)}>Next →</Btn></div>
    </Card>}
    {step===2&&<Card><ST>OEM & Dealer Type</ST>
      <G2><Sel label="Dealer Type" value={form.type} onChange={v=>f("type",v)} options={DEALER_TYPES} placeholder="Select..." required/><Sel label="OEM Brand" value={form.oem} onChange={v=>f("oem",v)} options={OEM_BRANDS} placeholder="Select OEM..." required/></G2>
      <Sel label="Dealer Categorisation" value={form.oemType} onChange={v=>f("oemType",v)} options={["Franchise Dealer","Authorised Service Centre","Multi-Brand Dealer","Independent Dealer"]} placeholder="Select..." required/>
      <ST>OEM Documents (Mandatory)</ST>
      <FileInput label="Franchise Agreement / Appointment Letter" value={oemDocs.franchiseAgreement} onChange={v=>setOemDocs(p=>({...p,franchiseAgreement:v}))} required/>
      <FileInput label="OEM Authorization Letter" value={oemDocs.oemLetter} onChange={v=>setOemDocs(p=>({...p,oemLetter:v}))} required/>
      <ST>Other OEM (Optional)</ST><FileInput label="Other OEM Document" value={oemDocs.other} onChange={v=>setOemDocs(p=>({...p,other:v}))}/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><Btn v="secondary" onClick={()=>setStep(1)}>← Back</Btn><Btn disabled={!form.type||!form.oem||!form.oemType||!oemDocs.franchiseAgreement||!oemDocs.oemLetter} onClick={()=>setStep(3)}>Review →</Btn></div>

// ─── APPROVALS ────────────────────────────────────────────────────────────────
function Approvals({role,requests,setRequests,apps,setApps,dealers,payees,configs,toast}){
  const [sel,setSel]=useState(null);const [bhAmt,setBhAmt]=useState("");const [rejectReason,setRejectReason]=useState("");const [showRej,setShowRej]=useState(false);
  const queue=requests.filter(r=>{if(role==="Central Ops")return r.status==="Submitted";if(role==="Business Head")return["BH Review","Ops Approved"].includes(r.status)||(r.crossDealerFlag&&r.status==="Submitted");if(role==="Finance")return r.status==="BH Approved"&&r.amount>=configs.FINANCE_GATE;return false;});
  const req=sel?requests.find(r=>r.id===sel):null;const app=req?apps.find(a=>a.id===req.appId):null;const dealer=app?dealers.find(d=>d.id===app.dealerId):null;const ra=app?USERS.find(u=>u.id===app.raId):null;const payee=req?payees.find(p=>p.id===req.payeeId):null;const finalAmt=bhAmt?Number(bhAmt):req&&req.amount;

  if(role==="TM / City Head")return <div style={{textAlign:"center",padding:60,color:C.mute}}><div style={{fontSize:40,marginBottom:10}}>🔒</div><div style={{fontSize:14,fontWeight:700}}>TM does not have approval access.</div></div>;

  function approve(){let newStatus;const amt=bhAmt?Number(bhAmt):req.amount;if(role==="Central Ops")newStatus="Ops Approved";else if(role==="Business Head"){newStatus=amt>=configs.FINANCE_GATE?"BH Approved":"Released";if(newStatus==="Released")setApps(prev=>prev.map(a=>a.id===req.appId?{...a,splitReleased:req.type==="Split"?a.splitReleased+amt:a.splitReleased,incentiveReleased:req.type==="Incentive"?a.incentiveReleased+amt:a.incentiveReleased}:a));}else if(role==="Finance"){newStatus="Released";setApps(prev=>prev.map(a=>a.id===req.appId?{...a,splitReleased:req.type==="Split"?a.splitReleased+req.amount:a.splitReleased}:a));}
    const edited=role==="Business Head"&&bhAmt&&Number(bhAmt)!==req.amount;
    setRequests(prev=>prev.map(r=>r.id===sel?{...r,status:newStatus,bhEdited:edited||r.bhEdited,amount:role==="Business Head"&&bhAmt?Number(bhAmt):r.amount,originalAmount:r.originalAmount||r.amount,utr:newStatus==="Released"?`UTR${Math.floor(Math.random()*9e8+1e8)}`:r.utr}:r));
    toast(`${sel} → ${newStatus}`,"success");setSel(null);setBhAmt("");setShowRej(false);setRejectReason("");}

  function reject(){if(!rejectReason){alert("Reason required");return;}setRequests(prev=>prev.map(r=>r.id===sel?{...r,status:"Rejected",rejectionReason:rejectReason}:r));toast("Rejected","error");setSel(null);setRejectReason("");setShowRej(false);}

  return <div style={{display:"grid",gridTemplateColumns:sel?"260px 1fr":"1fr",gap:16,alignItems:"start"}}>
    <div>
      <Lbl>Queue ({queue.length})</Lbl>
      {queue.length===0&&<div style={{textAlign:"center",padding:32,color:C.mute,fontSize:13}}><div style={{fontSize:28,marginBottom:8}}>✓</div>No pending items</div>}
      {queue.map(r=>{const rApp=apps.find(a=>a.id===r.appId);return <Card key={r.id} onClick={()=>{setSel(sel===r.id?null:r.id);setBhAmt("");setShowRej(false);setRejectReason("");}} style={{marginBottom:8,border:`1.5px solid ${sel===r.id?C.accent:r.crossDealerFlag?"#FDE68A":C.border}`,background:sel===r.id?C.accentL:"#fff"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,fontWeight:800}}>{r.id}</span><Badge s={r.status} sm/></div>{r.crossDealerFlag&&<div style={{fontSize:9,fontWeight:800,color:C.warn,marginBottom:2}}>⚠ CROSS-DEALER</div>}<div style={{fontSize:11,color:C.mute}}>{r.appId} · {r.type}</div><div style={{fontSize:16,fontWeight:900,color:C.accent}}>{fmt(r.amount)}</div></Card>;})}
      <div style={{marginTop:14}}><Lbl>All Requests</Lbl>{requests.map(r=>{const rApp=apps.find(a=>a.id===r.appId);return <div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}><div><div style={{fontSize:12,fontWeight:700}}>{r.id} — {fmt(r.amount)}</div><div style={{fontSize:10,color:C.mute}}>{r.type} · {rApp&&rApp.vehicle}</div></div><Badge s={r.status} sm/></div>;})}
      </div>
    </div>
    {req&&app&&<div>
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div><div style={{fontSize:14,fontWeight:800}}>{req.id}</div><div style={{fontSize:11,color:C.mute}}>{req.createdAt}</div></div><Badge s={req.status}/></div>
        {req.crossDealerFlag&&<Alrt type="warning">Cross-dealer payment — verify before approving.</Alrt>}
        <Row label="App_ID" value={req.appId}/><Row label="Vehicle" value={app.vehicle}/><Row label="Dealer" value={dealer&&dealer.name}/><Row label="RA" value={ra&&ra.name}/><Row label="RA Wallet" value={fmt(raWalBal(app.raId,apps))}/><Row label="Payee" value={payee&&payee.payeeName||"—"}/><Row label="Type" value={req.type}/><Row label="Amount" value={<span style={{fontWeight:900,color:C.accent,fontSize:14}}>{fmt(req.amount)}</span>}/>{req.bhEdited&&<Row label="Original Amount" value={<span style={{textDecoration:"line-through",color:C.mute}}>{fmt(req.originalAmount)}</span>}/>}<Row label="Reason" value={req.reason}/>{req.utr&&<Row label="UTR" value={req.utr} mono/>}
      </Card>
      {role==="Business Head"&&!showRej&&<Card style={{marginBottom:12}}><ST>BH Override (Audit Logged)</ST><Fld label="Override Amount (leave blank = approve as-is)" value={bhAmt} onChange={setBhAmt} type="number" hint={`Original: ${fmt(req.amount)}`}/>{bhAmt&&Number(bhAmt)!==req.amount&&<Alrt type="warning">Changing {fmt(req.amount)} → {fmt(bhAmt)}. Permanently flagged.</Alrt>}{finalAmt>=configs.FINANCE_GATE&&<Alrt type="info">≥ {fmt(configs.FINANCE_GATE)} — will route to Finance.</Alrt>}</Card>}
      {showRej&&<Card style={{marginBottom:12,border:"1.5px solid #FECACA"}}><Fld label="Rejection Reason *" value={rejectReason} onChange={setRejectReason}/><div style={{display:"flex",gap:8}}><Btn v="danger" onClick={reject}>Confirm Reject</Btn><Btn v="ghost" onClick={()=>setShowRej(false)}>Cancel</Btn></div></Card>}
      {!showRej&&<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="secondary" onClick={()=>setShowRej(true)}>Reject</Btn><Btn v="success" icon="✓" onClick={approve}>{role==="Finance"?"Final Approve & Release":"Approve →"}</Btn></div>}
    </div>}
  </div>;
}

// ─── DATA TRANSFER ────────────────────────────────────────────────────────────
function DataTransfer({role,dealers,setDealers,counters,setCounters,apps,setApps,payees,setPayees,auditLog,setAuditLog,toast}){
  const [fromId,setFromId]=useState("");const [toId,setToId]=useState("");const [reason,setReason]=useState("");const [scope,setScope]=useState("all");const [confirmed,setConfirmed]=useState(false);
  // Single entity re-mapping
  const [mapMode,setMapMode]=useState("bulk");const [entityType,setEntityType]=useState("");const [entityId,setEntityId]=useState("");const [newVal,setNewVal]=useState("");
  const canAccess=["Central Ops","Business Head"].includes(role);
  if(!canAccess)return <div style={{textAlign:"center",padding:60,color:C.mute}}><div style={{fontSize:40,marginBottom:10}}>🔒</div><div style={{fontSize:14,fontWeight:700}}>Data Transfer: Central Ops & Business Head only.</div></div>;

  const ras=USERS.filter(u=>["RA","RM"].includes(u.role));
  const fromUser=USERS.find(u=>u.id===fromId);const toUser=USERS.find(u=>u.id===toId);

  function executeBulk(){
    if(!fromId||!toId||!reason||!confirmed){alert("Fill all and confirm");return;}
    if(fromId===toId){alert("Cannot transfer to same person");return;}
    if(scope==="all"||scope==="dealers")setDealers(prev=>prev.map(d=>d.raId===fromId?{...d,raId:toId}:d));
    if(scope==="all"||scope==="appids")setApps(prev=>prev.map(a=>a.raId===fromId?{...a,raId:toId}:a));
    if(scope==="all"||scope==="payees")setPayees(prev=>prev.map(p=>p.raId===fromId?{...p,raId:toId}:p));
    const entry={id:`TXF${uid()}`,mode:"bulk",fromName:fromUser&&fromUser.name,toName:toUser&&toUser.name,scope,reason,executedBy:role,at:now()};
    setAuditLog(p=>[...p,entry]);
    toast(`Bulk transfer done: ${fromUser&&fromUser.name} → ${toUser&&toUser.name}`,"success");
    setFromId("");setToId("");setReason("");setConfirmed(false);
  }

  function executeEntity(){
    if(!entityType||!entityId||!reason){alert("Fill all fields");return;}
    let desc="";
    if(entityType==="dealer_ra"){setDealers(prev=>prev.map(d=>d.id===entityId?{...d,raId:newVal}:d));desc=`Dealer ${entityId} RA → ${newVal}`;}
    if(entityType==="counter_dealer"){setCounters(prev=>prev.map(c=>c.id===entityId?{...c,dealerId:newVal}:c));desc=`Counter ${entityId} Dealer → ${newVal}`;}
    if(entityType==="app_ra"){setApps(prev=>prev.map(a=>a.id===entityId?{...a,raId:newVal}:a));desc=`App_ID ${entityId} RA → ${newVal}`;}
    if(entityType==="payee_dealer"){setPayees(prev=>prev.map(p=>p.id===entityId?{...p,dealerIds:p.dealerIds.includes(newVal)?p.dealerIds:[...p.dealerIds,newVal]}:p));desc=`Payee ${entityId} added dealer ${newVal}`;}
    const entry={id:`TXF${uid()}`,mode:"entity",desc,reason,executedBy:role,at:now()};
    setAuditLog(p=>[...p,entry]);
    toast(`Mapping updated: ${desc}`,"success");
    setEntityType("");setEntityId("");setNewVal("");setReason("");
  }

  const ETYPES=[{value:"dealer_ra",label:"Change Dealer → RA mapping"},{value:"counter_dealer",label:"Change Counter → Dealer mapping"},{value:"app_ra",label:"Change App_ID → RA mapping"},{value:"payee_dealer",label:"Add Dealer to Payee"}];

  return <div style={{maxWidth:680}}>
    <Alrt type="warning">All changes are permanently audit-logged. Central Ops & BH have full access to change any mapping, SAP, or data association.</Alrt>
    <div style={{display:"flex",gap:8,marginBottom:14}}>
      <Btn v={mapMode==="bulk"?"primary":"secondary"} sm onClick={()=>setMapMode("bulk")}>Bulk Transfer</Btn>
      <Btn v={mapMode==="entity"?"primary":"secondary"} sm onClick={()=>setMapMode("entity")}>Single Entity Re-map</Btn>
    </div>

    {mapMode==="bulk"&&<Card style={{marginBottom:14}}>
      <ST>Bulk Data Transfer</ST>
      <G2><Sel label="Transfer FROM" value={fromId} onChange={v=>{setFromId(v);setConfirmed(false);}} options={ras.map(u=>({value:u.id,label:`${u.name} (${u.role})`}))} placeholder="Select..." required/><Sel label="Transfer TO" value={toId} onChange={v=>{setToId(v);setConfirmed(false);}} options={ras.filter(u=>u.id!==fromId).map(u=>({value:u.id,label:`${u.name} (${u.role})`}))} placeholder="Select..." required/></G2>
      <Sel label="Scope" value={scope} onChange={v=>{setScope(v);setConfirmed(false);}} options={[{value:"all",label:"All data (dealers + App_IDs + payees)"},{value:"dealers",label:"Dealers only"},{value:"appids",label:"App_IDs only"},{value:"payees",label:"Payees only"}]}/>
      <Fld label="Reason *" value={reason} onChange={setReason} required placeholder="e.g. RA resigned"/>
      {fromId&&toId&&<div style={{background:C.surfaceAlt,borderRadius:8,padding:10,marginBottom:10}}><Lbl>Preview</Lbl><Row label="From" value={fromUser&&fromUser.name}/><Row label="To" value={toUser&&toUser.name}/><Row label="Dealers" value={dealers.filter(d=>d.raId===fromId).length+" dealers"}/><Row label="App_IDs" value={apps.filter(a=>a.raId===fromId).length+" app_ids"}/></div>}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><input type="checkbox" id="cf" checked={confirmed} onChange={e=>setConfirmed(e.target.checked)}/><label htmlFor="cf" style={{fontSize:12,color:C.danger,fontWeight:700,cursor:"pointer"}}>I confirm this is authorised and permanent</label></div>
      <Btn v="danger" icon="⚡" disabled={!fromId||!toId||!reason||!confirmed} onClick={executeBulk}>Execute Bulk Transfer</Btn>
    </Card>}

    {mapMode==="entity"&&<Card style={{marginBottom:14}}>
      <ST>Single Entity Re-mapping</ST>
      <Alrt type="info">Change a single dealer's RA, a single App_ID's RA, a counter's dealer link, or add a dealer to a payee.</Alrt>
      <Sel label="Mapping Type" value={entityType} onChange={v=>{setEntityType(v);setEntityId("");setNewVal("");}} options={ETYPES} placeholder="Select type..."/>
      {entityType==="dealer_ra"&&<><Sel label="Select Dealer" value={entityId} onChange={setEntityId} options={dealers.map(d=>({value:d.id,label:`${d.name} (current RA: ${USERS.find(u=>u.id===d.raId)&&USERS.find(u=>u.id===d.raId).name||d.raId})`}))} placeholder="Select dealer..."/><Sel label="New RA" value={newVal} onChange={setNewVal} options={USERS.filter(u=>u.role==="RA").map(u=>({value:u.id,label:u.name}))} placeholder="Select new RA..."/></>}
      {entityType==="counter_dealer"&&<><Sel label="Select Counter" value={entityId} onChange={setEntityId} options={counters.map(c=>({value:c.id,label:`${c.name} (current dealer: ${dealers.find(d=>d.id===c.dealerId)&&dealers.find(d=>d.id===c.dealerId).name||c.dealerId})`}))} placeholder="Select counter..."/><Sel label="New Dealer" value={newVal} onChange={setNewVal} options={dealers.filter(d=>d.status==="Active").map(d=>({value:d.id,label:d.name}))} placeholder="Select new dealer..."/></>}
      {entityType==="app_ra"&&<><Sel label="Select App_ID" value={entityId} onChange={setEntityId} options={apps.map(a=>({value:a.id,label:`${a.id} — ${a.vehicle} (current RA: ${USERS.find(u=>u.id===a.raId)&&USERS.find(u=>u.id===a.raId).name||a.raId})`}))} placeholder="Select App_ID..."/><Sel label="New RA" value={newVal} onChange={setNewVal} options={USERS.filter(u=>u.role==="RA").map(u=>({value:u.id,label:u.name}))} placeholder="Select new RA..."/></>}
      {entityType==="payee_dealer"&&<><Sel label="Select Payee" value={entityId} onChange={setEntityId} options={payees.map(p=>({value:p.id,label:p.payeeName}))} placeholder="Select payee..."/><Sel label="Add Dealer" value={newVal} onChange={setNewVal} options={dealers.filter(d=>d.status==="Active"&&entityId&&!payees.find(p=>p.id===entityId)?.dealerIds.includes(d.id)).map(d=>({value:d.id,label:d.name}))} placeholder="Select dealer to add..."/></>}
      {entityType&&<Fld label="Reason *" value={reason} onChange={setReason} required placeholder="Reason for re-mapping"/>}
      <Btn v="warning" icon="⚡" disabled={!entityType||!entityId||!newVal||!reason} onClick={executeEntity}>Apply Re-mapping</Btn>
    </Card>}

    {auditLog.length>0&&<Card>
      <Lbl>Transfer Audit Log ({auditLog.length})</Lbl>
      {auditLog.slice().reverse().map(e=><div key={e.id} style={{padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:12,fontWeight:800,color:C.text}}>{e.mode==="bulk"?`${e.fromName} → ${e.toName}`:e.desc}</span><span style={{fontSize:10,color:C.mute}}>{e.at}</span></div>{e.scope&&<div style={{fontSize:11,color:C.mid}}>Scope: {e.scope}</div>}<div style={{fontSize:11,color:C.mute}}>Reason: {e.reason} · By: {e.executedBy}</div></div>)}
    </Card>}
  </div>;
}

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function ConfigPanel({role,configs,setConfigs}){
  const [local,setLocal]=useState({...configs});
  if(role!=="Business Head")return <div style={{textAlign:"center",padding:60,color:C.mute}}><div style={{fontSize:40,marginBottom:10}}>🔒</div><div style={{fontSize:14,fontWeight:700}}>Config: Business Head only.</div></div>;
  const LABELS={SPLIT_SAME_APP_GATE:["Split Same App_ID Gate (₹)","Auto-approve splits below this"],SPLIT_CROSS_APP_GATE:["Split Cross App_ID Gate (₹)","Cross-app gate"],NONGS_RATE:["Non-GS Incentive Rate (%)","Applied on base amount"],NONGS_CAP:["Non-GS Cap (₹)","Max incentive per vehicle"],NONGS_AUTO_GATE:["Non-GS Auto-Approve Gate (₹)","Incentive below this auto-approved"],FINANCE_GATE:["Finance Gate (₹)","Routes to Finance at/above this"]};
  return <div style={{maxWidth:520}}>
    <Alrt type="warning">Changes apply immediately to all new requests and are audit-logged.</Alrt>
    <Card>{Object.entries(local).map(([k,v])=><div key={k} style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:1}}>{LABELS[k]&&LABELS[k][0]||k}</div><div style={{fontSize:11,color:C.mute,marginBottom:5}}>{LABELS[k]&&LABELS[k][1]}</div><div style={{display:"flex",gap:8,alignItems:"center"}}><input value={v} type="number" onChange={e=>setLocal(p=>({...p,[k]:Number(e.target.value)}))} style={{flex:1,padding:"8px 10px",border:`1.5px solid ${C.border}`,borderRadius:7,fontSize:14,fontWeight:700,fontFamily:"inherit",color:C.text,outline:"none"}}/><span style={{fontSize:13,color:C.mute,width:20}}>{k.includes("RATE")?"%":"₹"}</span></div></div>)}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}><Btn v="secondary" sm onClick={()=>setLocal({...CONFIGS_DEFAULT})}>Reset</Btn><Btn sm icon="✓" onClick={()=>{setConfigs({...local});alert("✓ Config saved!");}}>Save Config</Btn></div>
    </Card>
  </div>;
}

// ─── SIDEBAR & MAIN APP ───────────────────────────────────────────────────────
const ROLE_META={"TM / City Head":{color:"#0F4C81",short:"TM"},"Central Ops":{color:"#065F46",short:"OPS"},"Business Head":{color:"#92400E",short:"BH"},"Finance":{color:"#5B21B6",short:"FIN"}};
const NAV=[
  {id:"dashboard",label:"Dashboard",icon:"▦"},
  {id:"payout",   label:"Raise Payout",icon:"💸",roles:["TM / City Head"]},
  {id:"onboarding",label:"Onboarding",icon:"🏢",badge:"ob"},
  {id:"counter",  label:"Counter & UCM",icon:"🔗",badge:"ctr"},
  {id:"sap",      label:"SAP & Payees",icon:"🏦",badge:"sap"},
  {id:"approvals",label:"Approvals",icon:"✓",badge:"apr",roles:["Central Ops","Business Head","Finance"]},
  {id:"transfer", label:"Data Transfer",icon:"⚡",roles:["Central Ops","Business Head"]},
  {id:"config",   label:"Config Keys",icon:"⚙",roles:["Business Head"]},
];

function App(){
  const [role,setRole]=useState("TM / City Head");const [page,setPage]=useState("dashboard");
  const [apps,setApps]=useState(INIT_APPS);const [dealers,setDealers]=useState(INIT_DEALERS);const [counters,setCounters]=useState(INIT_COUNTERS);const [payees,setPayees]=useState(INIT_PAYEES);const [requests,setRequests]=useState(INIT_PR);const [onboarding,setOnboarding]=useState(INIT_OB);const [counterReqs,setCounterReqs]=useState(INIT_COUNTER_REQS);const [sapReqs,setSapReqs]=useState(INIT_SAP_REQS);const [auditLog,setAuditLog]=useState([]);const [configs,setConfigs]=useState({...CONFIGS_DEFAULT});const [toastData,setToastData]=useState(null);
  const toast=useCallback((msg,type="success")=>setToastData({msg,type,k:Date.now()}),[]);

  const badges={apr:requests.filter(r=>{if(role==="Central Ops")return r.status==="Submitted";if(role==="Business Head")return["BH Review","Ops Approved"].includes(r.status);if(role==="Finance")return r.status==="BH Approved"&&r.amount>=configs.FINANCE_GATE;return false;}).length,ob:onboarding.filter(o=>["Admin Panel Pending","OEM Tagging Pending","Ops Review"].includes(o.status)).length,ctr:counterReqs.filter(r=>r.status==="Ops Review").length,sap:sapReqs.filter(r=>r.status==="Ops Review").length};

  const visNav=NAV.filter(n=>!n.roles||n.roles.includes(role));
  useEffect(()=>{if(!visNav.find(n=>n.id===page))setPage("dashboard");},[role]);

  const rm=ROLE_META[role]||ROLE_META["Central Ops"];
  const TITLES={dashboard:"Dashboard",payout:"Raise Payout",onboarding:"Dealer Onboarding",counter:"Counter & UCM Mapping",sap:"SAP & Payees",approvals:`Approvals${badges.apr>0?` (${badges.apr})`:""}`,transfer:"Data Transfer",config:"Config Keys"};

  return <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
    {toastData&&<Toast key={toastData.k} msg={toastData.msg} type={toastData.type} onDone={()=>setToastData(null)}/>}
    {/* Sidebar */}
    <div style={{width:210,background:C.sidebar,display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"14px 12px 10px",borderBottom:`1px solid ${C.sidebarB}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div style={{background:C.accent,borderRadius:7,padding:"3px 9px"}}><span style={{color:"#fff",fontWeight:900,fontSize:13}}>C24</span></div><div><div style={{color:"#fff",fontWeight:800,fontSize:12}}>B2B Ops Panel</div><div style={{color:"#4A7BAA",fontSize:10}}>v2.0 Simulation</div></div></div>
      </div>
      <div style={{padding:"10px 10px",borderBottom:`1px solid ${C.sidebarB}`}}>
        <div style={{fontSize:9,fontWeight:800,color:"#4A7BAA",letterSpacing:1,marginBottom:5}}>SWITCH ROLE</div>
        <select value={role} onChange={e=>setRole(e.target.value)} style={{width:"100%",background:`${rm.color}22`,color:rm.color,border:`1.5px solid ${rm.color}55`,borderRadius:7,padding:"6px 8px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit",outline:"none"}}>
          {["TM / City Head","Central Ops","Business Head","Finance"].map(r=><option key={r} value={r} style={{color:"#000",background:"#fff"}}>{r}</option>)}
        </select>
      </div>
      <nav style={{flex:1,padding:"8px"}}>
        {visNav.map(n=>{const active=page===n.id;const cnt=n.badge?badges[n.badge]:0;return <button key={n.id} onClick={()=>setPage(n.id)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,padding:"9px 10px",borderRadius:7,border:"none",cursor:"pointer",background:active?"rgba(15,76,129,0.25)":"transparent",color:active?"#7AB3F5":"#6B8CAE",marginBottom:2,textAlign:"left",fontFamily:"inherit"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:15}}>{n.icon}</span><span style={{fontSize:11,fontWeight:active?800:500}}>{n.label}</span></div>{cnt>0&&<span style={{background:C.danger,color:"#fff",fontSize:9,fontWeight:900,padding:"1px 5px",borderRadius:10,minWidth:18,textAlign:"center"}}>{cnt}</span>}</button>;})}
      </nav>
      <div style={{padding:"8px 10px 14px",borderTop:`1px solid ${C.sidebarB}`}}>
        <div style={{background:"rgba(255,75,43,0.12)",border:"1px solid rgba(255,75,43,0.3)",borderRadius:7,padding:"7px 10px"}}><div style={{fontSize:9,fontWeight:800,color:"#FF7A5C",letterSpacing:0.8}}>SIMULATION MODE</div><div style={{fontSize:9,color:"#A0694A",marginTop:2}}>No real payouts released</div></div>
      </div>
    </div>
    {/* Main */}
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 22px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <span style={{fontSize:15,fontWeight:800,color:C.text}}>{TITLES[page]}</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:28,height:28,borderRadius:"50%",background:`${rm.color}22`,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,fontWeight:900,color:rm.color}}>{rm.short}</span></div><span style={{fontSize:13,fontWeight:700,color:rm.color}}>{role}</span></div>
      </div>
      <div style={{flex:1,padding:22,overflowY:"auto"}}>
        {page==="dashboard" &&<Dashboard role={role} apps={apps} dealers={dealers} counters={counters} onboarding={onboarding} requests={requests} counterReqs={counterReqs} sapReqs={sapReqs} configs={configs}/>}
        {page==="payout"    &&<RaisePayout role={role} apps={apps} setApps={setApps} dealers={dealers} counters={counters} payees={payees} requests={requests} setRequests={setRequests} configs={configs} toast={toast}/>}
        {page==="onboarding"&&<OnboardingModule role={role} onboarding={onboarding} setOnboarding={setOnboarding} dealers={dealers} setDealers={setDealers} counters={counters} toast={toast}/>}
        {page==="counter"   &&<CounterModule role={role} dealers={dealers} counters={counters} setCounters={setCounters} counterReqs={counterReqs} setCounterReqs={setCounterReqs} toast={toast}/>}
        {page==="sap"       &&<SAPModule role={role} dealers={dealers} sapReqs={sapReqs} setSapReqs={setSapReqs} payees={payees} setPayees={setPayees} toast={toast}/>}
        {page==="approvals" &&<Approvals role={role} requests={requests} setRequests={setRequests} apps={apps} setApps={setApps} dealers={dealers} payees={payees} configs={configs} toast={toast}/>}
        {page==="transfer"  &&<DataTransfer role={role} dealers={dealers} setDealers={setDealers} counters={counters} setCounters={setCounters} apps={apps} setApps={setApps} payees={payees} setPayees={setPayees} auditLog={auditLog} setAuditLog={setAuditLog} toast={toast}/>}
        {page==="config"    &&<ConfigPanel role={role} configs={configs} setConfigs={setConfigs}/>}
      </div>
    </div>
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
