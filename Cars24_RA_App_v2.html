function Badge({s,sm}){const m=SM[s]||{bg:"#F3F4F6",c:"#6B7280",dot:"#9CA3AF"};return <span style={{display:"inline-flex",alignItems:"center",gap:4,background:m.bg,color:m.c,padding:sm?"2px 7px":"3px 9px",borderRadius:20,fontSize:sm?9:10,fontWeight:800,whiteSpace:"nowrap"}}><span style={{width:5,height:5,borderRadius:"50%",background:m.dot,flexShrink:0}}/>{s}</span>;}
function Card({children,style={},onClick}){return <div onClick={onClick} style={{background:T.card,borderRadius:12,border:`1px solid ${T.border}`,padding:14,...style,cursor:onClick?"pointer":undefined}}>{children}</div>;}
function Lbl({children,color}){return <div style={{fontSize:9,fontWeight:800,color:color||T.mute,letterSpacing:1.1,textTransform:"uppercase",marginBottom:8}}>{children}</div>;}
function ST({children}){return <div style={{fontSize:12,fontWeight:800,color:T.accent,borderBottom:`2px solid ${T.accentL}`,paddingBottom:4,marginBottom:10,marginTop:4}}>{children}</div>;}
function Row({label,value}){return <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`}}><span style={{fontSize:11,color:T.mid}}>{label}</span><span style={{fontSize:11,fontWeight:700,color:T.text}}>{value}</span></div>;}
function Alrt({type="info",children}){const m={info:{bg:T.accentL,b:"#BFDBFE",c:T.accent,i:"ℹ"},success:{bg:T.successL,b:"#BBF7D0",c:T.success,i:"✓"},warning:{bg:T.warnL,b:"#FDE68A",c:T.warn,i:"⚠"},error:{bg:T.dangerL,b:"#FECACA",c:T.danger,i:"✕"}}[type];return <div style={{background:m.bg,border:`1px solid ${m.b}`,borderRadius:8,padding:"8px 11px",display:"flex",gap:8,marginBottom:10}}><span style={{color:m.c,fontWeight:900,fontSize:11,flexShrink:0}}>{m.i}</span><span style={{fontSize:11,color:m.c,lineHeight:1.5}}>{children}</span></div>;}
function Btn({children,onClick,v="primary",disabled,sm,icon,full}){const V={primary:{bg:T.accent,c:"#fff",b:T.accent},secondary:{bg:"#fff",c:T.mid,b:T.border},success:{bg:T.success,c:"#fff",b:T.success},danger:{bg:T.danger,c:"#fff",b:T.danger},ghost:{bg:"transparent",c:T.mute,b:"transparent"}};const s=V[v]||V.primary;return <button onClick={onClick} disabled={disabled} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5,background:disabled?"#F1F5F9":s.bg,color:disabled?"#94A3B8":s.c,border:`1.5px solid ${disabled?T.border:s.b}`,borderRadius:8,padding:sm?"5px 11px":"9px 16px",fontSize:sm?11:12,fontWeight:700,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",width:full?"100%":undefined}}>{icon&&<span>{icon}</span>}{children}</button>;}
function Fld({label,value,onChange,type="text",disabled,hint,error,required,placeholder,maxLength}){return <div style={{marginBottom:10}}>{label&&<label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>{label}{required&&<span style={{color:T.danger}}> *</span>}</label>}<input value={value||""} onChange={e=>onChange&&onChange(e.target.value)} type={type} disabled={disabled} placeholder={placeholder} maxLength={maxLength} style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${error?"#F87171":T.border}`,borderRadius:8,fontSize:12,background:disabled?"#F8FAFC":"#fff",color:disabled?T.mute:T.text,outline:"none",fontFamily:"inherit"}}/>{hint&&<p style={{fontSize:10,color:T.mute,marginTop:2}}>{hint}</p>}{error&&<p style={{fontSize:10,color:T.danger,marginTop:2}}>{error}</p>}</div>;}
function Sel({label,value,onChange,options,disabled,placeholder,required}){return <div style={{marginBottom:10}}>{label&&<label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>{label}{required&&<span style={{color:T.danger}}> *</span>}</label>}<select value={value||""} onChange={e=>onChange&&onChange(e.target.value)} disabled={disabled} style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:12,background:disabled?"#F8FAFC":"#fff",color:value?T.text:T.mute,outline:"none",fontFamily:"inherit",cursor:disabled?"not-allowed":"pointer"}}>{placeholder&&<option value="">{placeholder}</option>}{options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}</select></div>;}
function G2({children,gap=8}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap}}>{children}</div>;}
function StepBar({steps,cur}){return <div style={{display:"flex",alignItems:"center",marginBottom:12,overflowX:"auto",paddingBottom:2}}>{steps.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",flexShrink:0}}><div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:20,height:20,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,background:i<cur?T.success:i===cur?T.accent:"#E2E8F0",color:i<=cur?"#fff":T.mute}}>{i<cur?"✓":i+1}</div><span style={{fontSize:9,fontWeight:700,color:i===cur?T.accent:i<cur?T.success:T.mute,whiteSpace:"nowrap"}}>{s}</span></div>{i<steps.length-1&&<div style={{width:10,height:1,background:i<cur?T.success:T.border,margin:"0 4px"}}/>}</div>)}</div>;}
function FileInput({label,value,onChange,required,hint}){return <div style={{marginBottom:10}}>{label&&<label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:3}}>{label}{required&&<span style={{color:T.danger}}> *</span>}</label>}{hint&&<p style={{fontSize:10,color:T.mute,marginBottom:3}}>{hint}</p>}<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,border:`1.5px dashed ${value?"#10B981":T.border}`,borderRadius:8,padding:"7px 10px",background:value?"#ECFDF5":"#FAFAFA",cursor:"pointer"}} onClick={()=>{const n=prompt(`Enter filename for "${label}":`);if(n)onChange(n);}}>{value?<span style={{fontSize:11,color:T.success,fontWeight:700}}>📄 {value}</span>:<span style={{fontSize:11,color:T.mute}}>Tap to upload (simulated)</span>}</div>{value&&<button onClick={()=>onChange("")} style={{background:"none",border:"none",color:T.danger,cursor:"pointer",fontSize:16,fontWeight:700}}>×</button>}</div></div>;}
function MultiDealerSel({dealers,selected,onChange}){return <div style={{marginBottom:10}}><label style={{display:"block",fontSize:11,fontWeight:700,color:T.mid,marginBottom:4}}>Linked Dealers <span style={{color:T.danger}}>*</span></label><div style={{border:`1.5px solid ${T.border}`,borderRadius:8,padding:8,background:"#fff",minHeight:42}}><div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:selected.length>0?5:0}}>{selected.map(id=>{const d=dealers.find(dd=>dd.id===id);return <span key={id} style={{display:"inline-flex",alignItems:"center",gap:4,background:T.accentL,color:T.accent,borderRadius:12,padding:"2px 8px",fontSize:11,fontWeight:700}}>{d?d.name:"?"}<button onClick={()=>onChange(selected.filter(x=>x!==id))} style={{background:"none",border:"none",color:T.accent,cursor:"pointer",fontSize:12,fontWeight:900}}>×</button></span>;})}</div><select value="" onChange={e=>{if(e.target.value&&!selected.includes(e.target.value))onChange([...selected,e.target.value]);}} style={{width:"100%",border:"none",outline:"none",fontSize:11,color:T.mute,background:"transparent",cursor:"pointer",fontFamily:"inherit"}}><option value="">+ Add dealer...</option>{dealers.filter(d=>d.status==="Active"&&!selected.includes(d.id)).map(d=><option key={d.id} value={d.id}>{d.name} ({d.code})</option>)}</select></div><p style={{fontSize:10,color:T.mute,marginTop:2}}>Payee available for payout across all selected dealers</p></div>;}

// WALLET CARD
function WalletCard({userId,apps}){const user=USERS.find(u=>u.id===userId);let raIds=[userId];if(user&&user.role==="RM"&&user.raIds)raIds=[userId,...user.raIds];const myApps=apps.filter(a=>raIds.includes(a.raId)&&a.stockIn);const total=myApps.reduce((s,a)=>s+a.otherCharges,0);const used=myApps.reduce((s,a)=>s+a.splitReleased,0);const bal=total-used;const pct=total>0?Math.min(100,(used/total)*100):0;return <div style={{background:`linear-gradient(135deg,${T.accentD} 0%,${T.accent} 70%,#1e74c4 100%)`,borderRadius:14,padding:16,color:"#fff",marginBottom:12}}><div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,opacity:0.7,marginBottom:4}}>{user&&user.role==="RM"?"TEAM WALLET — OTHER CHARGES":"MY WALLET — OTHER CHARGES"}</div><div style={{fontSize:28,fontWeight:900,marginBottom:1}}>{fmt(bal)}</div><div style={{fontSize:11,opacity:0.75,marginBottom:10}}>Available to split</div><div style={{height:4,background:"rgba(255,255,255,0.2)",borderRadius:4,marginBottom:6}}><div style={{height:"100%",width:`${pct}%`,background:"rgba(255,255,255,0.85)",borderRadius:4}}/></div><div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:0.75}}><span>Total: {fmt(total)}</span><span>Released: {fmt(used)}</span></div>{user&&user.role==="RM"&&user.raIds&&<div style={{marginTop:10,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.2)",display:"flex",gap:6,flexWrap:"wrap"}}>{[userId,...user.raIds].map(rid=>{const ra=USERS.find(u=>u.id===rid);const b=raWalBal(rid,apps);return <div key={rid} style={{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"4px 8px",fontSize:10}}><div style={{fontWeight:700}}>{ra&&ra.name.split(" ")[0]}</div><div style={{opacity:0.8}}>{fmt(b)}</div></div>;})}</div>}</div>;}

// DASHBOARD
function Dashboard({userId,apps,dealers,leads,onboarding,payoutRequests}){
  const user=USERS.find(u=>u.id===userId);let raIds=[userId];if(user&&user.role==="RM"&&user.raIds)raIds=[userId,...user.raIds];

  if(view==="form") return <div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><Btn v="ghost" onClick={()=>{setView("list");setStep(0);setForm({});}} sm>← Back</Btn><span style={{fontSize:14,fontWeight:800}}>New Dealer Onboarding</span></div>
    <StepBar steps={["Dealer Info","Bank & Docs","OEM Details","Review"]} cur={step}/>
    {step===0&&<Card><ST>Dealer Information</ST>
      <Fld label="Dealer / Company Name" value={form.dealerName} onChange={v=>f("dealerName",v)} required placeholder="e.g. Landmark Cars Ltd"/>
      <G2><Sel label="Region" value={form.region} onChange={v=>f("region",v)} options={REGIONS} placeholder="Select region..." required/><Sel label="City" value={form.city} onChange={v=>f("city",v)} options={CITIES} placeholder="Select city..." required/></G2>
      <G2><Fld label="Mobile" value={form.mobile} onChange={v=>f("mobile",v)} required placeholder="10-digit mobile"/><Fld label="Email" value={form.email} onChange={v=>f("email",v)} placeholder="dealer@email.com"/></G2>
      <Fld label="Full Address" value={form.address} onChange={v=>f("address",v)} required placeholder="Street, Area, City, PIN"/>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}><Btn disabled={!form.dealerName||!form.region||!form.city||!form.mobile||!form.address} onClick={()=>setStep(1)}>Next →</Btn></div>
    </Card>}
    {step===1&&<Card><ST>Bank & Tax Details</ST>
      <G2><Fld label="PAN Number" value={form.pan} onChange={v=>f("pan",v.toUpperCase())} required placeholder="ABCDE1234F" maxLength={10}/><Fld label="GST Number" value={form.gst} onChange={v=>f("gst",v.toUpperCase())} placeholder="22AAAAA0000A1Z5"/></G2>
      <Sel label="Bank Name" value={form.bank} onChange={v=>f("bank",v)} options={BANK_LIST} placeholder="Select bank..." required/>
      <G2><Fld label="Account Number" value={form.account} onChange={v=>f("account",v)} required/><Fld label="IFSC Code" value={form.ifsc} onChange={v=>f("ifsc",v.toUpperCase())} required placeholder="HDFC0001234"/></G2>
      <ST>Mandatory Documents</ST>
      <FileInput label="GST Certificate" value={docs.gst} onChange={v=>setDocs(p=>({...p,gst:v}))} required hint="GST registration certificate"/>
      <FileInput label="PAN Card" value={docs.pan} onChange={v=>setDocs(p=>({...p,pan:v}))} required hint="Dealer/company PAN card"/>
      <FileInput label="Bank Statement (last 3 months)" value={docs.bank} onChange={v=>setDocs(p=>({...p,bank:v}))} required hint="Latest 3-month statement"/>
      <FileInput label="Cancelled Cheque" value={docs.cancelledCheque} onChange={v=>setDocs(p=>({...p,cancelledCheque:v}))} required hint="Bearing company account details"/>
      <ST>Other Attachments (Optional)</ST>
      <FileInput label="Other Document" value={docs.other} onChange={v=>setDocs(p=>({...p,other:v}))} hint="Any other supporting document"/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><Btn v="secondary" onClick={()=>setStep(0)}>← Back</Btn><Btn disabled={!form.pan||!form.bank||!form.account||!form.ifsc||!docs.gst||!docs.pan||!docs.bank||!docs.cancelledCheque} onClick={()=>setStep(2)}>Next →</Btn></div>
    </Card>}
    {step===2&&<Card><ST>OEM & Dealer Type</ST>
      <Alrt type="info">OEM tagging processed by Central Ops ONLY after dealer code is confirmed. Provide details now.</Alrt>
      <G2><Sel label="Dealer Type" value={form.type} onChange={v=>f("type",v)} options={DEALER_TYPES} placeholder="Select..." required/><Sel label="OEM Brand" value={form.oem} onChange={v=>f("oem",v)} options={OEM_BRANDS} placeholder="Select OEM..." required/></G2>
      <Sel label="Dealer Categorisation" value={form.oemType} onChange={v=>f("oemType",v)} options={["Franchise Dealer","Authorised Service Centre","Multi-Brand Dealer","Independent Dealer"]} placeholder="Select..." required/>
      <ST>OEM Documents</ST>
      <FileInput label="Franchise Agreement / Appointment Letter" value={oemDocs.franchiseAgreement} onChange={v=>setOemDocs(p=>({...p,franchiseAgreement:v}))} required hint="OEM-issued document"/>
      <FileInput label="OEM Letter / Authorization" value={oemDocs.oemLetter} onChange={v=>setOemDocs(p=>({...p,oemLetter:v}))} required hint="OEM authorisation letter"/>
      <FileInput label="Other OEM Document" value={oemDocs.other} onChange={v=>setOemDocs(p=>({...p,other:v}))} hint="Optional supporting document"/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><Btn v="secondary" onClick={()=>setStep(1)}>← Back</Btn><Btn disabled={!form.type||!form.oem||!form.oemType||!oemDocs.franchiseAgreement||!oemDocs.oemLetter} onClick={()=>setStep(3)}>Review →</Btn></div>
    </Card>}
    {step===3&&<Card><ST>Review & Submit</ST>
      {[["Dealer Name",form.dealerName],["Region",form.region],["City",form.city],["Mobile",form.mobile],["PAN",form.pan],["GST",form.gst],["Bank",form.bank],["Account",form.account],["IFSC",form.ifsc],["Dealer Type",form.type],["OEM",form.oem],["Categorisation",form.oemType],["GST Certificate",docs.gst],["PAN Card",docs.pan],["Bank Statement",docs.bank],["Cancelled Cheque",docs.cancelledCheque],["Franchise Agreement",oemDocs.franchiseAgreement],["OEM Letter",oemDocs.oemLetter]].map(([l,v])=><Row key={l} label={l} value={v||"—"}/>)}
      <Alrt type="warning">Submitting sends auto-email to Admin Panel team with all documents attached.</Alrt>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}><Btn v="secondary" onClick={()=>setStep(2)}>← Edit</Btn><Btn v="success" icon="✓" onClick={submit}>Submit</Btn></div>
    </Card>}
  </div>;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Lbl>Onboarding ({myOB.length})</Lbl><Btn sm icon="+" onClick={()=>setView("form")}>New Dealer</Btn></div>
    {myOB.length===0&&<div style={{textAlign:"center",padding:36,color:T.mute}}><div style={{fontSize:28,marginBottom:8}}>🏢</div><div>No requests yet</div><div style={{marginTop:10}}><Btn onClick={()=>setView("form")}>Start Onboarding</Btn></div></div>}
    {myOB.map(ob=><Card key={ob.id} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><div><div style={{fontSize:13,fontWeight:800}}>{ob.dealerName}</div><div style={{fontSize:10,color:T.mute}}>{ob.type} · {ob.oem} · {ob.region} · {ob.city}</div></div><Badge s={ob.status}/></div>{ob.status==="Admin Panel Pending"&&<div><Alrt type="info">Auto-email sent. Waiting for dealer code.</Alrt><Btn sm v="secondary" onClick={()=>simCode(ob.id)}>🔄 Simulate Code Received</Btn></div>}{ob.dealerCode&&<div style={{fontSize:11,fontWeight:800,color:T.success,marginTop:3}}>Dealer Code: {ob.dealerCode}</div>}{ob.status==="OEM Tagging Pending"&&<Alrt type="warning">Code received. Waiting for Central Ops OEM tagging.</Alrt>}{ob.status==="Active"&&<Alrt type="success">Dealer activated!</Alrt>}</Card>)}
    <div style={{marginTop:14}}><Lbl>Active Dealers</Lbl>{dealers.filter(d=>raIds.includes(d.raId)).map(d=><Card key={d.id} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:12,fontWeight:800}}>{d.name}</div><div style={{fontSize:10,color:T.mute}}>Code: {d.code||"Pending"} · {d.type} · {d.oem} · {d.region}</div></div><Badge s={d.status} sm/></div></Card>)}</div>
  </div>;
}

// COUNTER
function CounterForm({userId,dealers,counterReqs,setCounterReqs}){const [show,setShow]=useState(false);const [form,setForm]=useState({});const f=(k,v)=>setForm(p=>({...p,[k]:v}));const user=USERS.find(u=>u.id===userId);let raIds=[userId];if(user&&user.role==="RM"&&user.raIds)raIds=[userId,...user.raIds];const myReqs=counterReqs.filter(r=>raIds.includes(r.raId));const myDealers=dealers.filter(d=>raIds.includes(d.raId)&&d.status==="Active");
function submit(){if(!form.dealerId||!form.counterName||!form.city||!form.ucmName||!form.ucmMobile){alert("Fill required fields");return;}setCounterReqs(p=>[...p,{id:`CR${uid()}`,raId:userId,dealerId:form.dealerId,counterName:form.counterName,city:form.city,ucmName:form.ucmName,ucmMobile:form.ucmMobile,ucmEmail:form.ucmEmail||"",status:"Ops Review",submittedAt:now(),rejectionReason:null}]);setShow(false);setForm({});alert("Submitted to Central Ops.");}
return <div>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Lbl>Counter Requests ({myReqs.length})</Lbl><Btn sm icon="+" onClick={()=>setShow(!show)}>New Mapping</Btn></div>
  {show&&<Card style={{marginBottom:12,border:`1.5px solid ${T.accent}`}}><ST>Counter & UCM Form</ST>
    <Sel label="Dealer" value={form.dealerId} onChange={v=>f("dealerId",v)} options={myDealers.map(d=>({value:d.id,label:`${d.name} (${d.code})`}))} placeholder="Select dealer..." required/>
    <Fld label="Counter Name" value={form.counterName} onChange={v=>f("counterName",v)} required placeholder="e.g. Landmark - Delhi Main"/>
    <Sel label="City" value={form.city} onChange={v=>f("city",v)} options={CITIES} placeholder="Select city..." required/>
    <G2><Fld label="UCM Name" value={form.ucmName} onChange={v=>f("ucmName",v)} required/><Fld label="UCM Mobile" value={form.ucmMobile} onChange={v=>f("ucmMobile",v)} required/></G2>
    <Fld label="UCM Email" value={form.ucmEmail} onChange={v=>f("ucmEmail",v)}/>
    <Alrt type="info">Central Ops will review. If rejected, you can edit and re-submit this same request.</Alrt>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="secondary" sm onClick={()=>{setShow(false);setForm({})}}>Cancel</Btn><Btn sm icon="✓" onClick={submit}>Submit</Btn></div>
  </Card>}
  {myReqs.length===0&&!show&&<div style={{textAlign:"center",padding:32,color:T.mute,fontSize:12}}>No counter requests yet</div>}
  {myReqs.map(r=>{const d=dealers.find(d=>d.id===r.dealerId);return <Card key={r.id} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,fontWeight:800}}>{r.counterName}</span><Badge s={r.status} sm/></div><div style={{fontSize:11,color:T.mute}}>{d&&d.name} · {r.city} · UCM: {r.ucmName}</div>{r.status==="Rejected"&&r.rejectionReason&&<div style={{marginTop:6}}><Alrt type="error">Rejected: {r.rejectionReason}</Alrt><Btn sm onClick={e=>{e.stopPropagation();setForm({dealerId:r.dealerId,counterName:r.counterName,city:r.city,ucmName:r.ucmName,ucmMobile:r.ucmMobile,ucmEmail:r.ucmEmail});setShow(true);}}>Edit & Re-submit</Btn></div>}</Card>;})}
</div>;}

// SAP
function SAPFormRA({userId,dealers,sapReqs,setSapReqs}){const [show,setShow]=useState(false);const [form,setForm]=useState({});const [selDealers,setSelDealers]=useState([]);const [docs,setDocs]=useState({pan:"",cancelledCheque:"",other:""});const f=(k,v)=>setForm(p=>({...p,[k]:v}));const user=USERS.find(u=>u.id===userId);let raIds=[userId];if(user&&user.role==="RM"&&user.raIds)raIds=[userId,...user.raIds];const myReqs=sapReqs.filter(r=>raIds.includes(r.raId));const myDealers=dealers.filter(d=>raIds.includes(d.raId)&&d.status==="Active");
function submit(){if(!form.payeeName||!form.pan||!form.bank||!form.account||!form.ifsc||selDealers.length===0){alert("Fill all fields and select at least one dealer");return;}if(!docs.pan||!docs.cancelledCheque){alert("PAN card and Cancelled Cheque are mandatory");return;}setSapReqs(p=>[...p,{id:`SR${uid()}`,raId:userId,dealerIds:selDealers,payeeName:form.payeeName,pan:form.pan,bank:form.bank,account:form.account,ifsc:form.ifsc,mobile:form.mobile||"",docs,status:"Ops Review",submittedAt:now(),sapCode:""}]);setShow(false);setForm({});setSelDealers([]);setDocs({pan:"",cancelledCheque:"",other:""});}
return <div>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Lbl>SAP / Payee ({myReqs.length})</Lbl><Btn sm icon="+" onClick={()=>setShow(!show)}>New Payee</Btn></div>
  {show&&<Card style={{marginBottom:12,border:`1.5px solid ${T.accent}`}}><ST>SAP Creation Form</ST>
    <Alrt type="info">A payee can be linked to multiple dealers. System checks for duplicate PAN/account.</Alrt>
    <MultiDealerSel dealers={myDealers} selected={selDealers} onChange={setSelDealers}/>
    <Fld label="Payee Name (Account Holder)" value={form.payeeName} onChange={v=>f("payeeName",v)} required/>
    <G2><Fld label="PAN Number" value={form.pan} onChange={v=>f("pan",v.toUpperCase())} required placeholder="ABCDE1234F" maxLength={10}/><Fld label="Mobile" value={form.mobile} onChange={v=>f("mobile",v)} placeholder="For duplicate check"/></G2>
    <Sel label="Bank Name" value={form.bank} onChange={v=>f("bank",v)} options={BANK_LIST} placeholder="Select bank..." required/>
    <G2><Fld label="Account Number" value={form.account} onChange={v=>f("account",v)} required/><Fld label="IFSC Code" value={form.ifsc} onChange={v=>f("ifsc",v.toUpperCase())} required placeholder="HDFC0001234"/></G2>
    <ST>Mandatory Documents</ST>
    <FileInput label="PAN Card" value={docs.pan} onChange={v=>setDocs(p=>({...p,pan:v}))} required hint="Payee PAN card copy"/>
    <FileInput label="Cancelled Cheque" value={docs.cancelledCheque} onChange={v=>setDocs(p=>({...p,cancelledCheque:v}))} required hint="Account name must match payee"/>
    <ST>Other Attachments (Optional)</ST>
    <FileInput label="Other Document" value={docs.other} onChange={v=>setDocs(p=>({...p,other:v}))} hint="Any supporting document"/>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn v="secondary" sm onClick={()=>{setShow(false);setForm({});setSelDealers([]);}}>Cancel</Btn><Btn sm icon="✓" onClick={submit}>Submit SAP Request</Btn></div>
  </Card>}
  {myReqs.map(r=>{const ds=r.dealerIds.map(id=>dealers.find(d=>d.id===id)).filter(Boolean);return <Card key={r.id} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:13,fontWeight:800}}>{r.payeeName}</span><Badge s={r.status} sm/></div><div style={{fontSize:11,color:T.mute,marginBottom:3}}>{r.bank} · {r.pan}</div><div style={{fontSize:10,color:T.accent,fontWeight:700}}>Linked: {ds.map(d=>d.name).join(", ")}</div>{r.sapCode&&<div style={{fontSize:11,fontWeight:800,color:T.success,marginTop:3}}>SAP: {r.sapCode}</div>}</Card>;})}
</div>;}

// PAYOUT STATUS
function PayoutStatus({userId,payoutRequests,apps,dealers,counters}){let raIds=[userId];const user=USERS.find(u=>u.id===userId);if(user&&user.role==="RM"&&user.raIds)raIds=[userId,...user.raIds];const myPR=payoutRequests.filter(p=>raIds.includes(p.raId));
return <div><Lbl>Payout Requests ({myPR.length})</Lbl><Alrt type="info">Payments raised by TM/City Head only. This is your status tracker.</Alrt>
{myPR.length===0&&<div style={{textAlign:"center",padding:32,color:T.mute,fontSize:12}}>No requests yet</div>}
{myPR.map(pr=>{const a=apps.find(a=>a.id===pr.appId);const d=a?dealers.find(d=>d.id===a.dealerId):null;const c=a?counters.find(c=>c.id===a.counterId):null;const ra=USERS.find(u=>u.id===pr.raId);return <Card key={pr.id} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,fontWeight:800,color:T.accent}}>{pr.id}</span><Badge s={pr.status} sm/></div><div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{fmt(pr.amount)}</div><div style={{fontSize:11,color:T.mute}}>{pr.appId} · {pr.type}</div><div style={{fontSize:11,color:T.mute}}>{d&&d.name} · {c&&c.name}</div>{user&&user.role==="RM"&&<div style={{fontSize:10,color:T.accent,marginTop:2}}>RA: {ra&&ra.name}</div>}{pr.utr&&<div style={{fontSize:10,fontWeight:800,color:T.success,marginTop:3,fontFamily:"monospace"}}>UTR: {pr.utr}</div>}<div style={{fontSize:10,color:T.mute,marginTop:2}}>{pr.createdAt}</div></Card>;})}
</div>;}

// MAIN
const TABS=[{id:"dashboard",label:"Home",icon:"🏠"},{id:"leads",label:"Leads",icon:"📋"},{id:"appids",label:"App_IDs",icon:"🚗"},{id:"onboarding",label:"Dealers",icon:"🏢"},{id:"counter",label:"Counter",icon:"🔗"},{id:"sap",label:"SAP",icon:"🏦"},{id:"payouts",label:"Payouts",icon:"💸"}];

function App(){
  const [userId,setUserId]=useState("RA001");const [tab,setTab]=useState("dashboard");
  const [apps]=useState(INIT_APPS);const [dealers,setDealers]=useState(INIT_DEALERS);const [counters]=useState(INIT_COUNTERS);const [leads,setLeads]=useState(INIT_LEADS);const [onboarding,setOnboarding]=useState(INIT_OB);const [counterReqs,setCounterReqs]=useState([]);const [sapReqs,setSapReqs]=useState([]);const [payoutReqs]=useState(INIT_PR);
  const user=USERS.find(u=>u.id===userId);
  return <div style={{background:T.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:72}}>
    <div style={{background:T.accentD,padding:"12px 14px 10px",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{background:"rgba(255,255,255,0.15)",borderRadius:7,padding:"3px 9px"}}><span style={{color:"#fff",fontWeight:900,fontSize:13}}>C24</span></div><span style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>B2B Field App</span></div>
        <select value={userId} onChange={e=>{setUserId(e.target.value);setTab("dashboard");}} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:7,padding:"3px 9px",fontSize:11,fontWeight:700,fontFamily:"inherit",cursor:"pointer",outline:"none"}}>{USERS.map(u=><option key={u.id} value={u.id} style={{color:"#000"}}>{u.name} ({u.role})</option>)}</select>
      </div>
      <div style={{color:"#fff",fontSize:13,fontWeight:800}}>{user&&user.name} <span style={{fontSize:10,fontWeight:400,opacity:0.65}}>· {user&&user.role} · {user&&user.region}</span></div>
      {user&&user.role==="RM"&&user.raIds&&<div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>Team: {user.raIds.map(id=>{const u=USERS.find(u=>u.id===id);return u&&u.name.split(" ")[0];}).join(", ")}</div>}
    </div>
    <div style={{background:"#FF4B2B",padding:"3px 0",textAlign:"center"}}><span style={{fontSize:9,fontWeight:800,color:"#fff",letterSpacing:1}}>SIMULATION — NO REAL PAYOUTS</span></div>
    <div style={{padding:12}}>
      {tab==="dashboard" &&<Dashboard userId={userId} apps={apps} dealers={dealers} leads={leads} onboarding={onboarding} payoutRequests={payoutReqs}/>}
      {tab==="leads"     &&<Leads userId={userId} dealers={dealers} counters={counters} leads={leads} setLeads={setLeads}/>}
      {tab==="appids"    &&<AppIDs userId={userId} apps={apps} dealers={dealers} counters={counters}/>}
      {tab==="onboarding"&&<Onboarding userId={userId} dealers={dealers} onboarding={onboarding} setOnboarding={setOnboarding} setDealers={setDealers}/>}
      {tab==="counter"   &&<CounterForm userId={userId} dealers={dealers} counterReqs={counterReqs} setCounterReqs={setCounterReqs}/>}
      {tab==="sap"       &&<SAPFormRA userId={userId} dealers={dealers} sapReqs={sapReqs} setSapReqs={setSapReqs}/>}
      {tab==="payouts"   &&<PayoutStatus userId={userId} payoutRequests={payoutReqs} apps={apps} dealers={dealers} counters={counters}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:`1px solid ${T.border}`,display:"flex",zIndex:100}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 0 6px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
        <span style={{fontSize:16}}>{t.icon}</span>
        <span style={{fontSize:8,fontWeight:700,color:tab===t.id?T.accent:T.mute}}>{t.label}</span>
        {tab===t.id&&<div style={{width:14,height:2,background:T.accent,borderRadius:2}}/>}
      </button>)}
    </div>
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
